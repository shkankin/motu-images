<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The MOTU Vault | Collector Gallery</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #1a1a1a;
            --accent-green: #4a7023; /* Castle Grayskull Green */
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #333;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Custom Dark Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        /* Thematic Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 1rem;
            text-align: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin: 0 0 1rem 0;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Search & Filter Bar */
        .controls {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #searchBar {
            background: #222;
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 10px 20px;
            color: white;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: border-color 0.3s;
        }

        #searchBar:focus { border-color: var(--accent-green); }

        /* Vault Grid */
        .vault-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            padding: 40px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Figure Card */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px rgba(74, 112, 35, 0.2);
            border-color: var(--accent-green);
        }

        .img-container {
            width: 100%;
            aspect-ratio: 1 / 1; /* Square images look best for figures */
            background: #111;
            overflow: hidden;
            position: relative;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps figure aspect ratio perfect */
            transition: transform 0.5s ease;
        }

        .card:hover .card-img {
            transform: scale(1.1);
        }

        .card-info {
            padding: 18px;
            border-top: 1px solid var(--border);
        }

        .card-title {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            margin: 0 0 8px 0;
            color: #fff;
        }

        .card-line {
            font-size: 0.8rem;
            color: var(--accent-green);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 4px;
        }

        .card-meta {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* Loading Animation */
        #loader { text-align: center; padding: 50px; font-size: 1.2rem; color: var(--accent-green); }

        @media (max-width: 600px) {
            .vault-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>The MOTU Vault</h1>
    <div class="controls">
        <input type="text" id="searchBar" placeholder="Search for a hero or villain...">
    </div>
</header>

<div id="loader">Unlocking the Vault...</div>
<main class="vault-grid" id="vaultGrid"></main>

<script>
    // 1. Configuration: Update these if your JSON keys are named differently
    const CONFIG = {
        jsonPath: 'figures.json', // Path to your file
        keyName: 'name',          // Figure name
        keyImage: 'image',        // Image filename/URL
        keyLine: 'line',          // Toy line (Origins, etc.)
        keyYear: 'year'           // Release year
    };

    const vaultGrid = document.getElementById('vaultGrid');
    const searchBar = document.getElementById('searchBar');
    const loader = document.getElementById('loader');
    let allFigures = [];

    // 2. Fetch data from figures.json
    async function loadVault() {
        try {
            const response = await fetch(CONFIG.jsonPath);
            if (!response.ok) throw new Error('Could not find figures.json');
            
            allFigures = await response.json();
            renderFigures(allFigures);
            loader.style.display = 'none';
        } catch (err) {
            loader.innerHTML = `<span style="color:red">Error: ${err.message}</span><br>Make sure the JSON file is in the same folder and you are using a local server.`;
            console.error(err);
        }
    }

    // 3. Create the HTML for each card
    function renderFigures(data) {
        vaultGrid.innerHTML = '';
        data.forEach(fig => {
            const card = document.createElement('div');
            card.className = 'card';
            
            // Build the card HTML
            card.innerHTML = `
                <div class="img-container">
                    <img class="card-img" src="${fig[CONFIG.keyImage] || 'https://via.placeholder.com/300'}" alt="${fig[CONFIG.keyName]}" loading="lazy">
                </div>
                <div class="card-info">
                    <span class="card-line">${fig[CONFIG.keyLine] || 'Collection'}</span>
                    <h3 class="card-title">${fig[CONFIG.keyName]}</h3>
                    <div class="card-meta">${fig[CONFIG.keyYear] || ''}</div>
                </div>
            `;
            vaultGrid.appendChild(card);
        });
    }

    // 4. Search Filter Logic
    searchBar.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allFigures.filter(fig => 
            fig[CONFIG.keyName].toLowerCase().includes(term) || 
            fig[CONFIG.keyLine]?.toLowerCase().includes(term)
        );
        renderFigures(filtered);
    });

    // Start
    loadVault();
</script>

</body>
</html>
