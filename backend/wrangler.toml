name = "motu-vault-pricing"
main = "pricing-worker.js"
compatibility_date = "2026-01-01"

# ─── KV namespaces ──────────────────────────────────────────────────
# Create these once with:  npx wrangler kv:namespace create PRICING_CACHE
# and paste the IDs in here.

[[kv_namespaces]]
binding = "PRICING_CACHE"
id = "0d20600af7f74e4588319166d8a56e31"

[[kv_namespaces]]
binding = "COMMUNITY_PRICES"
id = "46a2c6e99cd64215863dc3000391f471"

# Optional — for hand-curated figId → eBay search query mappings.
# Skip the binding entirely if you don't want it (figIdToQuery() will be used).
# [[kv_namespaces]]
# binding = "QUERY_MAP"
# id = "REPLACE_ME"

# ─── Vars (non-secret) ──────────────────────────────────────────────
[vars]
# v6.56: comma-separated provider chain, tried in order until one returns data.
# Available: community | ebay-sold | ebay-active | stub
# (Legacy single-provider PROVIDER env still works as fallback.)
# v6.60: defaulted to ebay-active only — community-curated path is not being
# maintained. Re-add "community," at the front of the chain if you ever
# decide to crowdsource curated prices.
PROVIDER_CHAIN = "ebay-active"
ALLOWED_ORIGINS = "https://motucollector.app,https://shkankin.github.io"
MIN_SAMPLES = "1"                   # v6.56: keep low-sample data, flag confidence client-side

# ─── Secrets ────────────────────────────────────────────────────────
# Set with `wrangler secret put EBAY_APP_ID` etc.; do NOT commit them here.
#   EBAY_APP_ID    (required for ebay-active and ebay-sold)
#   EBAY_CERT_ID   (required for ebay-active and ebay-sold — OAuth client secret)
#   ADMIN_TOKEN    (required for /admin/community/* writes)
