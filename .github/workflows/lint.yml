name: Handler Lint

# v1.1 — guards against "dead button" regressions: an inline onclick calling
# an unexposed global, a data-action with no register() handler, or (new in
# v1.1) any window.X read/call with no window.X assignment anywhere in js/ —
# the silent undefined?.() class that shipped four separate times before this
# check existed. Uses only Node built-ins (no install step). Passes on main,
# so this is a hard gate.
run-name: "Handler Lint · ${{ github.event_name }}"

on:
  push:
    paths:
      - 'js/**'
      - 'scripts/lint_handlers.mjs'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'js/**'
      - 'scripts/lint_handlers.mjs'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint inline handlers & data-actions
        run: node scripts/lint_handlers.mjs js
      # v7.51: no-undef gate. Two shipped bugs (Edit-sheet sourceName crash,
      # insurance report's unimported getCachedAskingPrice) plus two more
      # found on its first run (app.js bigSet in journal recovery, render.js
      # KIDS_CORE_KEY in the Kids Core sheet) were bare-identifier
      # ReferenceErrors that node --check and the handler lint cannot see.
      # Single-purpose config: eslint.config.mjs enables ONLY no-undef.
      - name: Install eslint (no-undef gate)
        run: npm install --no-save eslint@9 globals
      - name: ESLint no-undef
        run: npx eslint --config eslint.config.mjs js/*.js sw.js
      # v7.59: inline-HTML-script syntax gate. desktop.html shipped a
      # SyntaxError (duplicate identifier) that killed its whole module —
      # "share link loads indefinitely" — because the tool pages' inline
      # <script> blocks are invisible to node --check on js/*.js and to
      # eslint's glob. Extract each page's script and parse it for real.
      - name: Inline HTML script syntax
        run: |
          for f in desktop.html deploy.html figures-editor.html motu-vault.html index.html; do
            python3 - "$f" <<'PY'
          import re, sys
          src = open(sys.argv[1]).read()
          # strip HTML comments first — the tool pages' doc comments contain
          # literal "<script>" text that the tag regex would otherwise match
          src = re.sub(r'<!--.*?-->', '', src, flags=re.S)
          for i, m in enumerate(re.finditer(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>', src, re.S)):
              open(f'/tmp/inline_{i}.mjs', 'w').write(m.group(1))
          PY
            for s in /tmp/inline_*.mjs; do
              [ -e "$s" ] || continue
              node --check "$s" || { echo "SYNTAX ERROR in $f ($s)"; exit 1; }
              rm -f "$s"
            done
          done
      # v7.52: README freshness guard. The README documents capabilities,
      # not versions (policy in its Development section) — this check keeps
      # it structurally present and version-free so it can't silently rot:
      # required sections must exist, and no app version string may appear.
      - name: README freshness
        run: |
          test -f README.md
          for h in "Why this instead" "Quick start" "Feature tour" "Data & privacy" "Development"; do
            grep -q "$h" README.md || { echo "README missing section: $h"; exit 1; }
          done
          if grep -qE "v7\.[0-9]+" README.md; then
            echo "README contains a version string — it documents capabilities, not versions"; exit 1;
          fi
