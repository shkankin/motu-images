name: Sync FigureRealm Catalog

# ── Workflow v1.0 ────────────────────────────────────────────────────────────
#   Mirrors sync-af411.yml exactly in structure and security posture:
#   - workflow_dispatch inputs are bound to env vars (not interpolated into
#     run: blocks) to prevent shell script-injection.
#   - commit/push and Discord steps have explicit success() guards.
#   - push uses rebase-and-retry to handle overlapping runs or deploy-tool pushes.
#
#   Runs on manual dispatch only — no daily schedule.
#   FigureRealm data is more static than AF411 (no daily releases), so
#   there is no value in a nightly cron hit against their servers.
#   Trigger manually whenever you want to pull in new FR entries.

run-name: "Sync FigureRealm Catalog v1.0 · ${{ github.event_name }}${{ inputs.line && format(' · {0}', inputs.line) || '' }}"

on:
  workflow_dispatch:
    inputs:
      line:
        description: 'Sync a specific series only (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - loyal-subjects
          - hot-wheels
          - mega-construx
          - dc-vs-motu
      audit_only:
        description: 'Audit only — show what is new without committing anything'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run FigureRealm sync script
        # All workflow_dispatch inputs are bound to env vars here and
        # referenced as "$VAR" in the shell below — never interpolated
        # via ${{ }} inside the run: block (script-injection hardening).
        env:
          EVENT_NAME:    ${{ github.event_name }}
          IN_LINE:       ${{ inputs.line }}
          IN_AUDIT_ONLY: ${{ inputs.audit_only }}
        run: |
          cd "$GITHUB_WORKSPACE"
          set -- python scripts/sync_figurerealm.py
          if [ "$IN_AUDIT_ONLY" = "true" ]; then
            set -- "$@" --audit
          else
            set -- "$@" --commit
          fi
          if [ -n "$IN_LINE" ]; then
            set -- "$@" --line "$IN_LINE"
          fi
          echo "Running: $*"
          "$@"

      - name: Commit and push changes
        if: ${{ success() && inputs.audit_only != 'true' }}
        env:
          IN_LINE: ${{ inputs.line }}
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name  "MOTU Vault Bot"
          git config user.email "motu-vault-bot@users.noreply.github.com"
          git add figures.json
          git add figures-pending.json  2>/dev/null || true
          git add figures-rejected.json 2>/dev/null || true
          git add "*.jpg"               2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          NEW_FIGS=$(git diff --cached --numstat figures.json          2>/dev/null | awk '{print $1}')
          NEW_PEND=$(git diff --cached --numstat figures-pending.json  2>/dev/null | awk '{print $1}')
          NEW_IMGS=$(git diff --cached --name-only -- "*.jpg" | wc -l | tr -d ' ')
          LINE_MSG=""
          if [ -n "$IN_LINE" ]; then LINE_MSG=" ($IN_LINE)"; fi
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit \
            -m "sync: update catalog from FigureRealm${LINE_MSG} — ${TIMESTAMP}" \
            -m "Figures: ${NEW_FIGS:-0} lines · Pending: ${NEW_PEND:-0} lines · Images: ${NEW_IMGS}"
          # Rebase-and-retry so overlapping pushes don't fail the workflow.
          git config pull.rebase true
          PUSHED=0
          for attempt in 1 2 3; do
            if git push; then PUSHED=1; break; fi
            echo "⚠ push rejected (attempt $attempt) — rebasing on latest main…"
            git pull --rebase -X theirs origin main || git rebase --abort || true
            sleep 3
          done
          if [ "$PUSHED" != "1" ]; then
            echo "::error::Could not push after rebase retries."
            exit 1
          fi
          echo "✅ Changes committed and pushed"

      - name: Notify Discord on new pending figures
        if: ${{ success() && inputs.audit_only != 'true' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_REPOSITORY:       ${{ github.repository }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping"
            exit 0
          fi
          SUMMARY=/tmp/motu-fr-sync-summary.json
          if [ ! -f "$SUMMARY" ]; then
            echo "No summary file — skipping"
            exit 0
          fi
          COUNT=$(jq -r '.new_pending_count // 0' "$SUMMARY")
          if [ "$COUNT" -eq 0 ]; then
            echo "No new pending figures — skipping"
            exit 0
          fi
          NAMES=$(jq -r '
            .new_pending
            | (if length > 10 then .[0:10] else . end)
            | map("• " + .name + (if .line and .line != "" then " (" + .line + ")" else "" end))
            | join("\n")
          ' "$SUMMARY")
          EXTRA=$(jq -r 'if .new_pending_count > 10 then "…and " + ((.new_pending_count - 10) | tostring) + " more" else "" end' "$SUMMARY")
          PENDING_TOTAL=$(jq -r '.pending_total // 0' "$SUMMARY")
          REPO_URL="https://github.com/$GH_REPOSITORY"
          EDITOR_URL="https://shkankin.github.io/motu-images/figures-editor.html"
          if [ -n "$EXTRA" ]; then
            DESC=$(printf '%s\n%s\n\n[Open editor →](%s) · [View commit →](%s/commits)' "$NAMES" "$EXTRA" "$EDITOR_URL" "$REPO_URL")
          else
            DESC=$(printf '%s\n\n[Open editor →](%s) · [View commit →](%s/commits)' "$NAMES" "$EDITOR_URL" "$REPO_URL")
          fi
          TITLE="🎬 ${COUNT} new figure in pending queue (FigureRealm)"
          if [ "$COUNT" -ne 1 ]; then TITLE="🎬 ${COUNT} new figures in pending queue (FigureRealm)"; fi
          jq -n \
            --arg title "$TITLE" \
            --arg desc  "$DESC" \
            --arg pending_total "$PENDING_TOTAL" \
            '{
              embeds: [{
                title:       $title,
                description: $desc,
                color:       5814783,
                footer:      { text: ("Total pending: " + $pending_total) },
                timestamp:   (now | todate)
              }]
            }' > /tmp/discord-payload.json
          HTTP=$(curl -sS -o /tmp/discord-resp.txt -w "%{http_code}" \
            -X POST -H "Content-Type: application/json" \
            --data @/tmp/discord-payload.json \
            "$DISCORD_WEBHOOK_URL")
          if [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; then
            echo "✅ Discord notified ($COUNT new figures)"
          else
            echo "⚠ Discord webhook failed (HTTP $HTTP)"
            cat /tmp/discord-resp.txt
          fi
