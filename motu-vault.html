<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06060c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>MOTU Collector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   MOTU VAULT — Pure CSS, Zero Dependencies
   ═══════════════════════════════════════════════════════════════════ */

/* ── Theme Variables ─────────────────────────────────────────────── */
:root {
  --bg:  #06060c;
  --bg2: #0d0d18;
  --bg3: #151525;
  --bd:  #252545;
  --acc: #8b5cf6;
  --gold:#d4a843;
  --t1:  #eae6f2;
  --t2:  #9a92b0;
  --t3:  #5e5678;
  --gn:  #34d399;
  --rd:  #f87171;
  --bl:  #60a5fa;
  --or:  #fb923c;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --radius: 14px;
  --radius-sm: 10px;
}

[data-theme="skeletor"] {
  --bg: #0a0514; --bg2: #110a24; --bg3: #1a1035; --bd: #3d2a6e;
  --acc: #a78bfa; --gold: #c084fc; --t1: #ede9f8; --t2: #9c87cc; --t3: #5e4a8a;
}
[data-theme="heman"] {
  --bg: #0f0a03; --bg2: #1a1205; --bg3: #241908; --bd: #5a3a10;
  --acc: #f59e0b; --gold: #fbbf24; --t1: #fef3c7; --t2: #b45309; --t3: #78450f;
}
[data-theme="grayskull"] {
  --bg: #080a08; --bg2: #0f1410; --bg3: #171f18; --bd: #2a3d2c;
  --acc: #22c55e; --gold: #86efac; --t1: #e8f5e9; --t2: #6b9e70; --t3: #3d5e40;
}

/* ── Reset & Base ────────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body, #app {
  height: 100%; width: 100%;
  overflow: hidden;
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--t1);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; }

input, select, textarea {
  outline: none;
  font-family: 'Outfit', sans-serif;
  background: var(--bg3);
  border: 1px solid var(--bd);
  border-radius: var(--radius-sm);
  color: var(--t1);
  font-size: 14px;
  padding: 12px;
  width: 100%;
  transition: border-color 0.2s;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--acc);
}
input::placeholder, textarea::placeholder { color: var(--t3); }

button {
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
  transition: all 0.15s ease;
}
button:active { opacity: 0.7; transform: scale(0.97); }

/* ── Typography ──────────────────────────────────────────────────── */
.font-display { font-family: 'Cinzel', serif; font-weight: 700; }
.text-gold { color: var(--gold); }
.text-muted { color: var(--t2); }
.text-dim { color: var(--t3); }
.text-xs { font-size: 10px; }
.text-sm { font-size: 12px; }
.text-md { font-size: 14px; }
.text-upper { text-transform: uppercase; letter-spacing: 1.5px; }

/* ── Layout Shell ────────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  position: relative;
}

.top-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--bd);
  padding-top: max(12px, var(--safe-top));
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  transform: translateY(0);
  transition: transform 0.18s ease-out, opacity 0.15s ease-out;
}
.top-bar.immersive-hide {
  transform: translateY(-100%);
  opacity: 0;
  pointer-events: none;
}

.content-area {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.bottom-nav {
  background: var(--bg2);
  border-top: 1px solid var(--bd);
  padding-bottom: max(6px, var(--safe-bottom));
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  transform: translateY(0);
  transition: transform 0.18s ease-out, opacity 0.15s ease-out;
}
.bottom-nav.immersive-hide,
.bottom-nav.hidden {
  transform: translateY(100%);
  opacity: 0;
  pointer-events: none;
}

.bottom-nav button {
  padding: 7px 0 5px;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 5px;
  font-size: 12px;
  color: var(--t3);
  font-weight: 400;
  transition: color 0.15s;
}
.bottom-nav button.active { color: var(--acc); font-weight: 600; }
.bottom-nav button.active svg { stroke-width: 2.5; }
.bottom-nav .badge {
  font-size: 9px;
  background: var(--bd);
  color: var(--t3);
  border-radius: 8px;
  padding: 1px 5px;
  margin-left: 0px;
}
.bottom-nav button.active .badge { background: var(--acc); color: var(--bg); }

/* ── Header ──────────────────────────────────────────────────────── */
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px 12px;
}

.logo-group {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  object-fit: cover;
}
.logo-title {
  font-size: 16px;
  letter-spacing: 0.5px;
}
.logo-subtitle {
  font-size: 9px;
  letter-spacing: 2px;
}

.header-actions {
  display: flex;
  gap: 4px;
}

.icon-btn {
  width: 38px; height: 38px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--bd);
  background: var(--bg3);
  color: var(--t2);
  display: flex;
  align-items: center;
  justify-content: center;
}
.icon-btn:hover { border-color: var(--acc); color: var(--acc); }
.icon-btn.syncing { animation: spin 1s linear infinite; }
.icon-btn.sync-ok { border-color: var(--gn); color: var(--gn); }
.icon-btn.sync-err { border-color: var(--rd); color: var(--rd); }

@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* ── Search Bar ──────────────────────────────────────────────────── */
.search-bar-wrap {
  overflow: hidden;
  transition: max-height 0.25s ease, opacity 0.2s ease;
  max-height: 80px;
  opacity: 1;
}
.search-bar-wrap.hidden {
  max-height: 0;
  opacity: 0;
  pointer-events: none;
}
.search-row {
  padding: 0 16px 12px;
  display: flex;
  gap: 8px;
  align-items: center;
}

.search-wrap {
  flex: 1;
  position: relative;
}
.search-wrap .search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--t3); pointer-events: none;
}
.search-wrap input {
  padding: 11px 36px 11px 38px;
  border-radius: 12px;
  font-size: 15px;
}
.search-clear {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--t3);
  padding: 4px;
}

.filter-btn, .sort-btn {
  padding: 11px 14px;
  border-radius: 12px;
  border: 1px solid var(--bd);
  background: var(--bg3);
  color: var(--t2);
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
}
.filter-btn.active { border-color: var(--acc); background: color-mix(in srgb, var(--acc) 12%, transparent); color: var(--acc); }
.filter-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--acc);
  display: inline-block;
}

.sort-label { font-size: 11px; color: var(--t3); }

/* ── Breadcrumb ──────────────────────────────────────────────────── */
.breadcrumb {
  padding: 0 16px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 13px;
}
.breadcrumb button {
  color: var(--t2);
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  font-family: 'Cinzel', serif;
  font-weight: 700;
  padding: 2px 0;
}
.breadcrumb .sep { color: var(--t3); }
.breadcrumb .current {
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 14px;
}
.breadcrumb .crumb-link {
  font-family: 'Cinzel', serif;
  font-weight: 700;
}

/* ── Stats Bar ───────────────────────────────────────────────────── */
.stats-bar {
  padding: 12px 16px 4px;
}
.stats-segments {
  height: 8px; border-radius: 4px;
  background: var(--bg3);
  display: flex; overflow: hidden;
  margin-bottom: 8px;
  border: 1px solid var(--bd);
}
.stats-segments .seg {
  height: 100%;
  transition: width 0.4s ease;
}
.stats-segments .seg.owned { background: var(--gn); }
.stats-segments .seg.wishlist { background: var(--bl); }
.stats-segments .seg.ordered { background: var(--or); }
.stats-segments .seg.for-sale { background: var(--rd); }
.stats-legend {
  display: flex; gap: 12px; flex-wrap: wrap;
  font-size: 11px; color: var(--t2);
}
.stats-legend .stat-item {
  display: flex; align-items: center; gap: 4px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 6px;
  transition: background 0.15s;
}
.stats-legend .stat-item:active {
  background: color-mix(in srgb, var(--acc) 15%, transparent);
}
.stats-legend .stat-dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.stats-legend .stat-dot.owned { background: var(--gn); }
.stats-legend .stat-dot.wishlist { background: var(--bl); }
.stats-legend .stat-dot.ordered { background: var(--or); }
.stats-legend .stat-dot.for-sale { background: var(--rd); }
.stats-legend .stat-dot.unowned { background: var(--bd); }
.stats-legend .stat-val { font-weight: 600; }

/* ── Lines Grid ──────────────────────────────────────────────────── */
.lines-grid {
  padding: 14px 16px 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.line-card {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  border: 1px solid var(--bd);
  aspect-ratio: 3/4;
  cursor: pointer;
  transition: transform 0.2s;
}
.line-card:hover { transform: scale(1.02); }
.line-card img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: top;
}
.line-card .overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,.1) 0%, rgba(0,0,0,.3) 40%, rgba(0,0,0,.85) 100%);
}
.line-card .card-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 12px 12px 14px;
}
.line-card .card-name {
  font-size: 13px; line-height: 1.2;
  color: #fff; margin-bottom: 2px;
  text-shadow: 0 1px 4px rgba(0,0,0,.8);
}
.line-card .card-year { font-size: 10px; color: rgba(255,255,255,.6); margin-bottom: 6px; }
.line-card .progress-bar {
  height: 2px; background: rgba(255,255,255,.2);
  border-radius: 2px; overflow: hidden; margin-bottom: 4px;
}
.line-card .progress-fill {
  height: 100%; border-radius: 2px;
  background: var(--gold);
  transition: width 0.4s;
}
.line-card .progress-fill.complete { background: var(--gn); }
.line-card .card-stats { font-size: 10px; color: rgba(255,255,255,.7); font-weight: 600; }
.line-card .card-stats.complete { color: var(--gn); }

.reorder-toggle {
  display: flex;
  justify-content: flex-end;
  padding: 0 16px 8px;
  position: sticky;
  top: 0;
  z-index: 5;
  background: var(--bg);
  padding-top: 8px;
}
.reorder-toggle button {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 8px;
  border: 1px solid var(--bd);
  color: var(--t3); font-size: 11px;
  transition: all 0.15s;
}
.reorder-toggle button.active {
  border-color: var(--acc);
  background: color-mix(in srgb, var(--acc) 12%, transparent);
  color: var(--acc);
}

/* ── Reorder List ────────────────────────────────────────────────── */
.reorder-list {
  padding: 0 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.reorder-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: var(--radius);
}
.reorder-arrows {
  display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;
}
.reorder-arrows button {
  width: 28px; height: 28px;
  border-radius: 7px;
  border: 1px solid var(--bd);
  background: var(--bg3);
  color: var(--t1);
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}
.reorder-arrows button:disabled { color: color-mix(in srgb, var(--t3) 30%, transparent); cursor: default; }

/* ── Subline Cards ───────────────────────────────────────────────── */
.subline-list {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.subline-card {
  padding: 18px 20px;
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 16px;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.15s;
  width: 100%;
}
.subline-card:hover { border-color: var(--acc); }
.subline-card.all-card {
  background: var(--bg3);
  border-width: 2px;
}

.subline-ring { flex-shrink: 0; }
.subline-info { flex: 1; min-width: 0; }
.subline-name {
  font-family: 'Cinzel', serif;
  font-size: 15px; font-weight: 700;
  color: var(--t1); margin-bottom: 4px;
}
.subline-card.all-card .subline-name { color: var(--gold); }
.subline-stats { font-size: 12px; color: var(--t3); }
.subline-progress {
  height: 3px; background: var(--bd);
  border-radius: 2px; margin-top: 8px;
  overflow: hidden;
}
.subline-progress-fill {
  height: 100%; border-radius: 2px;
  background: var(--acc);
  transition: width 0.4s;
}
.subline-progress-fill.complete { background: var(--gn); }
.subline-arrow { flex-shrink: 0; color: var(--t3); }

/* ── Figure List ─────────────────────────────────────────────────── */
.fig-list { padding: 12px 12px 0; }
.fig-count { font-size: 11px; color: var(--t3); margin-bottom: 8px; padding-left: 4px; }

.fig-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 4px;
  border-bottom: 1px solid color-mix(in srgb, var(--bd) 15%, transparent);
  cursor: pointer;
  transition: background 0.1s;
}
.fig-row:hover { background: color-mix(in srgb, var(--bg3) 50%, transparent); }

.fig-thumb {
  width: 56px; height: 56px;
  border-radius: var(--radius-sm);
  background: var(--bg3);
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--bd);
}
.fig-thumb.owned { border-color: var(--gn); }
.fig-thumb.wishlist { border-color: var(--bl); }
.fig-thumb.ordered { border-color: var(--or); }
.fig-thumb.for-sale { border-color: var(--rd); }
.fig-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.fig-thumb .initial {
  font-family: 'Cinzel', serif;
  font-size: 20px; color: var(--t3); font-weight: 700;
}

.fig-text { flex: 1; min-width: 0; }
.fig-name {
  font-size: 14px; font-weight: 600;
  color: var(--t1); line-height: 1.3;
  margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.fig-meta {
  font-size: 11px; color: var(--t3);
  display: flex; gap: 6px; flex-wrap: wrap;
}
.fig-meta .line-name { color: var(--acc); font-weight: 600; }

.fig-actions { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.fig-var-badge { font-size: 9px; font-weight: 700; color: var(--gold); letter-spacing: 0.5px; }
.fig-status-dot { width: 10px; height: 10px; border-radius: 50%; }
.fig-status-dot.owned { background: var(--gn); }
.fig-status-dot.wishlist { background: var(--bl); }
.fig-status-dot.ordered { background: var(--or); }
.fig-status-dot.for-sale { background: var(--rd); }

.quick-own {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--bd);
  background: var(--bg3);
  color: var(--t3);
  display: flex; align-items: center; justify-content: center;
}

/* ── View Toggle ────────────────────────────────────────────────── */
.view-toggle {
  display: flex; gap: 4px;
}
.view-toggle button {
  width: 32px; height: 32px; border-radius: 8px;
  border: 1px solid var(--bd); background: var(--bg3);
  color: var(--t3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-family: 'Outfit', sans-serif;
}
.view-toggle button:active { opacity: 0.7; transform: scale(0.97); }
.view-toggle button.active {
  border-color: var(--acc);
  background: color-mix(in srgb, var(--acc) 12%, transparent);
  color: var(--acc);
}

/* ── Figure Grid ────────────────────────────────────────────────── */
.fig-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 0 12px;
}
.fig-card {
  position: relative; border-radius: var(--radius);
  overflow: hidden; border: 2px solid var(--bd);
  background: var(--bg3); aspect-ratio: 3/4;
  cursor: pointer; transition: transform 0.15s;
}
.fig-card:active { transform: scale(0.97); }
.fig-card.owned { border-color: var(--gn); }
.fig-card.wishlist { border-color: var(--bl); }
.fig-card.ordered { border-color: var(--or); }
.fig-card.for-sale { border-color: var(--rd); }

.fig-card img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: top;
}
.fig-card .card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,.85) 100%);
}
.fig-card .card-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 10px;
}
.fig-card .card-fig-name {
  font-size: 12px; font-weight: 600; color: #fff;
  line-height: 1.3; margin-bottom: 2px;
  text-shadow: 0 1px 4px rgba(0,0,0,.8);
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.fig-card .card-fig-meta {
  font-size: 9px; color: rgba(255,255,255,.6);
}
.fig-card .card-initial {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif; font-size: 36px;
  color: var(--t3); font-weight: 900;
}
.fig-card .status-badge {
  position: absolute; top: 8px; right: 8px;
  width: 26px; height: 26px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,.15);
  background: rgba(0,0,0,.5);
  z-index: 2;
}
.fig-card .status-badge.owned { background: rgba(52,211,153,.25); border-color: rgba(52,211,153,.4); }
.fig-card .status-badge.wishlist { background: rgba(96,165,250,.25); border-color: rgba(96,165,250,.4); }
.fig-card .status-badge.ordered { background: rgba(251,146,60,.25); border-color: rgba(251,146,60,.4); }
.fig-card .status-badge.for-sale { background: rgba(248,113,113,.25); border-color: rgba(248,113,113,.4); }
.fig-card .new-badge {
  position: absolute; top: 8px; left: 8px;
  font-size: 9px; font-weight: 700; color: var(--acc);
  letter-spacing: 0.5px; background: rgba(0,0,0,.6);
  padding: 2px 6px; border-radius: 4px;
  backdrop-filter: blur(4px);
}

/* ── Empty State ─────────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--t3);
}
.empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
.empty-state .title {
  font-family: 'Cinzel', serif;
  font-size: 16px; color: var(--t2); margin-bottom: 4px;
}

/* ── Figure Detail ───────────────────────────────────────────────── */
.detail-header {
  padding: 16px 16px 12px;
  padding-top: max(16px, var(--safe-top));
  background: var(--bg2);
  border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; gap: 12px;
}
.detail-title {
  flex: 1;
  font-family: 'Cinzel', serif;
  font-size: 15px; font-weight: 700;
  color: var(--t1); line-height: 1.3;
}
.detail-back, .detail-delete {
  padding: 8px; border-radius: 8px;
}
.detail-back { color: var(--t1); }
.detail-delete { color: var(--rd); }

.detail-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

.photo-section {
  position: relative;
  background: var(--bg3);
}
.photo-container {
  aspect-ratio: 1;
  max-height: 320px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.photo-container img { width: 100%; height: 100%; object-fit: contain; }
.photo-container .initial-large {
  font-family: 'Cinzel', serif;
  font-size: 72px; color: var(--t3); font-weight: 900;
}

/* Multi-photo carousel */
.photo-carousel {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  background: var(--bg3);
}
.photo-carousel::-webkit-scrollbar { display: none; }
.photo-slide {
  position: relative;
  flex: 0 0 100%;
  scroll-snap-align: start;
  aspect-ratio: 1;
  max-height: 360px;
  display: flex; align-items: center; justify-content: center;
  cursor: zoom-in;
}
.photo-slide img {
  width: 100%; height: 100%;
  object-fit: contain;
}
.photo-slide-label {
  position: absolute; bottom: 12px; left: 12px;
  background: rgba(0,0,0,.7); color: #fff;
  padding: 4px 10px; border-radius: 8px;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase;
  backdrop-filter: blur(4px);
}
.photo-slide-remove {
  position: absolute; top: 10px; right: 10px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(0,0,0,.6); color: var(--rd);
  border: 1px solid rgba(248,113,113,.4);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px); cursor: pointer;
}
.photo-slide-default {
  position: absolute; top: 10px; left: 10px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(0,0,0,.6); color: rgba(255,255,255,.4);
  border: 1px solid rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px); cursor: pointer;
  font-size: 16px; line-height: 1;
}
.photo-slide-default.active {
  color: var(--gold);
  border-color: color-mix(in srgb, var(--gold) 50%, transparent);
  text-shadow: 0 0 8px var(--gold);
}
.photo-dots {
  display: flex; justify-content: center; gap: 6px;
  padding: 10px 0 4px;
  background: var(--bg3);
}
.photo-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--bd);
  transition: all 0.2s;
}
.photo-dot.active { background: var(--gold); width: 18px; border-radius: 3px; }

.photo-controls {
  position: absolute; bottom: 10px; right: 10px;
  display: flex; gap: 8px;
  z-index: 5;
}
.photo-btn {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  background: rgba(0,0,0,.7);
  border: 1px solid rgba(255,255,255,.15);
  color: #fff; font-size: 12px;
  display: flex; align-items: center; gap: 6px;
  backdrop-filter: blur(4px); cursor: pointer;
}
.photo-btn.remove {
  border-color: rgba(248,113,113,.4);
  color: var(--rd);
}

.photo-labels {
  padding: 12px 16px;
  display: flex; flex-direction: column; gap: 6px;
}
.photo-label-row {
  display: flex; align-items: center; gap: 8px;
}
.photo-label-num {
  font-size: 11px; color: var(--t3); font-weight: 600;
  width: 24px; flex-shrink: 0;
}
.photo-label-row input {
  flex: 1; font-size: 13px;
  padding: 8px 12px;
}

/* Full-screen photo viewer */
.photo-viewer {
  position: fixed; inset: 0;
  z-index: 1000;
  background: rgba(0,0,0,.92);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: fadeIn 0.18s ease-out;
}
.photo-viewer-img-wrap {
  position: relative;
  max-width: 100%; max-height: 100%;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
.photo-viewer-img-wrap img {
  max-width: 100%; max-height: 90vh;
  object-fit: contain;
  border-radius: 8px;
}
.photo-viewer-close {
  position: absolute; top: max(16px, var(--safe-top));
  right: 16px;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,.1); color: #fff;
  border: 1px solid rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; backdrop-filter: blur(8px);
  z-index: 2;
}
.photo-viewer-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 48px; height: 48px; border-radius: 50%;
  background: rgba(255,255,255,.1); color: #fff;
  border: 1px solid rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; backdrop-filter: blur(8px);
}
.photo-viewer-nav.prev { left: 12px; }
.photo-viewer-nav.next { right: 12px; }
.photo-viewer-label {
  margin-top: 12px; padding: 6px 14px;
  background: rgba(255,255,255,.1); color: #fff;
  border-radius: 8px; font-size: 13px; font-weight: 600;
  letter-spacing: 0.5px;
  backdrop-filter: blur(8px);
}
.photo-viewer-counter {
  position: absolute; bottom: 16px; left: 50%;
  transform: translateX(-50%);
  font-size: 12px; color: rgba(255,255,255,.7);
  background: rgba(0,0,0,.4); padding: 4px 10px;
  border-radius: 12px; backdrop-filter: blur(4px);
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.detail-pills {
  padding: 16px;
  display: flex; flex-wrap: wrap; gap: 8px;
}
.pill {
  padding: 5px 12px;
  border-radius: 20px;
  background: var(--bg3);
  border: 1px solid var(--bd);
  font-size: 12px; color: var(--t2);
}

.detail-retail {
  padding: 0 16px 16px;
  font-size: 14px; color: var(--t2);
}
.detail-retail .price { color: var(--gold); font-weight: 600; }

.status-grid {
  padding: 0 16px 16px;
}
.status-grid .label {
  font-size: 11px; color: var(--t3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 10px;
}
.status-grid .grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.status-btn {
  padding: 14px 8px;
  border-radius: 12px;
  border: 2px solid var(--bd);
  background: var(--bg2);
  color: var(--t2);
  font-size: 14px; font-weight: 600;
  transition: all 0.15s;
}
.status-btn.active { background: color-mix(in srgb, var(--status-color) 12%, transparent); border-color: var(--status-color); color: var(--status-color); }

.detail-fields {
  padding: 0 16px 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.detail-fields .field-label {
  font-size: 12px; color: var(--t3); margin-bottom: 4px;
}
.detail-fields .field-hint {
  font-size: 10px; color: var(--t3); margin-top: 4px;
}

/* ── Bottom Sheet ────────────────────────────────────────────────── */
.sheet-overlay {
  position: absolute; inset: 0;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.sheet-overlay.visible { opacity: 1; pointer-events: auto; }
.sheet-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(4px);
}
.sheet-panel {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  border: 1px solid var(--bd);
  padding-bottom: max(20px, var(--safe-bottom));
  max-height: 85%;
  overflow: hidden;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
.sheet-overlay.visible .sheet-panel { transform: translateY(0); }

.sheet-handle {
  padding: 12px 20px 0;
  display: flex; justify-content: center;
}
.sheet-handle-bar {
  width: 36px; height: 4px;
  border-radius: 2px; background: var(--bd);
  margin-bottom: 12px;
}
.sheet-header {
  padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-shrink: 0;
}
.sheet-title {
  font-family: 'Cinzel', serif;
  font-size: 16px; font-weight: 700; color: var(--gold);
}
.sheet-close { color: var(--t3); padding: 4px; }
.sheet-body {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  flex: 1;
  padding: 0 20px 20px;
}

/* ── Filter/Sort Sheet Buttons ───────────────────────────────────── */
.chip-group {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
}
.chip {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--bd);
  background: var(--bg3);
  color: var(--t2);
  font-size: 13px;
}
.chip.active {
  border-color: var(--acc);
  background: color-mix(in srgb, var(--acc) 12%, transparent);
  color: var(--acc);
}

.sort-option {
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid var(--bd);
  background: var(--bg3);
  color: var(--t1);
  font-size: 15px;
  text-align: left;
  display: flex; align-items: center; justify-content: space-between;
  width: 100%;
  margin-bottom: 4px;
}
.sort-option.active {
  border-color: var(--acc);
  background: color-mix(in srgb, var(--acc) 12%, transparent);
  color: var(--acc);
}

/* ── Theme Picker ────────────────────────────────────────────────── */
.theme-option {
  padding: 16px;
  border-radius: var(--radius);
  border: 2px solid var(--bd);
  cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  text-align: left;
  width: 100%;
  margin-bottom: 10px;
  transition: all 0.15s;
}
.theme-option .swatch {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
}

/* ── Import Sheet ────────────────────────────────────────────────── */
.drop-zone {
  border: 2px dashed var(--bd);
  border-radius: 16px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
}
.drop-zone.dragover {
  border-color: var(--acc);
  background: color-mix(in srgb, var(--acc) 6%, transparent);
}
.overwrite-toggle {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  background: var(--bg3);
  border-radius: 12px;
  margin-bottom: 16px;
  cursor: pointer;
}
.checkbox {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: 2px solid var(--bd);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.checkbox.checked {
  border-color: var(--acc);
  background: var(--acc);
}
.checkbox span { display: none; }
.checkbox.checked span { display: flex; }

.clear-all-btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid var(--rd);
  background: color-mix(in srgb, var(--rd) 8%, transparent);
  color: var(--rd);
  font-size: 15px;
  font-weight: 600;
}

/* ── Loading Screen ──────────────────────────────────────────────── */
/* ── Splash Screen ───────────────────────────────────────────────── */
.splash {
  position: fixed; inset: 0; z-index: 9999;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  perspective: 800px;
}
.splash-logo {
  width: 280px; max-width: 70vw;
  animation: splashZoom 1.8s cubic-bezier(0.22,1,0.36,1) forwards;
  filter: drop-shadow(0 0 40px rgba(255,204,51,.5));
}
.splash.fade-out {
  animation: splashFade 0.4s ease-out forwards;
}
@keyframes splashZoom {
  0%   { transform: scale(0) rotateY(-30deg); opacity: 0; }
  30%  { transform: scale(1.15) rotateY(5deg); opacity: 1; }
  50%  { transform: scale(1) rotateY(0deg); opacity: 1; }
  70%  { transform: scale(1) rotateY(0deg); opacity: 1; }
  100% { transform: scale(8) rotateY(0deg) translateZ(200px); opacity: 0; }
}
@keyframes splashFade {
  to { opacity: 0; pointer-events: none; }
}

.loading-screen {
  height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg);
  padding: 32px;
}
.loading-name {
  font-size: 13px; letter-spacing: 3px;
  color: var(--t3);
  font-family: 'Cinzel', serif;
  margin-bottom: 32px;
}
.loading-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--bd);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
.loading-text { font-size: 12px; color: var(--t3); letter-spacing: 1px; }

.retry-btn {
  padding: 12px 32px;
  border-radius: 12px;
  border: 1px solid var(--rd);
  background: color-mix(in srgb, var(--rd) 8%, transparent);
  color: var(--rd);
  font-size: 14px; font-weight: 600;
}

/* ── Pull to Refresh ─────────────────────────────────────────────── */
.ptr-indicator {
  text-align: center; padding: 12px 0;
  font-size: 11px; color: var(--t3);
  letter-spacing: 1px;
  transition: opacity 0.2s;
}
.ptr-indicator .ptr-spinner {
  display: inline-block; width: 18px; height: 18px;
  border: 2px solid var(--bd); border-top-color: var(--gold);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  vertical-align: middle; margin-right: 6px;
}

/* ── Select Mode ─────────────────────────────────────────────────── */
.select-btn {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--t2);
  padding: 6px 10px; border-radius: 8px;
  border: 1px solid var(--bd); background: var(--bg3);
  cursor: pointer;
}
.select-btn.active {
  border-color: var(--acc);
  background: color-mix(in srgb, var(--acc) 12%, transparent);
  color: var(--acc);
}

.select-checkbox {
  width: 22px; height: 22px; border-radius: 6px;
  border: 2px solid var(--bd);
  background: rgba(0,0,0,.3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.select-checkbox.checked {
  background: var(--acc);
  border-color: var(--acc);
}
.select-checkbox svg { opacity: 0; transition: opacity 0.15s; color: #fff; }
.select-checkbox.checked svg { opacity: 1; }

.fig-row.selected {
  background: color-mix(in srgb, var(--acc) 10%, transparent);
}
.fig-card.selected {
  outline: 3px solid var(--acc);
  outline-offset: -3px;
}
.fig-card .select-checkbox-corner {
  position: absolute; top: 8px; left: 8px;
  z-index: 3;
}

.select-actionbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 20;
  background: var(--bg2);
  border-top: 1px solid var(--acc);
  padding: 10px 12px;
  padding-bottom: max(10px, var(--safe-bottom));
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 -6px 20px rgba(0,0,0,.4);
  transform: translateY(100%);
  transition: transform 0.22s cubic-bezier(0.2,0,0,1);
}
.select-actionbar.visible { transform: translateY(0); }
.select-actionbar .count {
  font-size: 14px; font-weight: 700; color: var(--gold);
  flex-shrink: 0; min-width: 20px; text-align: center;
}
.select-actionbar-scroll {
  display: flex; gap: 6px; flex: 1;
  overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.select-actionbar-scroll::-webkit-scrollbar { display: none; }
.select-actionbar button {
  padding: 8px 12px; border-radius: 10px;
  border: 1px solid var(--bd); background: var(--bg3);
  color: var(--t1); font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  display: flex; align-items: center; gap: 4px;
}
.select-actionbar button:active { opacity: 0.7; transform: scale(0.95); }
.select-actionbar button:disabled { opacity: 0.3; pointer-events: none; }
.select-actionbar button.danger {
  color: var(--rd); border-color: color-mix(in srgb, var(--rd) 30%, var(--bd));
}

/* ── Offline Banner ──────────────────────────────────────────────── */
.offline-banner {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  background: var(--rd);
  color: #fff;
  padding: 6px 16px;
  padding-top: max(6px, var(--safe-top));
  font-size: 12px; font-weight: 600;
  text-align: center; letter-spacing: 0.5px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transform: translateY(-100%);
  transition: transform 0.25s ease-out;
  pointer-events: none;
}
.offline-banner.visible {
  transform: translateY(0);
}
.icon-btn.offline {
  opacity: 0.4;
  cursor: not-allowed;
}

/* ── Toast Notifications ─────────────────────────────────────────── */
.toast-container {
  position: fixed; bottom: 70px; left: 0; right: 0;
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; z-index: 300; pointer-events: none;
  padding-bottom: var(--safe-bottom);
}
.toast {
  background: var(--bg2); border: 1px solid var(--bd);
  border-radius: 12px; padding: 10px 18px;
  font-size: 13px; color: var(--t1); font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
  backdrop-filter: blur(8px);
  animation: toastIn 0.25s ease-out, toastOut 0.3s ease-in 1.7s forwards;
  pointer-events: auto;
}
@keyframes toastIn { from { opacity: 0; transform: translateY(16px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-8px); } }

/* ── Animations ──────────────────────────────────────────────────── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ── Spacers ─────────────────────────────────────────────────────── */
.bottom-spacer { height: calc(48px + var(--safe-bottom)); }
.detail-spacer { height: calc(32px + var(--safe-bottom)); }

/* ── Status Pulse Animation ──────────────────────────────────────── */
@keyframes statusPulse {
  0% { transform: scale(1); box-shadow: 0 0 0 0 var(--pulse-color, rgba(255,255,255,.4)); }
  40% { transform: scale(1.25); box-shadow: 0 0 0 8px transparent; }
  100% { transform: scale(1); box-shadow: 0 0 0 0 transparent; }
}
.status-badge.pulsing, .quick-own.pulsing {
  animation: statusPulse 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
}

/* ── Long-Press Context Menu ─────────────────────────────────────── */
.ctx-menu-overlay {
  position: fixed; inset: 0; z-index: 250;
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(4px);
  opacity: 0;
  animation: ctxFadeIn 0.15s ease-out forwards;
}
@keyframes ctxFadeIn { to { opacity: 1; } }
.ctx-menu {
  position: fixed; z-index: 251;
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 16px;
  min-width: 200px;
  max-width: 260px;
  box-shadow: 0 12px 40px rgba(0,0,0,.6);
  overflow: hidden;
  transform-origin: top center;
  animation: ctxSlideIn 0.18s cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes ctxSlideIn {
  from { opacity: 0; transform: scale(0.9) translateY(-4px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.ctx-menu-header {
  padding: 12px 16px 8px;
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--gold);
  border-bottom: 1px solid var(--bd);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ctx-menu-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px;
  font-size: 14px;
  color: var(--t1);
  border: none; background: none;
  width: 100%;
  text-align: left;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: background 0.1s;
}
.ctx-menu-item:active { background: color-mix(in srgb, var(--acc) 12%, transparent); }
.ctx-menu-item.active { color: var(--acc); font-weight: 600; }
.ctx-menu-item .ctx-dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0;
}
.ctx-menu-sep {
  height: 1px; background: var(--bd); margin: 0;
}

/* ── Completion Celebration ──────────────────────────────────────── */
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(120vh) rotate(720deg); opacity: 0; }
}
.confetti-container {
  position: fixed; inset: 0; z-index: 999;
  pointer-events: none; overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 8px; height: 8px;
  top: -10px;
  animation: confettiFall linear forwards;
}
@keyframes goldGlow {
  0% { box-shadow: 0 0 0 0 rgba(212,168,67,.6); }
  50% { box-shadow: 0 0 20px 4px rgba(212,168,67,.3); }
  100% { box-shadow: 0 0 0 0 rgba(212,168,67,0); }
}
.line-card.celebrating, .subline-card.celebrating {
  animation: goldGlow 1.2s ease-out;
}

/* ── Skeleton Loading ────────────────────────────────────────────── */
@keyframes shimmer {
  0% { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
.skeleton-grid {
  padding: 14px 16px 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.skeleton-card {
  border-radius: 18px;
  aspect-ratio: 3/4;

// ─── Storage ──────────────────────────────────────────────────────
let _quotaWarned = false;
const store = {
  get: k => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => {
    try { localStorage.setItem(k, JSON.stringify(v)); return true; }
    catch(e) {
      const quota = e && (e.name === 'QuotaExceededError' || e.code === 22 || /quota/i.test(e.message||''));
      if (quota && !_quotaWarned) {
        _quotaWarned = true;
        // toast is defined later; guarded in case of early failure
        try { toast('✗ Storage full — changes may not persist'); } catch {}

};

// ─── Photo Storage (OPFS, multi-photo with labels) ──────────────
// Per figure: up to MAX_PHOTOS photos, each with optional label.
// OPFS filename: photo-{figId}-{n}.jpg  (n = 0..MAX_PHOTOS-1)
// Labels stored separately in localStorage: { [figId]: { [n]: label } }
const MAX_PHOTOS = 8;
const PHOTO_LABELS_KEY = 'motu-photo-labels';
const photoURLs = {};   // { "figId-n": objectURL }
let _opfsDir = null;
let _opfsReady = false;
let _photoLabels = {};  // { [figId]: { [n]: label } }

async function initOPFS() {
  try {
    if (!navigator.storage?.getDirectory) return false;
    _opfsDir = await navigator.storage.getDirectory();
    _opfsReady = true;
    return true;
  } catch { return false; }
}

function loadPhotoLabels() {
  try { _photoLabels = JSON.parse(localStorage.getItem(PHOTO_LABELS_KEY) || '{}'); } catch { _photoLabels = {}; }
}
function savePhotoLabels() {
  try { localStorage.setItem(PHOTO_LABELS_KEY, JSON.stringify(_photoLabels)); } catch {}
}

const photoStore = {
  // Sync: get primary (first) photo URL for a figure — used in list/grid thumbnails
  // Sync: get primary photo URL for list/grid thumbnails
  // Returns null if default is stock image (n=-1) so renderer falls through to f.image
  get: id => {
    const defN = S.defaultPhoto?.[id];
    if (defN === -1) return null;  // user chose stock as default
    const arr = S.customPhotos[id];
    if (!arr || !arr.length) return null;
    const targetN = defN != null ? defN : arr[0].n;
    return photoURLs[id + '-' + targetN] || photoURLs[id + '-' + arr[0].n] || null;
  },

  // Sync: get all photos for a figure — { url, label, n }[]
  getAll: id => {
    const arr = S.customPhotos[id] || [];
    return arr.map(({n, label}) => ({
      n, label: label || '',
      url: photoURLs[id + '-' + n] || null,
    })).filter(p => p.url);
  },

  // Async: add a new photo to a figure. Returns index (n) on success, -1 on failure.
  add: async (id, blob, label = '') => {
    try {
      const existing = S.customPhotos[id] || [];
      if (existing.length >= MAX_PHOTOS) return -1;
      // Find first free slot n
      const used = new Set(existing.map(p => p.n));
      let n = 0;
      while (used.has(n) && n < MAX_PHOTOS) n++;
      if (n >= MAX_PHOTOS) return -1;

      if (_opfsReady) {
        const fh = await _opfsDir.getFileHandle(`photo-${id}-${n}.jpg`, {create: true});
        const writable = await fh.createWritable();
        await writable.write(blob);
        await writable.close();
        const key = id + '-' + n;
        if (photoURLs[key]) URL.revokeObjectURL(photoURLs[key]);
        photoURLs[key] = URL.createObjectURL(blob);
      } else {
        // Fallback: localStorage base64
        const dataUrl = await new Promise((res, rej) => {
          const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(blob);
        });
        try { localStorage.setItem(`motu-photo-${id}-${n}`, dataUrl); }
        catch { return -1; }
        photoURLs[id + '-' + n] = dataUrl;
      }

      // Update state
      const arr = [...(S.customPhotos[id] || []), {n, label}];
      S.customPhotos[id] = arr;
      if (label) {
        if (!_photoLabels[id]) _photoLabels[id] = {};
        _photoLabels[id][n] = label;
        savePhotoLabels();
      }
      return n;
    } catch { return -1; }
  },

  // Async: remove photo at index n for a figure
  remove: async (id, n) => {
    const key = id + '-' + n;
    if (photoURLs[key]) { URL.revokeObjectURL(photoURLs[key]); delete photoURLs[key]; }
    try {
      if (_opfsReady) await _opfsDir.removeEntry(`photo-${id}-${n}.jpg`);
    } catch {}
    try { localStorage.removeItem(`motu-photo-${id}-${n}`); } catch {}
    // Update state
    const arr = (S.customPhotos[id] || []).filter(p => p.n !== n);
    if (arr.length) S.customPhotos[id] = arr;
    else delete S.customPhotos[id];
    // Clean label
    if (_photoLabels[id]) {
      delete _photoLabels[id][n];
      if (!Object.keys(_photoLabels[id]).length) delete _photoLabels[id];
      savePhotoLabels();
    }
  },

  // Async: update label for photo n of figure id
  setLabel: async (id, n, label) => {
    if (!_photoLabels[id]) _photoLabels[id] = {};
    if (label) _photoLabels[id][n] = label;
    else delete _photoLabels[id][n];
    if (!Object.keys(_photoLabels[id]).length) delete _photoLabels[id];
    savePhotoLabels();
    const arr = S.customPhotos[id] || [];
    const idx = arr.findIndex(p => p.n === n);
    if (idx >= 0) arr[idx] = {...arr[idx], label};
  },

  // Delete all photos for a figure (used by clearPhoto legacy API)
  delAll: async id => {
    const arr = [...(S.customPhotos[id] || [])];
    for (const p of arr) await photoStore.remove(id, p.n);
  },

  // Load all photos into URL cache (called during init)
  loadAll: async () => {
    loadPhotoLabels();
    // Parse filename: photo-{figId}-{n}.jpg
    // Note: figId itself may contain hyphens, so we must match -{digit}.jpg at the end
    const parsePhotoName = name => {
      if (!name.startsWith('photo-') || !name.endsWith('.jpg')) return null;
      const core = name.slice(6, -4);
      const m = core.match(/^(.+)-(\d+)$/);
      if (!m) return null;
      return {id: m[1], n: parseInt(m[2], 10)};
    };

    const buckets = {};  // { figId: [{n, url}, ...] }

    if (_opfsReady) {
      try {
        for await (const [name, handle] of _opfsDir) {
          if (handle.kind !== 'file') continue;
          const parsed = parsePhotoName(name);
          if (!parsed) continue;
          const file = await handle.getFile();
          photoURLs[parsed.id + '-' + parsed.n] = URL.createObjectURL(file);
          (buckets[parsed.id] = buckets[parsed.id] || []).push(parsed.n);
        }
      } catch(e) { console.error('OPFS loadAll error:', e); }
    }

    // Load localStorage fallback photos (new multi-photo format)
    try {
      const keys = Object.keys(localStorage).filter(k => /^motu-photo-.+-\d+$/.test(k));
      keys.forEach(k => {
        const core = k.slice('motu-photo-'.length);
        const m = core.match(/^(.+)-(\d+)$/);
        if (!m) return;
        const id = m[1], n = parseInt(m[2], 10);
        const cacheKey = id + '-' + n;
        if (!photoURLs[cacheKey]) {
          photoURLs[cacheKey] = localStorage.getItem(k);
          (buckets[id] = buckets[id] || []).push(n);
        }
      });
    } catch {}

    // Populate customPhotos from buckets, sorted by n
    Object.entries(buckets).forEach(([id, ns]) => {
      ns.sort((a, b) => a - b);
      S.customPhotos[id] = ns.map(n => ({n, label: _photoLabels[id]?.[n] || ''}));
    });
  },

  // One-time migration: rename photo-{figId}.jpg → photo-{figId}-0.jpg
  migrateToMulti: async () => {
    if (!_opfsReady) return 0;
    let migrated = 0;
    try {
      const toMigrate = [];
      for await (const [name, handle] of _opfsDir) {
        if (handle.kind !== 'file') continue;
        if (name.startsWith('photo-') && name.endsWith('.jpg')) {
          const core = name.slice(6, -4);
          // If core doesn't end with -digit, it's the old format
          if (!/-\d+$/.test(core)) toMigrate.push({name, id: core});
        }
      }
      for (const {name, id} of toMigrate) {
        try {
          const oldHandle = await _opfsDir.getFileHandle(name);
          const file = await oldHandle.getFile();
          const newHandle = await _opfsDir.getFileHandle(`photo-${id}-0.jpg`, {create: true});
          const writable = await newHandle.createWritable();
          await writable.write(await file.arrayBuffer());
          await writable.close();
          await _opfsDir.removeEntry(name);
          migrated++;
        } catch(e) { console.error('Migration failed for ' + name, e); }
      }
    } catch {}
    return migrated;
  },

  // Legacy migration: localStorage old single-photo format → OPFS multi-photo format
  migrateLegacyLS: async () => {
    if (!_opfsReady) return 0;
    let migrated = 0;
    try {
      // Old single-photo format: motu-photo-{figId}  (no trailing -digit)
      const keys = Object.keys(localStorage).filter(k =>
        k.startsWith('motu-photo-') && !/-\d+$/.test(k)
      );
      for (const k of keys) {
        const id = k.slice('motu-photo-'.length);
        const dataUrl = localStorage.getItem(k);
        if (!dataUrl) continue;
        try {
          const res = await fetch(dataUrl);
          const blob = await res.blob();
          const fh = await _opfsDir.getFileHandle(`photo-${id}-0.jpg`, {create: true});
          const writable = await fh.createWritable();
          await writable.write(blob);
          await writable.close();
          photoURLs[id + '-0'] = URL.createObjectURL(blob);
          localStorage.removeItem(k);
          migrated++;
        } catch(e) { console.error('LS migration failed for ' + id, e); }
      }
    } catch {}
    return migrated;
  },

  // Export all photos for a figure as [{label, dataUrl}, ...] (for JSON backup)
  exportAllAsDataURLs: async id => {
    const arr = S.customPhotos[id] || [];
    const result = [];
    for (const {n, label} of arr) {
      const key = id + '-' + n;
      const url = photoURLs[key];
      if (!url) continue;
      try {
        let dataUrl;
        if (url.startsWith('data:')) dataUrl = url;
        else {
          // Object URL — need to fetch blob and read as data URL
          const res = await fetch(url);
          const blob = await res.blob();
          dataUrl = await new Promise((r, rj) => {
            const fr = new FileReader();
            fr.onload = () => r(fr.result);
            fr.onerror = rj;
            fr.readAsDataURL(blob);
          });
        }
        result.push({label: label || '', dataUrl});
      } catch {}
    }
    return result;
  },

  // Import photos for a figure from backup
  importPhotos: async (id, photos) => {
    let count = 0;
    for (const p of photos) {
      try {
        const res = await fetch(p.dataUrl);
        const blob = await res.blob();
        const n = await photoStore.add(id, blob, p.label || '');
        if (n >= 0) count++;
      } catch {}
    }
    return count;
  },
};

// ─── CSV Parser ───────────────────────────────────────────────────
function parseCSV(text) {
  if (text.length > 10000000) throw new Error('File too large');
  const lines = text.split('\n').filter(l => l.trim());
  const parseRow = line => {
    const cols = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += c;
    }
    cols.push(cur); return cols;
  };
  const headers = parseRow(lines[0]).map(h => h.trim());
  const idx = h => headers.indexOf(h);
  const [iGenre,iSeries,iGroup,iName,iWave,iPaid,iCond,iNote,iWhere,iVariation] =
    ['Genre','Series','Group','Name','Wave','Purchase Price','Condition','Note','Where Purchased','Variation Name'].map(idx);
  return lines.slice(1).map(l => {
    const c = parseRow(l);
    const csvGroup = c[iGroup]?.trim() || '';
    return { genre:c[iGenre], series:c[iSeries], name:c[iName]?.trim(),
      group:GROUP_MAP[csvGroup]||csvGroup, wave:c[iWave]?.trim()||'', paid:c[iPaid]?.trim(),
      cond:COND_MAP[c[iCond]?.trim()]||'', note:c[iNote]?.trim(), where:c[iWhere]?.trim(),
      variation:c[iVariation]?.trim()||'' };
  }).filter(r => r.genre === 'Masters of the Universe' && SERIES_MAP[r.series]);
}

// ─── Data Fetching ────────────────────────────────────────────────
async function fetchFigs(manual = false, firstLoad = false) {
  S.syncStatus = 'syncing'; render();
  S.fetchError = false;
  try {
    const res = await fetch(FIGS_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const remote = await res.json();
    if (!Array.isArray(remote) || remote.length < 100) throw new Error('Invalid data');
    // Detect newly added figures
    const prevIds = new Set(S.figs.map(f => f.id));
    const custom = S.figs.filter(f => f.line === 'custom');
    const ids = new Set(remote.map(f => f.id));
    const hydrated = remote.map(f => ({...f, image: f.slug ? `${IMG}/${f.slug}.jpg` : ''}));
    // Only flag as new if we had a previous catalog loaded (not first boot)
    if (prevIds.size > 100) {
      hydrated.forEach(f => { if (!prevIds.has(f.id)) S.newFigIds.add(f.id); });
    }
    S.figs = [...hydrated, ...custom.filter(f => !ids.has(f.id))];
    rebuildFigIndex();
    S.syncTs = Date.now();
    store.set(CACHE_KEY, { rows: S.figs, ts: S.syncTs });
    S.syncStatus = 'ok';
    if (firstLoad) { S.loaded = true; }
    const newCount = S.newFigIds.size;
    if (manual || newCount) toast(`✓ Synced ${S.figs.length} figures${newCount ? ` · ${newCount} new` : ''}`);
    render();
    setTimeout(() => { S.syncStatus = 'idle'; render(); }, 3000);
  } catch(e) {
    console.error('Fetch failed:', e);
    S.syncStatus = manual ? 'err' : 'idle';
    if (manual) {
      // Detect offline vs other error
      const isNetwork = !navigator.onLine || /network|failed to fetch/i.test(e.message);
      if (isNetwork) {
        S.isOffline = !navigator.onLine;
        toast('✗ No connection — using cached data');
      } else {
        toast('✗ Sync failed');
      }
      setTimeout(() => { S.syncStatus = 'idle'; render(); }, 5000);
    }
    if (firstLoad) { S.fetchError = true; render(); }
    else render();
  }
}

// ─── Init ─────────────────────────────────────────────────────────
async function init() {
  // Load collection
  const c = store.get('motu-c2');
  if (c) {
    S.coll = Object.fromEntries(Object.entries(c).map(([id, entry]) => {
      if (entry?.variants !== undefined && !/\w/.test(entry.variants)) {
        const { variants, ...rest } = entry;
        return [id, rest];
      }
      return [id, entry];
    }));
  }
  // Load persisted recent changes
  const rc = store.get('motu-recent');
  if (rc && Array.isArray(rc)) S._recentChanges = rc;
  const dp = store.get('motu-default-photo');
  if (dp && typeof dp === 'object') S.defaultPhoto = dp;
  // Initialize OPFS for photo storage
  await initOPFS();
  // One-time migrations (must run BEFORE loadAll so URL cache is correct)
  if (_opfsReady) {
    const m1 = await photoStore.migrateLegacyLS();     // Old LS single → OPFS
    const m2 = await photoStore.migrateToMulti();      // OPFS single → OPFS multi (photo-{id}.jpg → photo-{id}-0.jpg)
    if (m1 + m2 > 0) console.log(`Photo migrations: ${m1} from localStorage, ${m2} to multi-photo format`);
  }
  // Load all photos into URL cache (OPFS + localStorage fallback)
  await photoStore.loadAll();
  // Load cached figs
  const cached = store.get(CACHE_KEY);
  if (cached?.rows?.length) {
    S.figs = cached.rows.map(f => ({...f, image: f.image || (f.slug ? `${IMG}/${f.slug}.jpg` : '')}));
    rebuildFigIndex();
    S.syncTs = cached.ts;
    S.loaded = true;
  }
  // Apply theme
  document.documentElement.setAttribute('data-theme', S.theme);
  // One-time migration: wave default → year default (v3.9)
  if (S.sortBy === 'wave') { S.sortBy = 'year'; store.set('motu-sort', 'year'); }
  // Fetch if stale
  const hasCache = !!(cached?.rows?.length);
  if (!cached?.ts || Date.now() - cached.ts > CACHE_TTL) fetchFigs(false, !hasCache);
  render();
  // Dismiss splash after animation completes
  const splash = document.getElementById('splash');
  if (splash) {
    setTimeout(() => {
      splash.classList.add('fade-out');
      setTimeout(() => splash.remove(), 500);
    }, 1800);
  }
}

// ─── Toast & Haptic Feedback ─────────────────────────────────────
function toast(msg) {
  let container = document.getElementById('toastContainer');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toastContainer';
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 2200);
}

function haptic(ms = 15) {
  if (navigator.vibrate) navigator.vibrate(ms);
}

// ─── Status Pulse Animation ──────────────────────────────────────
function triggerPulse(id, status) {
  requestAnimationFrame(() => {
    const badge = document.querySelector(`.fig-card[data-fig-id="${id}"] .status-badge`) ||
                  document.querySelector(`.fig-row[data-fig-id="${id}"] .quick-own`);
    if (!badge) return;
    const color = status ? STATUS_HEX[status] : 'rgba(255,255,255,.3)';
    badge.style.setProperty('--pulse-color', color + '66');
    badge.classList.remove('pulsing');
    void badge.offsetWidth; // force reflow
    badge.classList.add('pulsing');
    badge.addEventListener('animationend', () => badge.classList.remove('pulsing'), {once: true});
  });
}

// ─── Undo Toast ──────────────────────────────────────────────────
function toastUndo(msg, figId, prevColl) {
  let container = document.getElementById('toastContainer');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toastContainer';
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  const el = document.createElement('div');

  btn.textContent = 'Undo';
  btn.onclick = () => undoStatus(figId);
  el.appendChild(document.createTextNode(' '));
  el.appendChild(btn);
  // Store the previous state on the element
  el._undoPrev = prevColl;
  el.dataset.figId = figId;
  container.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 3500);
}

window.undoStatus = id => {
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const toastEl = container.querySelector(`[data-fig-id="${id}"]`);
  if (!toastEl || !toastEl._undoPrev) return;
  const prev = toastEl._undoPrev;
  if (prev.status) S.coll[id] = prev;
  else { delete S.coll[id]; }
  saveColl();
  toastEl.remove();
  toast('↩ Undone');
  if (!patchFigRow(id)) render();
};

// ─── Completion Celebrations ─────────────────────────────────────
const _celebrated = store.get('motu-celebrated') || {};

function checkCompletion(fig) {
  // Check line completion
  const lineId = fig.line;
  const lineFigs = S.figs.filter(f => f.line === lineId && !figIsHidden(f));
  const lineOwned = lineFigs.filter(f => S.coll[f.id]?.status === 'owned').length;
  if (lineOwned === lineFigs.length && lineFigs.length > 1 && !_celebrated['line:' + lineId]) {
    _celebrated['line:' + lineId] = true;
    store.set('motu-celebrated', _celebrated);
    celebrateCompletion(ln(lineId) + ' complete!');
    return;
  }
  // Check subline completion
  const subs = SUBLINES[lineId];
  if (subs) {
    for (const sl of subs) {
      if (!sl.groups.includes(fig.group)) continue;
      const key = lineId + ':' + sl.key;
      if (_celebrated['sub:' + key]) continue;
      const slFigs = S.figs.filter(f => f.line === lineId && sl.groups.includes(f.group) && !figIsHidden(f));
      const slOwned = slFigs.filter(f => S.coll[f.id]?.status === 'owned').length;
      if (slOwned === slFigs.length && slFigs.length > 1) {
        _celebrated['sub:' + key] = true;
        store.set('motu-celebrated', _celebrated);
        celebrateCompletion(sl.label + ' complete!');
        return;
      }
    }
  }
}

function celebrateCompletion(label) {
  haptic(50);
  toast('🏆 ' + label);
  spawnConfetti();
}

function spawnConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  const colors = ['#d4a843','#34d399','#8b5cf6','#f87171','#60a5fa','#fb923c','#fbbf24'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const size = 6 + Math.random() * 6;
    piece.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px; height: ${size}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${1.5 + Math.random() * 2}s;
      animation-delay: ${Math.random() * 0.6}s;
    `;
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 4500);
}

// ─── Long-Press Context Menu ─────────────────────────────────────
let _lpTimer = null;
let _lpFigId = null;
let _lpMoved = false;
let _lpFired = false;

function initLongPress(el, figId) {
  el.addEventListener('touchstart', e => {
    if (S.selectMode) return;
    _lpMoved = false;
    _lpFired = false;
    _lpFigId = figId;
    _lpTimer = setTimeout(() => {
      if (!_lpMoved) {
        _lpFired = true;
        haptic(25);
        showContextMenu(figId, e.touches[0].clientX, e.touches[0].clientY);
      }
    }, 500);
  }, {passive: true});
  el.addEventListener('touchmove', () => {
    _lpMoved = true;
    if (_lpTimer) { clearTimeout(_lpTimer); _lpTimer = null; }
  }, {passive: true});
  el.addEventListener('touchend', () => {
    if (_lpTimer) { clearTimeout(_lpTimer); _lpTimer = null; }
  }, {passive: true});
  el.addEventListener('touchcancel', () => {
    if (_lpTimer) { clearTimeout(_lpTimer); _lpTimer = null; }
  }, {passive: true});
  // Prevent tap from firing after long-press
  el.addEventListener('click', e => {
    if (_lpFired) { e.stopPropagation(); e.preventDefault(); _lpFired = false; }
  }, {capture: true});
}

function showContextMenu(figId, x, y) {
  // Prevent the regular tap from firing
  const fig = figById(figId);
  if (!fig) return;
  const c = S.coll[figId] || {};
  dismissContextMenu();
  const overlay = document.createElement('div');
  overlay.className = 'ctx-menu-overlay';
  overlay.id = 'ctxOverlay';
  overlay.onclick = e => { if (e.target === overlay) dismissContextMenu(); };

  const menu = document.createElement('div');
  menu.className = 'ctx-menu';
  // Position: ensure it stays on screen
  const menuW = 230, menuH = 280;
  let left = Math.min(x - 20, window.innerWidth - menuW - 12);
  let top = Math.min(y - 20, window.innerHeight - menuH - 12);
  left = Math.max(12, left);
  top = Math.max(12, top);
  menu.style.left = left + 'px';
  menu.style.top = top + 'px';

  let items = `<div class="ctx-menu-header">${esc(fig.name)}</div>`;
  STATUSES.forEach(s => {
    const active = c.status === s;
    const dotColor = STATUS_HEX[s];
    items += `<button class="ctx-menu-item ${active ? 'active' : ''}" onclick="ctxSetStatus('${figId}','${s}')">
      <span class="ctx-dot" style="background:${dotColor}"></span>
      ${active ? '✓ ' : ''}${STATUS_LABEL[s]}
    </button>`;
  });
  if (c.status) {
    items += `<button class="ctx-menu-item" onclick="ctxSetStatus('${figId}','clear')" style="color:var(--t3)">
      <span class="ctx-dot" style="background:var(--bd)"></span>Clear status
    </button>`;
  }
  items += '<div class="ctx-menu-sep"></div>';
  if (fig.source === 'af411') {
    const qs = encodeURIComponent(fig.name).replace(/'/g, '%27');
    items += `<button class="ctx-menu-item" onclick="dismissContextMenu();window.open('https://www.actionfigure411.com/masters-of-the-universe/search.php?search=${qs}','_blank')">
      ${icon(ICO.export, 16)} View on AF411
    </button>`;
  }
  items += `<button class="ctx-menu-item" onclick="dismissContextMenu();openFig('${figId}')">
    ${icon(ICO.edit, 16)} Open details
  </button>`;
  items += `<button class="ctx-menu-item" onclick="dismissContextMenu();enterSelectModeWith('${figId}')">
    ${icon(ICO.check, 16)} Select
  </button>`;
  menu.innerHTML = items;
  overlay.appendChild(menu);
  document.body.appendChild(overlay);
}

function dismissContextMenu() {
  const el = document.getElementById('ctxOverlay');
  if (el) el.remove();
}

window.ctxSetStatus = (id, status) => {
  dismissContextMenu();
  if (status === 'clear') {
    const prevColl = JSON.parse(JSON.stringify(S.coll[id] || {}));
    if (S.coll[id]) { delete S.coll[id].status; if (!Object.keys(S.coll[id]).length) delete S.coll[id]; }
    saveColl(); haptic();
    S._recentChanges = [id, ...S._recentChanges.filter(x => x !== id)].slice(0, 10);
    store.set('motu-recent', S._recentChanges);
    const fig = figById(id);
    toastUndo(`✗ ${fig ? fig.name : id} cleared`, id, prevColl);
    if (!patchFigRow(id)) render();
  } else {
    setStatus(id, status);
  }
};

// ─── Helpers ──────────────────────────────────────────────────────
let _saveCollTimer = null;
function saveColl() {
  // Debounce localStorage writes (~80ms) to coalesce rapid taps (batch select,
  // fast status cycling, notes typing). In-memory S.coll is always current.
  if (_saveCollTimer) clearTimeout(_saveCollTimer);
  _saveCollTimer = setTimeout(() => { store.set('motu-c2', S.coll); _saveCollTimer = null; }, 80);
}
function flushSaveColl() {
  if (_saveCollTimer) { clearTimeout(_saveCollTimer); _saveCollTimer = null; }
  store.set('motu-c2', S.coll);
}
// Ensure pending writes flush if the app is about to be unloaded or hidden.
window.addEventListener('pagehide', flushSaveColl);
window.addEventListener('beforeunload', flushSaveColl);
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') flushSaveColl(); });

// O(1) figure lookup by id — rebuilt whenever S.figs changes.
let _figById = new Map();
function rebuildFigIndex() {
  _figById = new Map();
  for (const f of S.figs) _figById.set(f.id, f);
}
function figById(id) { return _figById.get(id); }
function toggleHidden(key) {
  const i = S.hiddenItems.indexOf(key);
  if (i >= 0) S.hiddenItems.splice(i, 1);
  else S.hiddenItems.push(key);
  store.set('motu-hidden', S.hiddenItems);
  render();
}
function isLineFullyHidden(lineId) {
  // A line is fully hidden if the line itself is hidden
  return S.hiddenItems.includes(lineId);
}
function isSublineHidden(lineId, subKey) {
  return S.hiddenItems.includes(lineId + ':' + subKey);
}
// Memoized: cache keyed on current hiddenItems signature. Reset whenever
// hiddenItems changes (via toggleHidden) or S.figs size changes.
let _hidCache = null;
let _hidCacheKey = '';
function figIsHidden(f) {
  const key = S.hiddenItems.length ? S.hiddenItems.join('|') : '';
  if (_hidCacheKey !== key) { _hidCache = new Map(); _hidCacheKey = key; }
  const cached = _hidCache.get(f.id);
  if (cached !== undefined) return cached;
  let hidden = false;
  if (isLineFullyHidden(f.line)) hidden = true;
  else {
    const subs = SUBLINES[f.line];
    if (subs) {
      for (const sl of subs) {
        if (sl.groups.includes(f.group) && isSublineHidden(f.line, sl.key)) { hidden = true; break; }
      }
    }
  }
  _hidCache.set(f.id, hidden);
  return hidden;
}
function setStatus(id, status) {
  if (!S.coll[id]) S.coll[id] = {};
  const wasStatus = S.coll[id].status;
  const prevColl = JSON.parse(JSON.stringify(S.coll[id] || {}));
  if (S.coll[id].status === status) { delete S.coll[id].status; if (!Object.keys(S.coll[id]).length) delete S.coll[id]; }
  else S.coll[id] = {...S.coll[id], status};
  saveColl(); haptic();
  S._recentChanges = [id, ...S._recentChanges.filter(x => x !== id)].slice(0, 10);
  store.set('motu-recent', S._recentChanges);
  const fig = figById(id);
  const name = fig ? fig.name : id;
  const newStatus = S.coll[id]?.status;
  if (newStatus) toastUndo(`✓ ${name} → ${STATUS_LABEL[newStatus]}`, id, prevColl);
  else toastUndo(`✗ ${name} cleared`, id, prevColl);
  // Trigger pulse animation on the badge
  triggerPulse(id, newStatus);
  if (!patchFigRow(id)) render();
  // Check completion celebrations
  if (newStatus === 'owned' && fig) checkCompletion(fig);
}

function patchFigRow(id) {
  const c = S.coll[id] || {};
  const statusCls = c.status || '';

  // Try list view row
  const row = document.querySelector(`.fig-row[data-fig-id="${id}"]`);
  if (row) {
    const thumb = row.querySelector('.fig-thumb');
    if (thumb) { thumb.className = 'fig-thumb ' + statusCls; }
    const actions = row.querySelector('.fig-actions');
    if (actions) {
      const hasVar = /\w/.test(c.variants || '');
      const isNew = S.newFigIds.has(id);
      actions.innerHTML =
        (isNew ? '<div style="font-size:9px;font-weight:700;color:var(--acc);letter-spacing:0.5px">NEW</div>' : '') +
        (hasVar ? '<div class="fig-var-badge">VAR</div>' : '') +
        (c.status
          ? `<button class="quick-own" onclick="cycleStatus(event,'${id}')" title="Cycle status" style="border-color:${STATUS_COLOR[c.status]}"><div class="fig-status-dot ${statusCls}"></div></button>`
          : `<button class="quick-own" onclick="event.stopPropagation();setStatus('${id}','owned')" title="Mark owned">${icon(ICO.check,16)}</button>`);
    }
    updateNavBadge();
    return true;
  }

  // Try grid view card
  const card = document.querySelector(`.fig-card[data-fig-id="${id}"]`);
  if (card) {
    card.className = 'fig-card ' + statusCls;
    const badge = card.querySelector('.status-badge');
    if (badge) {
      badge.className = 'status-badge ' + statusCls;
      const badgeAction = c.status
        ? `cycleStatus(event,'${id}')`
        : `event.stopPropagation();setStatus('${id}','owned')`;
      badge.setAttribute('onclick', badgeAction);
      badge.innerHTML = c.status
        ? `<div class="fig-status-dot ${statusCls}"></div>`
        : `<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>`;
    }
    updateNavBadge();
    return true;
  }

  return false;
}

function updateNavBadge() {
  const badge = document.querySelector('.bottom-nav .badge');
  if (badge) {
    const owned = S.figs.filter(f => !figIsHidden(f) && S.coll[f.id]?.status === 'owned').length;
    badge.textContent = owned;
  }
}
function updateColl(id, key, val) {
  S.coll[id] = {...(S.coll[id]||{}), [key]: val};
  saveColl();
}

// Debounced version for oninput on long-text fields (e.g. notes) so
// a pending edit doesn't get lost if the app is force-closed mid-typing.
const _updDebounces = {};
window.updateCollDebounced = (id, key, val) => {
  const dk = id + ':' + key;
  clearTimeout(_updDebounces[dk]);
  _updDebounces[dk] = setTimeout(() => {
    updateColl(id, key, val);
    delete _updDebounces[dk];
  }, 400);
};

function getStats() {
  let total = 0, owned = 0, wish = 0, ord = 0, sale = 0;
  for (const f of S.figs) {
    if (figIsHidden(f)) continue;
    total++;
    const s = S.coll[f.id]?.status;
    if (s === 'owned') owned++;
    else if (s === 'wishlist') wish++;
    else if (s === 'ordered') ord++;
    else if (s === 'for-sale') sale++;
  }
  return { total, owned, wish, ord, sale };
}

function getLineStats() {
  const agg = {}; // lineId -> {total, owned}
  for (const f of S.figs) {
    if (figIsHidden(f)) continue;
    const a = agg[f.line] || (agg[f.line] = {total: 0, owned: 0});
    a.total++;
    if (S.coll[f.id]?.status === 'owned') a.owned++;
  }
  return LINES.map(l => {
    const a = agg[l.id] || {total: 0, owned: 0};
    return {...l, total: a.total, owned: a.owned, pct: a.total ? Math.round(a.owned/a.total*100) : 0};
  });
}

function getSortedFigs() {
  let list = S.figs.filter(f => !figIsHidden(f));
  const isSearch = S.search.length > 0;
  if (!isSearch && S.activeLine) list = list.filter(f => f.line === S.activeLine);
  if (!isSearch && S.activeSubline && S.activeSubline !== '__all__') {
    const subs = SUBLINES[S.activeLine] || [];
    const sl = subs.find(s => s.key === S.activeSubline);
    if (sl) list = list.filter(f => sl.groups.includes(f.group));
  }
  if (!isSearch && S.tab === 'collection') list = list.filter(f => S.coll[f.id]?.status);
  if (S.filterFaction) list = list.filter(f => f.faction === S.filterFaction);
  if (S.filterStatus === 'unowned') list = list.filter(f => !S.coll[f.id]?.status);
  else if (S.filterStatus) list = list.filter(f => S.coll[f.id]?.status === S.filterStatus);
  if (S.filterVariants) list = list.filter(f => /\w/.test(S.coll[f.id]?.variants||''));
  if (S.search) {
    const s = S.search.toLowerCase().replace(/[-'']/g, '');
    list = list.filter(f => {
      const name = f.name.toLowerCase().replace(/[-'']/g, '');
      if (name.includes(s)) return true;
      // Also match against line name and group
      const lineName = ln(f.line).toLowerCase().replace(/[-'']/g, '');
      const group = (f.group||'').toLowerCase().replace(/[-'']/g, '');
      return lineName.includes(s) || group.includes(s);
    });
  }
  const sb = S.sortBy;
  if (sb === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
  else if (sb === 'name-desc') list.sort((a,b) => b.name.localeCompare(a.name));
  else if (sb === 'year') list.sort((a,b) => (a.year||9999)-(b.year||9999));
  else if (sb === 'year-desc') list.sort((a,b) => (b.year||0)-(a.year||0));
  else if (sb === 'wave') list.sort((a,b) => { const na=parseFloat(a.wave||''),nb=parseFloat(b.wave||''); return (isNaN(na)?99:na)-(isNaN(nb)?99:nb); });
  else if (sb === 'retail') list.sort((a,b) => (a.retail||0)-(b.retail||0));
  else if (sb === 'retail-desc') list.sort((a,b) => (b.retail||0)-(a.retail||0));
  return list;
}

function hasFilters() { return S.search || S.filterFaction || S.filterStatus || S.filterVariants; }

function progressRing(pct, size=48, color='var(--acc)') {
  const r = (size/2)-4, circ = 2*Math.PI*r;
  const complete = pct === 100;
  const c = complete ? 'var(--gn)' : color;
  return `<svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--bd)" stroke-width="3"/>` +
    `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${c}" stroke-width="3" ` +
    `stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .4s"/>` +
    `<text x="${size/2}" y="${size/2+4}" text-anchor="middle" fill="${c}" font-size="11" font-weight="700" font-family="'Outfit',sans-serif">${pct}%</text></svg>`;
}

function exportCSV(filter) {
  const h = ['Name','Line','Group','Wave','Year','Retail','Faction','Status','Condition','Paid','Notes'];
  let list = S.figs;
  if (filter === 'owned') list = list.filter(f => S.coll[f.id]?.status === 'owned');
  else if (filter === 'wishlist') list = list.filter(f => S.coll[f.id]?.status === 'wishlist');
  else if (filter === 'ordered') list = list.filter(f => S.coll[f.id]?.status === 'ordered');
  else if (filter === 'for-sale') list = list.filter(f => S.coll[f.id]?.status === 'for-sale');
  else if (filter === 'unowned') list = list.filter(f => !S.coll[f.id]?.status);
  else if (filter === 'any-status') list = list.filter(f => S.coll[f.id]?.status);
  const rows = list.map(f => {
    const c = S.coll[f.id] || {};
    return [f.name,ln(f.line),f.group,f.wave,f.year,f.retail,f.faction,c.status||'',c.condition||'',c.paid||'',c.notes||''];
  });
  const csv = [h,...rows].map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const url = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  const a = document.createElement('a');
  const suffix = filter ? '-' + filter : '';
  a.href = url; a.download = 'motu' + suffix + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(`✓ Exported ${list.length} figures`);
}

async function exportJSON() {
  const backup = {
    version: 'motu-vault-backup-v2',
    exported: new Date().toISOString(),
    collection: S.coll,
    photos: {}
  };
  // Include custom photos as arrays of {label, dataUrl}
  let totalPhotos = 0;
  for (const id of Object.keys(S.customPhotos)) {
    const photos = await photoStore.exportAllAsDataURLs(id);
    if (photos.length) {
      backup.photos[id] = photos;
      totalPhotos += photos.length;
    }
  }
  const blob = new Blob([JSON.stringify(backup, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'motu-vault-backup.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(`✓ Backup saved · ${totalPhotos} photos`);
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const backup = JSON.parse(ev.target.result);
      if (backup.version !== 'motu-vault-backup-v1' && backup.version !== 'motu-vault-backup-v2') throw new Error('Unknown format');
      if (!backup.collection || typeof backup.collection !== 'object') throw new Error('Invalid collection data');
      const overwrite = document.querySelector('.checkbox.checked') !== null;
      let imported = 0, skipped = 0, photos = 0;
      Object.entries(backup.collection).forEach(([id, entry]) => {
        if (!overwrite && S.coll[id]?.status) { skipped++; return; }
        S.coll[id] = {...(overwrite ? {} : (S.coll[id]||{})), ...entry};
        imported++;
      });
      saveColl();
      // Restore photos (handle both v1 single-photo and v2 multi-photo formats)
      if (backup.photos) {
        for (const [id, val] of Object.entries(backup.photos)) {
          // v1 format: photos[id] is a single dataUrl string
          // v2 format: photos[id] is an array of {label, dataUrl}
          const photoArr = typeof val === 'string'
            ? [{label: '', dataUrl: val}]
            : (Array.isArray(val) ? val : []);
          const count = await photoStore.importPhotos(id, photoArr);
          photos += count;
        }
      }
      const body = document.querySelector('.sheet-body');
      if (body) {
        body.innerHTML = `<div style="text-align:center;padding:20px 0">
          <div style="font-size:48px;margin-bottom:12px">${imported>0?'✅':'🤷'}</div>
          <div class="font-display" style="font-size:22px;color:var(--gold);margin-bottom:4px">${imported} restored</div>
          ${skipped>0 ? `<div class="text-sm text-dim" style="margin-bottom:4px">${skipped} skipped (already set)</div>` : ''}
          ${photos>0 ? `<div class="text-sm text-dim">${photos} photos restored</div>` : ''}
        </div>`;
      }
      // Ensure the collection write hits localStorage before the user can
      // close the app. The view re-renders automatically via popstate when
      // the sheet is dismissed, so no render() here (it would clobber the
      // success summary above).
      flushSaveColl();
    } catch(e) {
      alert('Invalid backup file: ' + e.message);
    }
  };
  reader.readAsText(file);
}
