<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06060c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>MOTU Collector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   MOTU VAULT — Pure CSS, Zero Dependencies
   ═══════════════════════════════════════════════════════════════════ */

/* ── Theme Variables ─────────────────────────────────────────────── */
:root {
  --bg:  #06060c;
  --bg2: #0d0d18;
  --bg3: #151525;
  --bd:  #252545;
  --acc: #8b5cf6;
  --gold:#d4a843;
  --t1:  #eae6f2;
  --t2:  #9a92b0;
  --t3:  #5e5678;
  --gn:  #34d399;
  --rd:  #f87171;
  --bl:  #60a5fa;
  --or:  #fb923c;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --radius: 14px;
  --radius-sm: 10px;
}

[data-theme="skeletor"] {
  --bg: #0a0514; --bg2: #110a24; --bg3: #1a1035; --bd: #3d2a6e;
  --acc: #a78bfa; --gold: #c084fc; --t1: #ede9f8; --t2: #9c87cc; --t3: #5e4a8a;
}
[data-theme="heman"] {
  --bg: #0f0a03; --bg2: #1a1205; --bg3: #241908; --bd: #5a3a10;
  --acc: #f59e0b; --gold: #fbbf24; --t1: #fef3c7; --t2: #b45309; --t3: #78450f;
}
[data-theme="grayskull"] {
  --bg: #080a08; --bg2: #0f1410; --bg3: #171f18; --bd: #2a3d2c;
  --acc: #22c55e; --gold: #86efac; --t1: #e8f5e9; --t2: #6b9e70; --t3: #3d5e40;
}

/* ── Reset & Base ────────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body, #app {
  height: 100%; width: 100%;
  overflow: hidden;
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--t1);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; }

input, select, textarea {
  outline: none;
  font-family: 'Outfit', sans-serif;
  background: var(--bg3);
  border: 1px solid var(--bd);
  border-radius: var(--radius-sm);
  color: var(--t1);
  font-size: 14px;
  padding: 12px;
  width: 100%;
  transition: border-color 0.2s;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--acc);
}
input::placeholder, textarea::placeholder { color: var(--t3); }

button {
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
  transition: all 0.15s ease;
}
button:active { opacity: 0.7; transform: scale(0.97); }

/* ── Typography ──────────────────────────────────────────────────── */
.font-display { font-family: 'Cinzel', serif; font-weight: 700; }
.text-gold { color: var(--gold); }
.text-muted { color: var(--t2); }
.text-dim { color: var(--t3); }
.text-xs { font-size: 10px; }
.text-sm { font-size: 12px; }
.text-md { font-size: 14px; }
.text-upper { text-transform: uppercase; letter-spacing: 1.5px; }

/* ── Layout Shell ────────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  position: relative;
}

.top-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--bd);
  padding-top: max(12px, var(--safe-top));
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  transform: translateY(0);
  transition: transform 0.18s ease-out, opacity 0.15s ease-out;
}
.top-bar.immersive-hide {
  transform: translateY(-100%);
  opacity: 0;
  pointer-events: none;
}

.content-area {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.bottom-nav {
  background: var(--bg2);
  border-top: 1px solid var(--bd);
  padding-bottom: max(6px, var(--safe-bottom));
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  transform: translateY(0);
  transition: transform 0.18s ease-out, opacity 0.15s ease-out;
}
.bottom-nav.immersive-hide {
  transform: translateY(100%);
  opacity: 0;
  pointer-events: none;
}

.bottom-nav button {
  padding: 7px 0 5px;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 5px;
  font-size: 12px;
  color: var(--t3);
  font-weight: 400;
  transition: color 0.15s;
}
.bottom-nav button.active { color: var(--acc); font-weight: 600; }
.bottom-nav button.active svg { stroke-width: 2.5; }
.bottom-nav .badge {
  font-size: 9px;
  background: var(--bd);
  color: var(--t3);
  border-radius: 8px;
  padding: 1px 5px;
  margin-left: 0px;
}
.bottom-nav button.active .badge { background: var(--acc); color: var(--bg); }

/* ── Header ──────────────────────────────────────────────────────── */
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px 12px;
}

.logo-group {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  object-fit: cover;
}
.logo-title {
  font-size: 16px;
  letter-spacing: 0.5px;
}
.logo-subtitle {
  font-size: 9px;
  letter-spacing: 2px;
}

.header-actions {
  display: flex;
  gap: 4px;
}

.icon-btn {
  width: 38px; height: 38px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--bd);
  background: var(--bg3);
  color: var(--t2);
  display: flex;
  align-items: center;
  justify-content: center;
}
.icon-btn:hover { border-color: var(--acc); color: var(--acc); }
.icon-btn.syncing { animation: spin 1s linear infinite; }
.icon-btn.sync-ok { border-color: var(--gn); color: var(--gn); }
.icon-btn.sync-err { border-color: var(--rd); color: var(--rd); }

@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* ── Search Bar ──────────────────────────────────────────────────── */
.search-bar-wrap {
  overflow: hidden;
  transition: max-height 0.25s ease, opacity 0.2s ease;
  max-height: 80px;
  opacity: 1;
}
.search-bar-wrap.hidden {
  max-height: 0;
  opacity: 0;
  pointer-events: none;
}
.search-row {
  padding: 0 16px 12px;
  display: flex;
  gap: 8px;
  align-items: center;
}

.search-wrap {
  flex: 1;
  position: relative;
}
.search-wrap .search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--t3); pointer-events: none;
}
.search-wrap input {
  padding: 11px 36px 11px 38px;
  border-radius: 12px;
  font-size: 15px;
}
.search-clear {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--t3);
  padding: 4px;
}

.filter-btn, .sort-btn {
  padding: 11px 14px;
  border-radius: 12px;
  border: 1px solid var(--bd);
  background: var(--bg3);
  color: var(--t2);
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
}
.filter-btn.active { border-color: var(--acc); background: color-mix(in srgb, var(--acc) 12%, transparent); color: var(--acc); }
.filter-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--acc);
  display: inline-block;
}

.sort-label { font-size: 11px; color: var(--t3); }

/* ── Breadcrumb ──────────────────────────────────────────────────── */
.breadcrumb {
  padding: 0 16px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 13px;
}
.breadcrumb button {
  color: var(--t2);
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  padding: 2px 0;
}
.breadcrumb .sep { color: var(--t3); }
.breadcrumb .current {
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 14px;
}
.breadcrumb .crumb-link {
  font-family: 'Cinzel', serif;
  font-weight: 700;
}

/* ── Stats Bar ───────────────────────────────────────────────────── */
.stats-bar {
  padding: 12px 16px 4px;
}
.stats-segments {
  height: 8px; border-radius: 4px;
  background: var(--bg3);
  display: flex; overflow: hidden;
  margin-bottom: 8px;
  border: 1px solid var(--bd);
}
.stats-segments .seg {
  height: 100%;
  transition: width 0.4s ease;
}
.stats-segments .seg.owned { background: var(--gn); }
.stats-segments .seg.wishlist { background: var(--bl); }
.stats-segments .seg.ordered { background: var(--or); }
.stats-segments .seg.for-sale { background: var(--rd); }
.stats-legend {
  display: flex; gap: 12px; flex-wrap: wrap;
  font-size: 11px; color: var(--t2);
}
.stats-legend .stat-item {
  display: flex; align-items: center; gap: 4px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 6px;
  transition: background 0.15s;
}
.stats-legend .stat-item:active {
  background: color-mix(in srgb, var(--acc) 15%, transparent);
}
.stats-legend .stat-dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.stats-legend .stat-dot.owned { background: var(--gn); }
.stats-legend .stat-dot.wishlist { background: var(--bl); }
.stats-legend .stat-dot.ordered { background: var(--or); }
.stats-legend .stat-dot.for-sale { background: var(--rd); }
.stats-legend .stat-dot.unowned { background: var(--bd); }
.stats-legend .stat-val { font-weight: 600; }

/* ── Lines Grid ──────────────────────────────────────────────────── */
.lines-grid {
  padding: 14px 16px 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.line-card {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  border: 1px solid var(--bd);
  aspect-ratio: 3/4;
  cursor: pointer;
  transition: transform 0.2s;
}
.line-card:hover { transform: scale(1.02); }
.line-card img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: top;
}
.line-card .overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,.1) 0%, rgba(0,0,0,.3) 40%, rgba(0,0,0,.85) 100%);
}
.line-card .card-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 12px 12px 14px;
}
.line-card .card-name {
  font-size: 13px; line-height: 1.2;
  color: #fff; margin-bottom: 2px;
  text-shadow: 0 1px 4px rgba(0,0,0,.8);
}
.line-card .card-year { font-size: 10px; color: rgba(255,255,255,.6); margin-bottom: 6px; }
.line-card .progress-bar {
  height: 2px; background: rgba(255,255,255,.2);
  border-radius: 2px; overflow: hidden; margin-bottom: 4px;
}
.line-card .progress-fill {
  height: 100%; border-radius: 2px;
  background: var(--gold);
  transition: width 0.4s;
}
.line-card .progress-fill.complete { background: var(--gn); }
.line-card .card-stats { font-size: 10px; color: rgba(255,255,255,.7); font-weight: 600; }
.line-card .card-stats.complete { color: var(--gn); }

.reorder-toggle {
  display: flex;
  justify-content: flex-end;
  padding: 0 16px 8px;
  position: sticky;
  top: 0;
  z-index: 5;
  background: var(--bg);
  padding-top: 8px;
}
.reorder-toggle button {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 8px;
  border: 1px solid var(--bd);
  color: var(--t3); font-size: 11px;
  transition: all 0.15s;
}
.reorder-toggle button.active {
  border-color: var(--acc);
  background: color-mix(in srgb, var(--acc) 12%, transparent);
  color: var(--acc);
}

/* ── Reorder List ────────────────────────────────────────────────── */
.reorder-list {
  padding: 0 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.reorder-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: var(--radius);
}
.reorder-arrows {
  display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;
}
.reorder-arrows button {
  width: 28px; height: 28px;
  border-radius: 7px;
  border: 1px solid var(--bd);
  background: var(--bg3);
  color: var(--t1);
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}
.reorder-arrows button:disabled { color: color-mix(in srgb, var(--t3) 30%, transparent); cursor: default; }

/* ── Subline Cards ───────────────────────────────────────────────── */
.subline-list {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.subline-card {
  padding: 18px 20px;
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 16px;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.15s;
  width: 100%;
}
.subline-card:hover { border-color: var(--acc); }
.subline-card.all-card {
  background: var(--bg3);
  border-width: 2px;
}

.subline-ring { flex-shrink: 0; }
.subline-info { flex: 1; min-width: 0; }
.subline-name {
  font-family: 'Cinzel', serif;
  font-size: 15px; font-weight: 700;
  color: var(--t1); margin-bottom: 4px;
}
.subline-card.all-card .subline-name { color: var(--gold); }
.subline-stats { font-size: 12px; color: var(--t3); }
.subline-progress {
  height: 3px; background: var(--bd);
  border-radius: 2px; margin-top: 8px;
  overflow: hidden;
}
.subline-progress-fill {
  height: 100%; border-radius: 2px;
  background: var(--acc);
  transition: width 0.4s;
}
.subline-progress-fill.complete { background: var(--gn); }
.subline-arrow { flex-shrink: 0; color: var(--t3); }

/* ── Figure List ─────────────────────────────────────────────────── */
.fig-list { padding: 12px 12px 0; }
.fig-count { font-size: 11px; color: var(--t3); margin-bottom: 8px; padding-left: 4px; }

.fig-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 4px;
  border-bottom: 1px solid color-mix(in srgb, var(--bd) 15%, transparent);
  cursor: pointer;
  transition: background 0.1s;
}
.fig-row:hover { background: color-mix(in srgb, var(--bg3) 50%, transparent); }

.fig-thumb {
  width: 56px; height: 56px;
  border-radius: var(--radius-sm);
  background: var(--bg3);
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--bd);
}
.fig-thumb.owned { border-color: var(--gn); }
.fig-thumb.wishlist { border-color: var(--bl); }
.fig-thumb.ordered { border-color: var(--or); }
.fig-thumb.for-sale { border-color: var(--rd); }
.fig-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.fig-thumb .initial {
  font-family: 'Cinzel', serif;
  font-size: 20px; color: var(--t3); font-weight: 700;
}

.fig-text { flex: 1; min-width: 0; }
.fig-name {
  font-size: 14px; font-weight: 600;
  color: var(--t1); line-height: 1.3;
  margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.fig-meta {
  font-size: 11px; color: var(--t3);
  display: flex; gap: 6px; flex-wrap: wrap;
}
.fig-meta .line-name { color: var(--acc); font-weight: 600; }

.fig-actions { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.fig-var-badge { font-size: 9px; font-weight: 700; color: var(--gold); letter-spacing: 0.5px; }
.fig-status-dot { width: 10px; height: 10px; border-radius: 50%; }
.fig-status-dot.owned { background: var(--gn); }
.fig-status-dot.wishlist { background: var(--bl); }
.fig-status-dot.ordered { background: var(--or); }
.fig-status-dot.for-sale { background: var(--rd); }

.quick-own {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--bd);
  background: var(--bg3);
  color: var(--t3);
  display: flex; align-items: center; justify-content: center;
}

/* ── Empty State ─────────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--t3);
}
.empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
.empty-state .title {
  font-family: 'Cinzel', serif;
  font-size: 16px; color: var(--t2); margin-bottom: 4px;
}

/* ── Figure Detail ───────────────────────────────────────────────── */
.detail-header {
  padding: 16px 16px 12px;
  padding-top: max(16px, var(--safe-top));
  background: var(--bg2);
  border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; gap: 12px;
}
.detail-title {
  flex: 1;
  font-family: 'Cinzel', serif;
  font-size: 15px; font-weight: 700;
  color: var(--t1); line-height: 1.3;
}
.detail-back, .detail-delete {
  padding: 8px; border-radius: 8px;
}
.detail-back { color: var(--t1); }
.detail-delete { color: var(--rd); }

.detail-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

.photo-section {
  position: relative;
  background: var(--bg3);
}
.photo-container {
  aspect-ratio: 1;
  max-height: 320px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.photo-container img { width: 100%; height: 100%; object-fit: contain; }
.photo-container .initial-large {
  font-family: 'Cinzel', serif;
  font-size: 72px; color: var(--t3); font-weight: 900;
}
.photo-controls {
  position: absolute; bottom: 10px; right: 10px;
  display: flex; gap: 8px;
}
.photo-btn {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  background: rgba(0,0,0,.65);
  border: 1px solid rgba(255,255,255,.15);
  color: #fff; font-size: 12px;
  display: flex; align-items: center; gap: 6px;
  backdrop-filter: blur(4px);
}
.photo-btn.remove {
  border-color: rgba(248,113,113,.4);
  color: var(--rd);
}

.detail-pills {
  padding: 16px;
  display: flex; flex-wrap: wrap; gap: 8px;
}
.pill {
  padding: 5px 12px;
  border-radius: 20px;
  background: var(--bg3);
  border: 1px solid var(--bd);
  font-size: 12px; color: var(--t2);
}

.detail-retail {
  padding: 0 16px 16px;
  font-size: 14px; color: var(--t2);
}
.detail-retail .price { color: var(--gold); font-weight: 600; }

.status-grid {
  padding: 0 16px 16px;
}
.status-grid .label {
  font-size: 11px; color: var(--t3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 10px;
}
.status-grid .grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.status-btn {
  padding: 14px 8px;
  border-radius: 12px;
  border: 2px solid var(--bd);
  background: var(--bg2);
  color: var(--t2);
  font-size: 14px; font-weight: 600;
  transition: all 0.15s;
}
.status-btn.active { background: color-mix(in srgb, var(--status-color) 12%, transparent); border-color: var(--status-color); color: var(--status-color); }

.detail-fields {
  padding: 0 16px 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.detail-fields .field-label {
  font-size: 12px; color: var(--t3); margin-bottom: 4px;
}
.detail-fields .field-hint {
  font-size: 10px; color: var(--t3); margin-top: 4px;
}

/* ── Bottom Sheet ────────────────────────────────────────────────── */
.sheet-overlay {
  position: absolute; inset: 0;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.sheet-overlay.visible { opacity: 1; pointer-events: auto; }
.sheet-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(4px);
}
.sheet-panel {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  border: 1px solid var(--bd);
  padding-bottom: max(20px, var(--safe-bottom));
  max-height: 85%;
  overflow: hidden;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);

// ─── Storage ──────────────────────────────────────────────────────
const store = {
  get: k => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};
// ─── Photo Storage (OPFS with localStorage fallback) ─────────────
const photoURLs = {};  // In-memory cache: { figId: objectURL }
let _opfsDir = null;   // OPFS directory handle
let _opfsReady = false;

async function initOPFS() {
  try {
    if (!navigator.storage?.getDirectory) return false;
    _opfsDir = await navigator.storage.getDirectory();
    _opfsReady = true;
    return true;
  } catch { return false; }
}

const photoStore = {
  // Synchronous get — returns cached object URL or null
  get: id => photoURLs[id] || null,

  // Async save — stores blob in OPFS, falls back to localStorage
  save: async (id, blob) => {
    try {
      if (_opfsReady) {
        const fh = await _opfsDir.getFileHandle('photo-' + id + '.jpg', {create: true});
        const writable = await fh.createWritable();
        await writable.write(blob);
        await writable.close();
        // Revoke old URL if any
        if (photoURLs[id]) URL.revokeObjectURL(photoURLs[id]);
        photoURLs[id] = URL.createObjectURL(blob);
        // Clean up localStorage copy if it exists (migration)
        try { localStorage.removeItem('motu-photo-' + id); } catch {}
        return true;
      }
      // Fallback: localStorage as base64
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => {
          try { localStorage.setItem('motu-photo-' + id, reader.result); resolve(true); }
          catch { resolve(false); }
        };
        reader.onerror = () => resolve(false);
        reader.readAsDataURL(blob);
      });
    } catch { return false; }
  },

  // Async delete
  del: async id => {
    if (photoURLs[id]) { URL.revokeObjectURL(photoURLs[id]); delete photoURLs[id]; }
    try {
      if (_opfsReady) await _opfsDir.removeEntry('photo-' + id + '.jpg');
    } catch {}
    try { localStorage.removeItem('motu-photo-' + id); } catch {}
  },

  // Load all photos into URL cache (called during init)
  loadAll: async () => {
    if (_opfsReady) {
      try {
        for await (const [name, handle] of _opfsDir) {
          if (name.startsWith('photo-') && name.endsWith('.jpg') && handle.kind === 'file') {
            const id = name.slice(6, -4); // strip 'photo-' and '.jpg'
            const file = await handle.getFile();
            photoURLs[id] = URL.createObjectURL(file);
            S.customPhotos[id] = true;
          }
        }
      } catch(e) { console.error('OPFS loadAll error:', e); }
    }
    // Also load any remaining localStorage photos (pre-migration or fallback)
    try {
      const keys = Object.keys(localStorage).filter(k => k.startsWith('motu-photo-'));
      keys.forEach(k => {
        const id = k.replace('motu-photo-', '');
        if (!photoURLs[id]) {
          photoURLs[id] = localStorage.getItem(k);
          S.customPhotos[id] = true;
        }
      });
    } catch {}
  },

  // Migrate localStorage photos to OPFS (one-time)
  migrate: async () => {
    if (!_opfsReady) return 0;
    let migrated = 0;
    try {
      const keys = Object.keys(localStorage).filter(k => k.startsWith('motu-photo-'));
      for (const k of keys) {
        const id = k.replace('motu-photo-', '');
        const dataUrl = localStorage.getItem(k);
        if (!dataUrl) continue;
        try {
          // Convert data URL to blob
          const res = await fetch(dataUrl);
          const blob = await res.blob();
          const fh = await _opfsDir.getFileHandle('photo-' + id + '.jpg', {create: true});
          const writable = await fh.createWritable();
          await writable.write(blob);
          await writable.close();
          // Update URL cache with blob URL instead of data URL
          if (photoURLs[id]) URL.revokeObjectURL(photoURLs[id]);
          photoURLs[id] = URL.createObjectURL(blob);
          // Remove from localStorage
          localStorage.removeItem(k);
          migrated++;
        } catch(e) { console.error('Failed to migrate photo ' + id, e); }
      }
    } catch {}
    return migrated;
  },

  // Export photo as base64 data URL (for JSON backup)
  exportAsDataURL: async id => {
    if (_opfsReady) {
      try {
        const fh = await _opfsDir.getFileHandle('photo-' + id + '.jpg');
        const file = await fh.getFile();
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      } catch { /* fall through */ }
    }
    // Fallback: check localStorage
    try { return localStorage.getItem('motu-photo-' + id) || null; } catch { return null; }
  },

  // Import from base64 data URL (from JSON backup)
  importFromDataURL: async (id, dataUrl) => {
    try {
      const res = await fetch(dataUrl);
      const blob = await res.blob();
      return photoStore.save(id, blob);
    } catch { return false; }
  },
};

// ─── CSV Parser ───────────────────────────────────────────────────
function parseCSV(text) {
  if (text.length > 10000000) throw new Error('File too large');
  const lines = text.split('\n').filter(l => l.trim());
  const parseRow = line => {
    const cols = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += c;
    }
    cols.push(cur); return cols;
  };
  const headers = parseRow(lines[0]).map(h => h.trim());
  const idx = h => headers.indexOf(h);
  const [iGenre,iSeries,iGroup,iName,iWave,iPaid,iCond,iNote,iWhere,iVariation] =
    ['Genre','Series','Group','Name','Wave','Purchase Price','Condition','Note','Where Purchased','Variation Name'].map(idx);
  return lines.slice(1).map(l => {
    const c = parseRow(l);
    const csvGroup = c[iGroup]?.trim() || '';
    return { genre:c[iGenre], series:c[iSeries], name:c[iName]?.trim(),
      group:GROUP_MAP[csvGroup]||csvGroup, wave:c[iWave]?.trim()||'', paid:c[iPaid]?.trim(),
      cond:COND_MAP[c[iCond]?.trim()]||'', note:c[iNote]?.trim(), where:c[iWhere]?.trim(),
      variation:c[iVariation]?.trim()||'' };
  }).filter(r => r.genre === 'Masters of the Universe' && SERIES_MAP[r.series]);
}

// ─── Data Fetching ────────────────────────────────────────────────
async function fetchFigs(manual = false, firstLoad = false) {
  S.syncStatus = 'syncing'; render();
  S.fetchError = false;
  try {
    const res = await fetch(FIGS_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const remote = await res.json();
    if (!Array.isArray(remote) || remote.length < 100) throw new Error('Invalid data');
    // Detect newly added figures
    const prevIds = new Set(S.figs.map(f => f.id));
    const custom = S.figs.filter(f => f.line === 'custom');
    const ids = new Set(remote.map(f => f.id));
    const hydrated = remote.map(f => ({...f, image: f.slug ? `${IMG}/${f.slug}.jpg` : ''}));
    // Only flag as new if we had a previous catalog loaded (not first boot)
    if (prevIds.size > 100) {
      hydrated.forEach(f => { if (!prevIds.has(f.id)) S.newFigIds.add(f.id); });
    }
    S.figs = [...hydrated, ...custom.filter(f => !ids.has(f.id))];
    S.syncTs = Date.now();
    store.set(CACHE_KEY, { rows: S.figs, ts: S.syncTs });
    S.syncStatus = 'ok';
    if (firstLoad) { S.loaded = true; }
    render();
    setTimeout(() => { S.syncStatus = 'idle'; render(); }, 3000);
  } catch(e) {
    console.error('Fetch failed:', e);
    S.syncStatus = manual ? 'err' : 'idle';
    if (manual) setTimeout(() => { S.syncStatus = 'idle'; render(); }, 5000);
    if (firstLoad) { S.fetchError = true; render(); }
    else render();
  }
}

// ─── Init ─────────────────────────────────────────────────────────
async function init() {
  // Load collection
  const c = store.get('motu-c2');
  if (c) {
    S.coll = Object.fromEntries(Object.entries(c).map(([id, entry]) => {
      if (entry?.variants !== undefined && !/\w/.test(entry.variants)) {
        const { variants, ...rest } = entry;
        return [id, rest];
      }
      return [id, entry];
    }));
  }
  // Initialize OPFS for photo storage
  await initOPFS();
  // Load all photos into URL cache (OPFS + localStorage fallback)
  await photoStore.loadAll();
  // One-time migration: move localStorage photos to OPFS
  if (_opfsReady) {
    const migrated = await photoStore.migrate();
    if (migrated > 0) console.log(`Migrated ${migrated} photos to OPFS`);
  }
  // Load cached figs
  const cached = store.get(CACHE_KEY);
  if (cached?.rows?.length) {
    S.figs = cached.rows.map(f => ({...f, image: f.image || (f.slug ? `${IMG}/${f.slug}.jpg` : '')}));
    S.syncTs = cached.ts;
    S.loaded = true;
  }
  // Apply theme
  document.documentElement.setAttribute('data-theme', S.theme);
  // One-time migration: wave default → year default (v3.9)
  if (S.sortBy === 'wave') { S.sortBy = 'year'; store.set('motu-sort', 'year'); }
  // Fetch if stale
  const hasCache = !!(cached?.rows?.length);
  if (!cached?.ts || Date.now() - cached.ts > CACHE_TTL) fetchFigs(false, !hasCache);
  render();
}

// ─── Helpers ──────────────────────────────────────────────────────
function saveColl() { store.set('motu-c2', S.coll); }
function toggleHidden(key) {
  const i = S.hiddenItems.indexOf(key);
  if (i >= 0) S.hiddenItems.splice(i, 1);
  else S.hiddenItems.push(key);
  store.set('motu-hidden', S.hiddenItems);
  render();
}
function isLineFullyHidden(lineId) {
  // A line is fully hidden if the line itself is hidden
  return S.hiddenItems.includes(lineId);
}
function isSublineHidden(lineId, subKey) {
  return S.hiddenItems.includes(lineId + ':' + subKey);
}
function figIsHidden(f) {
  if (isLineFullyHidden(f.line)) return true;
  const subs = SUBLINES[f.line];
  if (!subs) return false;
  // Find which subline this figure belongs to
  for (const sl of subs) {
    if (sl.groups.includes(f.group) && isSublineHidden(f.line, sl.key)) return true;
  }
  return false;
}
function setStatus(id, status) {
  if (!S.coll[id]) S.coll[id] = {};
  if (S.coll[id].status === status) { delete S.coll[id].status; if (!Object.keys(S.coll[id]).length) delete S.coll[id]; }
  else S.coll[id] = {...S.coll[id], status};
  saveColl();
  if (!patchFigRow(id)) render();
}

function patchFigRow(id) {
  const row = document.querySelector(`.fig-row[data-fig-id="${id}"]`);
  if (!row) return false;
  const c = S.coll[id] || {};
  const statusCls = c.status || '';
  // Update thumb border
  const thumb = row.querySelector('.fig-thumb');
  if (thumb) { thumb.className = 'fig-thumb ' + statusCls; }
  // Update actions area
  const actions = row.querySelector('.fig-actions');
  if (actions) {
    const hasVar = /\w/.test(c.variants || '');
    const isNew = S.newFigIds.has(id);
    actions.innerHTML =
      (isNew ? '<div style="font-size:9px;font-weight:700;color:var(--acc);letter-spacing:0.5px">NEW</div>' : '') +
      (hasVar ? '<div class="fig-var-badge">VAR</div>' : '') +
      (c.status
        ? `<button class="quick-own" onclick="cycleStatus(event,'${id}')" title="Cycle status" style="border-color:${STATUS_COLOR[c.status]}"><div class="fig-status-dot ${statusCls}"></div></button>`
        : `<button class="quick-own" onclick="event.stopPropagation();setStatus('${id}','owned')" title="Mark owned">${icon(ICO.check,16)}</button>`);
  }
  // Update badge count in bottom nav
  const badge = document.querySelector('.bottom-nav .badge');
  if (badge) {
    const owned = S.figs.filter(f => !figIsHidden(f) && S.coll[f.id]?.status === 'owned').length;
    badge.textContent = owned;
  }
  return true;
}
function updateColl(id, key, val) {
  S.coll[id] = {...(S.coll[id]||{}), [key]: val};
  saveColl();
}

function getStats() {
  const real = S.figs.filter(f => !figIsHidden(f));
  const owned = real.filter(f => S.coll[f.id]?.status === 'owned').length;
  const wish  = real.filter(f => S.coll[f.id]?.status === 'wishlist').length;
  const ord   = real.filter(f => S.coll[f.id]?.status === 'ordered').length;
  const sale  = real.filter(f => S.coll[f.id]?.status === 'for-sale').length;
  return { total: real.length, owned, wish, ord, sale };
}

function getLineStats() {
  return LINES.map(l => {
    const t = S.figs.filter(f => f.line === l.id && !figIsHidden(f)).length;
    const o = S.figs.filter(f => f.line === l.id && !figIsHidden(f) && S.coll[f.id]?.status === 'owned').length;
    return {...l, total: t, owned: o, pct: t ? Math.round(o/t*100) : 0};
  });
}

function getSortedFigs() {
  let list = S.figs.filter(f => !figIsHidden(f));
  const isSearch = S.search.length > 0;
  if (!isSearch && S.activeLine) list = list.filter(f => f.line === S.activeLine);
  if (!isSearch && S.activeSubline && S.activeSubline !== '__all__') {
    const subs = SUBLINES[S.activeLine] || [];
    const sl = subs.find(s => s.key === S.activeSubline);
    if (sl) list = list.filter(f => sl.groups.includes(f.group));
  }
  if (!isSearch && S.tab === 'collection') list = list.filter(f => S.coll[f.id]?.status);
  if (S.filterFaction) list = list.filter(f => f.faction === S.filterFaction);
  if (S.filterStatus === 'unowned') list = list.filter(f => !S.coll[f.id]?.status);
  else if (S.filterStatus) list = list.filter(f => S.coll[f.id]?.status === S.filterStatus);
  if (S.filterVariants) list = list.filter(f => /\w/.test(S.coll[f.id]?.variants||''));
  if (S.search) { const s = S.search.toLowerCase(); list = list.filter(f => f.name.toLowerCase().includes(s)); }
  const sb = S.sortBy;
  if (sb === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
  else if (sb === 'name-desc') list.sort((a,b) => b.name.localeCompare(a.name));
  else if (sb === 'year') list.sort((a,b) => (a.year||9999)-(b.year||9999));
  else if (sb === 'year-desc') list.sort((a,b) => (b.year||0)-(a.year||0));
  else if (sb === 'wave') list.sort((a,b) => { const na=parseFloat(a.wave||''),nb=parseFloat(b.wave||''); return (isNaN(na)?99:na)-(isNaN(nb)?99:nb); });
  else if (sb === 'retail') list.sort((a,b) => (a.retail||0)-(b.retail||0));
  else if (sb === 'retail-desc') list.sort((a,b) => (b.retail||0)-(a.retail||0));
  return list;
}

function hasFilters() { return S.search || S.filterFaction || S.filterStatus || S.filterVariants; }

function progressRing(pct, size=48, color='var(--acc)') {
  const r = (size/2)-4, circ = 2*Math.PI*r;
  const complete = pct === 100;
  const c = complete ? 'var(--gn)' : color;
  return `<svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--bd)" stroke-width="3"/>` +
    `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${c}" stroke-width="3" ` +
    `stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .4s"/>` +
    `<text x="${size/2}" y="${size/2+4}" text-anchor="middle" fill="${c}" font-size="11" font-weight="700" font-family="'Outfit',sans-serif">${pct}%</text></svg>`;
}

function exportCSV(filter) {
  const h = ['Name','Line','Group','Wave','Year','Retail','Faction','Status','Condition','Paid','Notes'];
  let list = S.figs;
  if (filter === 'owned') list = list.filter(f => S.coll[f.id]?.status === 'owned');
  else if (filter === 'wishlist') list = list.filter(f => S.coll[f.id]?.status === 'wishlist');
  else if (filter === 'ordered') list = list.filter(f => S.coll[f.id]?.status === 'ordered');
  else if (filter === 'for-sale') list = list.filter(f => S.coll[f.id]?.status === 'for-sale');
  else if (filter === 'unowned') list = list.filter(f => !S.coll[f.id]?.status);
  else if (filter === 'any-status') list = list.filter(f => S.coll[f.id]?.status);
  const rows = list.map(f => {
    const c = S.coll[f.id] || {};
    return [f.name,ln(f.line),f.group,f.wave,f.year,f.retail,f.faction,c.status||'',c.condition||'',c.paid||'',c.notes||''];
  });
  const csv = [h,...rows].map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const url = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  const a = document.createElement('a');
  const suffix = filter ? '-' + filter : '';
  a.href = url; a.download = 'motu' + suffix + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function exportJSON() {
  const backup = {
    version: 'motu-vault-backup-v1',
    exported: new Date().toISOString(),
    collection: S.coll,
    photos: {}
  };
  // Include custom photos as base64 data URLs
  for (const id of Object.keys(S.customPhotos)) {
    const data = await photoStore.exportAsDataURL(id);
    if (data) backup.photos[id] = data;
  }
  const blob = new Blob([JSON.stringify(backup, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'motu-vault-backup.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const backup = JSON.parse(ev.target.result);
      if (backup.version !== 'motu-vault-backup-v1') throw new Error('Unknown format');
      if (!backup.collection || typeof backup.collection !== 'object') throw new Error('Invalid collection data');
      const overwrite = document.querySelector('.checkbox.checked') !== null;
      let imported = 0, skipped = 0, photos = 0;
      Object.entries(backup.collection).forEach(([id, entry]) => {
        if (!overwrite && S.coll[id]?.status) { skipped++; return; }
        S.coll[id] = {...(overwrite ? {} : (S.coll[id]||{})), ...entry};
        imported++;
      });
      saveColl();
      // Restore photos
      if (backup.photos) {
        for (const [id, data] of Object.entries(backup.photos)) {
          const ok = await photoStore.importFromDataURL(id, data);
          if (ok) { S.customPhotos[id] = true; photos++; }
        }
      }
      const body = document.querySelector('.sheet-body');
      if (body) {
        body.innerHTML = `<div style="text-align:center;padding:20px 0">
          <div style="font-size:48px;margin-bottom:12px">${imported>0?'✅':'🤷'}</div>
          <div class="font-display" style="font-size:22px;color:var(--gold);margin-bottom:4px">${imported} restored</div>
          ${skipped>0 ? `<div class="text-sm text-dim" style="margin-bottom:4px">${skipped} skipped (already set)</div>` : ''}
          ${photos>0 ? `<div class="text-sm text-dim">${photos} photos restored</div>` : ''}
        </div>`;
      }
    } catch(e) {
      alert('Invalid backup file: ' + e.message);
    }
  };
  reader.readAsText(file);
}

function doImport(csvText, overwrite = false) {
  // Detect format: MOTU Vault export has 'Line' header, AF411 has 'Series'
  const firstLine = csvText.split('\n')[0] || '';
  const isVaultFormat = /\bLine\b/.test(firstLine) && !/\bSeries\b/.test(firstLine);

  if (isVaultFormat) return doImportVault(csvText, overwrite);
  return doImportAF411(csvText, overwrite);
}

// Reverse map: line name → line id
const LINE_ID_MAP = Object.fromEntries(LINES.map(l => [l.name, l.id]));

function doImportVault(csvText, overwrite) {
  const lines = csvText.split('\n').filter(l => l.trim());
  const parseRow = line => {
    const cols = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += c;
    }
    cols.push(cur); return cols;
  };
  const headers = parseRow(lines[0]).map(h => h.trim());
  const col = h => headers.indexOf(h);
  const [iName,iLine,iGroup,iWave,iStatus,iCond,iPaid,iNotes] =
    ['Name','Line','Group','Wave','Status','Condition','Paid','Notes'].map(col);

  const idx4 = {}, idx3 = {}, idx2 = {};
  S.figs.forEach(f => {
    const k4 = normalize(f.name)+'|'+f.line+'|'+normalize(f.group||'')+'|'+normalize(f.wave||'');
    const k3 = normalize(f.name)+'|'+f.line+'|'+normalize(f.group||'');
    const k2 = normalize(f.name)+'|'+f.line;
    if (!idx4[k4]) idx4[k4] = f;
    if (!idx3[k3]) idx3[k3] = f;
    idx2[k2] = idx2[k2] ? 'AMBIGUOUS' : f;
  });

  const matchedIds = new Set();
  let skipped = 0; const unmatched = [];

  lines.slice(1).forEach(l => {
    const c = parseRow(l);
    const name = c[iName]?.trim();
    if (!name) return;
    const lineName = c[iLine]?.trim() || '';
    const lineId = LINE_ID_MAP[lineName] || lineName.toLowerCase().replace(/\s+/g,'-');
    const group = c[iGroup]?.trim() || '';
    const wave = c[iWave]?.trim() || '';
    const status = c[iStatus]?.trim() || '';
    const cond = c[iCond]?.trim() || '';
    const paid = c[iPaid]?.trim() || '';
    const notes = c[iNotes]?.trim() || '';

    const k4 = normalize(name)+'|'+lineId+'|'+normalize(group)+'|'+normalize(wave);
    const k3 = normalize(name)+'|'+lineId+'|'+normalize(group);
    const k2 = normalize(name)+'|'+lineId;
    const fig = idx4[k4] || idx3[k3] || (() => {
      const c2 = idx2[k2];
      if (!c2 || c2 === 'AMBIGUOUS') return null;
      return c2;
    })();

    if (!fig) { unmatched.push(lineName + ': ' + name + (group ? ' [' + group + ']' : '')); return; }
    if (matchedIds.has(fig.id)) { skipped++; return; }
    if (!overwrite && S.coll[fig.id]?.status && status) { skipped++; return; }

    if (status) {
      S.coll[fig.id] = {...(S.coll[fig.id]||{}), status,
        ...(cond && {condition:cond}), ...(paid && {paid}), ...(notes && {notes})};
    }
    matchedIds.add(fig.id);
  });
  saveColl();
  return { matched: matchedIds.size, skipped, unmatched };
}

function doImportAF411(csvText, overwrite) {
  const motuRows = parseCSV(csvText);
  const idx4 = {}, idx3 = {}, idx2 = {};
  S.figs.forEach(f => {
    const k4 = normalize(f.name)+'|'+f.line+'|'+normalize(f.group||'')+'|'+normalize(f.wave||'');
    const k3 = normalize(f.name)+'|'+f.line+'|'+normalize(f.group||'');
    const k2 = normalize(f.name)+'|'+f.line;
    if (!idx4[k4]) idx4[k4] = f;
    if (!idx3[k3]) idx3[k3] = f;
    idx2[k2] = idx2[k2] ? 'AMBIGUOUS' : f;
  });
  const matchedIds = new Set();
  let skipped = 0; const unmatched = [];
  motuRows.forEach(row => {
    const lineId = SERIES_MAP[row.series];
    const k4 = normalize(row.name)+'|'+lineId+'|'+normalize(row.group||'')+'|'+normalize(row.wave||'');
    const k3 = normalize(row.name)+'|'+lineId+'|'+normalize(row.group||'');
    const k2 = normalize(row.name)+'|'+lineId;
    const fig = idx4[k4] || idx3[k3] || (() => {
      const c = idx2[k2];
      if (!c || c === 'AMBIGUOUS') return null;
      if (normalize(c.name) !== normalize(row.name)) return null;
      return c;
    })();
    if (!fig) { unmatched.push(ln(lineId)+': '+row.name+(row.group?' ['+row.group+']':'')); return; }
    if (matchedIds.has(fig.id)) {
      if (row.variation) {
        const ex = S.coll[fig.id]?.variants || '';
        if (!ex.split(',').map(v=>v.trim()).includes(row.variation))
          S.coll[fig.id] = {...S.coll[fig.id], variants: [ex, row.variation].filter(Boolean).join(', ')};
      }
      skipped++; return;
    }
    if (!overwrite && S.coll[fig.id]?.status === 'owned') { skipped++; return; }
    const importNote = [row.note, row.where ? 'From: '+row.where : ''].filter(Boolean).join(' | ');
    S.coll[fig.id] = {...S.coll[fig.id], status:'owned',
      ...(row.cond && {condition:row.cond}), ...(row.paid && {paid:row.paid}),
      ...(row.variation && {variants:row.variation}), ...(importNote && {notes:importNote})};
    matchedIds.add(fig.id);
  });
  saveColl();
  return { matched: matchedIds.size, skipped, unmatched };
}

      ${S.fetchError ? `

        <div class="text-dim text-sm" style="margin-bottom:24px;text-align:center;line-height:1.6">Check your connection and try again.</div>
        <button class="retry-btn" onclick="fetchFigs(true,true)">Retry</button>
      ` : `
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading figures…</div>
      `}
    </div>`;
}

function renderMain() {
  // Capture scroll before wiping DOM — but NOT while a sheet is open
  // (content behind sheet may have changed due to filter, causing stale scroll)
  const _prevCa = document.getElementById('contentArea');
  const _preservedScroll = (!S.sheet && _prevCa) ? _prevCa.scrollTop : 0;

  const stats = getStats();
  const sortLabel = S.sortBy.includes('year') ? 'Year' : S.sortBy === 'wave' ? 'Wave' : S.sortBy.includes('name') ? 'Name' : 'Price';
  const hf = hasFilters();
  const syncCls = S.syncStatus === 'syncing' ? 'syncing' : S.syncStatus === 'ok' ? 'sync-ok' : S.syncStatus === 'err' ? 'sync-err' : '';

  const themeTitles = getThemeTitles();
  const themeIcon = getThemeIcon();
  const hasMultiIcons = (THEMES[S.theme]?.icons?.length || 1) > 1;
  const hasTitleCycle = themeTitles.length > 1;
  // Icon click: if multi-icon theme, cycle icons; otherwise go home
  const iconClick = hasMultiIcons ? `S.iconIdx=(S.iconIdx+1)%${THEMES[S.theme].icons.length};render()` : 'goHome()';
  // Title click: if theme has title cycling, cycle; otherwise no-op
  const titleClick = hasTitleCycle ? `S.titleIdx=(S.titleIdx+1)%${themeTitles.length};playTitleSound(S.titleIdx);render()` : 'goHome()';

  let html = `
  <div class="top-bar" id="topBar">
    <div class="header-row">
      <div class="logo-group">
        <img src="${themeIcon}" alt="" class="logo-icon" onclick="${iconClick}" style="cursor:pointer">
        <div>
          <div class="logo-title font-display text-gold" onclick="${titleClick}" style="cursor:pointer;user-select:none">${themeTitles[S.titleIdx % themeTitles.length]}</div>
          <div class="logo-subtitle text-dim text-upper">${stats.total} Figures · ${stats.owned} Owned · <span class="text-gold">v3.27</span>${S.syncTs ? ' · '+new Date(S.syncTs).toLocaleDateString() : ''}</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn ${syncCls}" title="Sync" onclick="fetchFigs(true)">${icon(ICO.sync,16)}</button>
        <button class="icon-btn" title="Menu" onclick="openSheet('menu')">${icon(ICO.menu,20)}</button>
      </div>
    </div>
    <div class="search-bar-wrap${S.searchBarHidden?' hidden':''}" id="searchBar">
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">${icon(ICO.search,16)}</span>
        <input id="searchInput" value="${esc(S.search)}" placeholder="Search figures…" oninput="onSearch(this.value)">
        ${S.search ? `<button class="search-clear" onclick="onSearch('')">${icon(ICO.x,14)}</button>` : ''}
      </div>
      <button class="filter-btn ${hf?'active':''}" onclick="openSheet('filter')">
        ${icon(ICO.filter,18)}${hf ? '<span class="filter-dot"></span>' : ''}
      </button>
      <button class="sort-btn" onclick="openSheet('sort')">
        ${icon(ICO.sort,18)}<span class="sort-label">${sortLabel}</span>
      </button>
    </div>
    </div>
    ${S.activeLine ? renderBreadcrumb() : ''}
  </div>

  <!-- Content -->
  <div class="content-area" id="contentArea">
    <div id="topSpacer"></div>
    ${renderContent()}
  </div>

  <div class="bottom-nav" id="bottomNav">
    ${renderNavBtn('lines', ICO.lines, 'Lines')}
    ${renderNavBtn('all', ICO.list, 'All')}
    ${renderNavBtn('collection', ICO.heart, 'Collection', `<span class="badge">${stats.owned}</span>`)}
  </div>`;

  if (S.sheet) html += renderSheet();
  app().innerHTML = html;

  // Re-apply visible class to sheet overlay (innerHTML wipes it)
  if (S.sheet) {
    const el = document.getElementById('sheetOverlay');
    if (el) requestAnimationFrame(() => el.classList.add('visible'));
  }

  // Set top spacer height to match fixed top bar, so content starts below it
  const tb = document.getElementById('topBar');
  const bn = document.getElementById('bottomNav');
  const ca = document.getElementById('contentArea');
  const ts = document.getElementById('topSpacer');
  if (ts && tb) ts.style.height = tb.offsetHeight + 'px';

  // Re-apply immersive state after innerHTML rebuild
  if (S.barsHidden && !S.sheet) {
    if (tb) tb.classList.add('immersive-hide');
    if (bn) bn.classList.add('immersive-hide');
  }

  // Restore scroll — savedScroll from fig nav takes priority; else preserve across renders
  if (ca) {
    const maxScroll = Math.max(0, ca.scrollHeight - ca.clientHeight);
    if (S.savedScroll && S.screen === 'main') {
      ca.scrollTop = Math.min(S.savedScroll, maxScroll);
      S.savedScroll = 0;
    } else if (_preservedScroll > 0 && !S.sheet && !S._justNavigated) {
      ca.scrollTop = Math.min(_preservedScroll, maxScroll);
    }
    S._justNavigated = false;
  }

  // Immersive scroll: hide/show bars via transform only — no layout changes
  if (ca) {
    let lastScrollTop = ca.scrollTop;
    let _suppressed = true; // suppress initial scroll events from restore
    requestAnimationFrame(() => { _suppressed = false; lastScrollTop = ca.scrollTop; });
    ca._scrollHandler && ca.removeEventListener('scroll', ca._scrollHandler);
    ca._scrollHandler = () => {
      if (_suppressed || S.editingOrder) return;
      const tb = document.getElementById('topBar');
      const bn = document.getElementById('bottomNav');
      const sb = document.getElementById('searchBar');
      if (!tb || !bn) return;
      const st = ca.scrollTop;
      const delta = st - lastScrollTop;
      lastScrollTop = st;
      const nearBottom = ca.scrollHeight - st - ca.clientHeight < 30;
      if (nearBottom) return;
      if (delta > 4 && st > 40 && !S.barsHidden) {
        tb.classList.add('immersive-hide');
        bn.classList.add('immersive-hide');
        if (sb) { sb.classList.add('hidden'); S.searchBarHidden = true; }
        S.barsHidden = true;
      } else if ((delta < -4 || st < 20) && S.barsHidden) {
        tb.classList.remove('immersive-hide');
        bn.classList.remove('immersive-hide');
        if (sb) { sb.classList.remove('hidden'); S.searchBarHidden = false; }
        S.barsHidden = false;
      }
    };
    ca.addEventListener('scroll', ca._scrollHandler, {passive: true});
  }
}

function renderNavBtn(key, ico, label, extra='') {
  const active = (S.tab === key && !S.activeLine) || (key === 'lines' && S.activeLine && S.tab === 'all');
  const showIcon = key !== 'collection';
  return `<button class="${active?'active':''}" onclick="navTo('${key}')">${showIcon ? icon(ico,14,active?2.5:1.5) : ''}${label}${extra}</button>`;
}

function renderBreadcrumb() {
  let html = '<div class="breadcrumb">';
  html += `<button onclick="goBack()">${icon(ICO.back,14)} Lines</button><span class="sep">›</span>`;
  if (S.activeSubline) {
    html += `<button class="crumb-link" onclick="clearSubline()">${esc(ln(S.activeLine))}</button><span class="sep">›</span>`;
    const slLabel = S.activeSubline === '__all__' ? 'All Figures' : (SUBLINES[S.activeLine]||[]).find(s=>s.key===S.activeSubline)?.label || '';
    html += `<span class="current">${esc(slLabel)}</span>`;
  } else {
    html += `<span class="current">${esc(ln(S.activeLine))}</span>`;
  }
  html += '</div>';
  return html;
}

function renderContent() {
  if (S.tab === 'lines' && !S.activeLine) return renderLinesGrid();
  if (!S.search && S.activeLine && !S.activeSubline && SUBLINES[S.activeLine]) return renderSublines();
  return renderFigList();
}

function renderStatsSheet() {
  const stats = getStats();
  const unowned = stats.total - stats.owned - stats.wish - stats.ord - stats.sale;
  const pct = n => stats.total ? (n / stats.total * 100).toFixed(1) : 0;
  // Spent totals
  let totalSpent = 0, paidCount = 0;
  S.figs.filter(f => !figIsHidden(f) && S.coll[f.id]?.status === 'owned' && S.coll[f.id]?.paid).forEach(f => {
    const v = parseFloat(S.coll[f.id].paid) || 0;
    if (v > 0) { totalSpent += v; paidCount++; }
  });
  const avgStr = paidCount > 0 ? `$${(totalSpent / paidCount).toFixed(2)} avg` : '';

  let html = `<div class="stats-bar" style="padding:0 0 16px">
    <div class="stats-segments">
      ${stats.owned ? `<div class="seg owned" style="width:${pct(stats.owned)}%"></div>` : ''}
      ${stats.wish ? `<div class="seg wishlist" style="width:${pct(stats.wish)}%"></div>` : ''}
      ${stats.ord ? `<div class="seg ordered" style="width:${pct(stats.ord)}%"></div>` : ''}
      ${stats.sale ? `<div class="seg for-sale" style="width:${pct(stats.sale)}%"></div>` : ''}
    </div>
    <div class="stats-legend">
      <button class="stat-item" onclick="goToFiltered('owned')"><div class="stat-dot owned"></div><span class="stat-val">${stats.owned}</span> owned</button>
      <button class="stat-item" onclick="goToFiltered('wishlist')"><div class="stat-dot wishlist"></div><span class="stat-val">${stats.wish}</span> wish</button>
      <button class="stat-item" onclick="goToFiltered('ordered')"><div class="stat-dot ordered"></div><span class="stat-val">${stats.ord}</span> ord</button>
      ${stats.sale ? `<button class="stat-item" onclick="goToFiltered('for-sale')"><div class="stat-dot for-sale"></div><span class="stat-val">${stats.sale}</span> sale</button>` : ''}
      <button class="stat-item" onclick="goToFiltered('unowned')"><div class="stat-dot unowned"></div><span class="stat-val">${unowned}</span> unowned</button>
    </div>
    ${totalSpent > 0 ? `<div style="margin-top:10px;font-size:13px;color:var(--gold);font-weight:600">$${totalSpent.toFixed(2)} spent${avgStr ? ` · ${avgStr}` : ''}</div>` : ''}
  </div>`;

  // Per-line breakdown
  html += '<div class="label text-upper text-dim text-xs" style="margin-bottom:10px">By Line</div>';
  const lineStats = getLineStats();
  const ordered = [...S.lineOrder].map(id => lineStats.find(l => l.id === id)).filter(Boolean)
    .concat(lineStats.filter(l => !S.lineOrder.includes(l.id)));
  ordered.filter(l => !isLineFullyHidden(l.id) && l.total > 0).forEach(l => {
    html += `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid color-mix(in srgb, var(--bd) 30%, transparent)">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:var(--t1);margin-bottom:4px">${esc(l.name)}</div>
        <div style="height:4px;background:var(--bd);border-radius:2px;overflow:hidden">
          <div style="height:100%;width:${l.pct}%;background:${l.pct===100?'var(--gn)':'var(--acc)'};border-radius:2px;transition:width 0.3s"></div>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:13px;font-weight:700;color:${l.pct===100?'var(--gn)':'var(--gold)'}">${l.pct}%</div>
        <div style="font-size:10px;color:var(--t3)">${l.owned}/${l.total}</div>
      </div>
    </div>`;
  });

  return html;
}

function renderLinesGrid() {
  const lineStats = getLineStats();
  const ordered = [...S.lineOrder].map(id => lineStats.find(l => l.id === id)).filter(Boolean)
    .concat(lineStats.filter(l => !S.lineOrder.includes(l.id)));

  let html = '';
  if (S.editingOrder) {
    html += `<div class="reorder-toggle"><button class="active" onclick="toggleReorder()">✓ Done</button></div>`;
  }

  if (S.editingOrder) {
    html += '<div class="reorder-list">';
    ordered.forEach((l, i) => {
      const hidden = isLineFullyHidden(l.id);
      html += `<div class="reorder-item" style="${hidden?'opacity:0.4':''}">
        <div class="reorder-arrows">
          <button ${i===0?'disabled':''} onclick="moveLine('${l.id}',-1)">↑</button>
          <button ${i===ordered.length-1?'disabled':''} onclick="moveLine('${l.id}',1)">↓</button>
        </div>
        <div style="flex:1;min-width:0">
          <div class="font-display" style="font-size:14px;color:var(--t1)">${esc(l.name)}</div>
          <div class="text-sm text-dim" style="margin-top:2px">${l.yr} · ${l.total} figures · ${l.owned} owned</div>
        </div>
        <button onclick="event.stopPropagation();toggleHidden('${l.id}')" style="padding:4px 10px;border-radius:8px;border:1px solid ${hidden?'var(--rd)':'var(--bd)'};background:${hidden?'color-mix(in srgb, var(--rd) 10%, transparent)':'var(--bg3)'};color:${hidden?'var(--rd)':'var(--t3)'};font-size:10px;flex-shrink:0">
          ${hidden?'Hidden':'Hide'}
        </button>
        <div style="font-size:12px;font-weight:600;color:${l.pct===100?'var(--gn)':'var(--gold)'};flex-shrink:0">${l.pct}%</div>
      </div>`;
    });
    html += '</div>';
  } else {
    html += '<div class="lines-grid">';
    ordered.filter(l => !isLineFullyHidden(l.id)).forEach(l => {
      const completeCls = l.pct === 100 ? 'complete' : '';
      html += `<div class="line-card" onclick="goToLine('${l.id}')">
        <img src="${IMG}/${l.id}.jpg" alt="${esc(l.name)}" onerror="this.style.display='none'" loading="lazy">
        <div class="overlay"></div>
        <div class="card-info">
          <div class="card-name font-display">${esc(l.name)}</div>
          <div class="card-year">${l.yr}</div>
          ${l.total > 0 ? `
            <div class="progress-bar"><div class="progress-fill ${completeCls}" style="width:${l.pct}%"></div></div>
            <div class="card-stats ${completeCls}">${l.owned}/${l.total} · ${l.pct}%</div>
          ` : ''}
        </div>
      </div>`;
    });
    html += '</div>';
  }
  return html;
}

function renderSublines() {
  const subs = SUBLINES[S.activeLine] || [];
  const allFigs = S.figs.filter(f => f.line === S.activeLine && !figIsHidden(f));
  const allOwned = allFigs.filter(f => S.coll[f.id]?.status === 'owned').length;
  const allPct = allFigs.length ? Math.round(allOwned/allFigs.length*100) : 0;

  let html = '<div class="subline-list">';
  html += `<button class="subline-card all-card" onclick="selectSubline('__all__')">
    <div class="subline-ring">${progressRing(allPct, 48, 'var(--gold)')}</div>
    <div class="subline-info">
      <div class="subline-name">${esc(ln(S.activeLine))} — All Figures</div>
      <div class="subline-stats">${allOwned} owned of ${allFigs.length}</div>
      <div class="subline-progress"><div class="subline-progress-fill ${allPct===100?'complete':''}" style="width:${allPct}%"></div></div>
    </div>
    <div class="subline-arrow">${icon(ICO.chevR,18)}</div>
  </button>`;
  html += '<div style="height:1px;background:var(--bd);margin:0 4px"></div>';
  subs.forEach(sl => {
    const slFigs = S.figs.filter(f => f.line === S.activeLine && sl.groups.includes(f.group));
    if (!slFigs.length) return;
    const hidden = isSublineHidden(S.activeLine, sl.key);
    const visibleFigs = hidden ? [] : slFigs;
    const owned = visibleFigs.filter(f => S.coll[f.id]?.status === 'owned').length;
    const pct = visibleFigs.length ? Math.round(owned/visibleFigs.length*100) : 0;
    html += `<div class="subline-card" style="${hidden?'opacity:0.4':''}" onclick="if(!event.target.closest('.hide-btn'))selectSubline('${sl.key}')">
      <div class="subline-ring">${progressRing(pct)}</div>
      <div class="subline-info">
        <div class="subline-name">${esc(sl.label)}</div>
        <div class="subline-stats">${hidden ? slFigs.length + ' figures (hidden)' : owned + ' owned of ' + slFigs.length}</div>
        ${!hidden ? `<div class="subline-progress"><div class="subline-progress-fill ${pct===100?'complete':''}" style="width:${pct}%"></div></div>` : ''}
      </div>
      <button class="hide-btn" onclick="event.stopPropagation();toggleHidden('${S.activeLine}:${sl.key}')" style="padding:4px 10px;border-radius:8px;border:1px solid ${hidden?'var(--rd)':'var(--bd)'};background:${hidden?'color-mix(in srgb, var(--rd) 10%, transparent)':'var(--bg3)'};color:${hidden?'var(--rd)':'var(--t3)'};font-size:10px;flex-shrink:0">
        ${hidden?'Show':'Hide'}
      </button>
    </div>`;
  });
  html += '</div>';
  return html;
}

const BATCH_SIZE = 80;

function renderFigRow(f) {
  const c = S.coll[f.id] || {};
  const statusCls = c.status || '';
  const hasVar = /\w/.test(c.variants || '');
  const isNew = S.newFigIds.has(f.id);
  const hasCustom = S.customPhotos[f.id];
  const imgErr = S.imgErrors[f.id];
  const showImg = (hasCustom || f.image) && !imgErr;
  const imgSrc = hasCustom ? photoStore.get(f.id) : f.image;

  return `<div class="fig-row" data-fig-id="${f.id}" onclick="openFig('${f.id}')">
    <div class="fig-thumb ${statusCls}">
      ${showImg && imgSrc ? `<img src="${esc(imgSrc)}" alt="" loading="lazy" onerror="imgErr('${f.id}')">` :
        `<span class="initial">${esc(f.name[0])}</span>`}
    </div>
    <div class="fig-text">
      <div class="fig-name">${esc(f.name)}</div>
      <div class="fig-meta">
        ${S.search ? `<span class="line-name">${esc(ln(f.line))}</span>` : ''}
        ${f.group ? `<span>${S.search?'· ':''}${esc(f.group)}</span>` : ''}
        ${f.wave ? `<span>· W${esc(f.wave)}</span>` : ''}
        ${f.year ? `<span>· ${f.year}</span>` : ''}
      </div>
    </div>
    <div class="fig-actions">
      ${isNew ? '<div style="font-size:9px;font-weight:700;color:var(--acc);letter-spacing:0.5px">NEW</div>' : ''}
      ${hasVar ? '<div class="fig-var-badge">VAR</div>' : ''}
      ${c.status ? `<button class="quick-own" onclick="cycleStatus(event,'${f.id}')" title="Cycle status" style="border-color:${STATUS_COLOR[c.status]}"><div class="fig-status-dot ${statusCls}"></div></button>` :
        `<button class="quick-own" onclick="event.stopPropagation();setStatus('${f.id}','owned')" title="Mark owned">${icon(ICO.check,16)}</button>`}
    </div>
  </div>`;
}

function renderFigList() {
  const figs = getSortedFigs();
  const hf = hasFilters();
  let html = '<div class="fig-list">';
  // Compute spent for collection tab
  let spentInfo = '';
  if (S.tab === 'collection') {
    let spent = 0, paidCount = 0;
    figs.forEach(f => { const p = parseFloat(S.coll[f.id]?.paid); if (p > 0) { spent += p; paidCount++; } });
    if (spent > 0) {
      const avg = (spent / paidCount).toFixed(2);
      spentInfo = ` · <span style="color:var(--gold)">$${spent.toFixed(2)} spent</span> · <span style="color:var(--t2)">$${avg} avg</span>`;
    }
  }
  html += `<div class="fig-count">${figs.length} figure${figs.length!==1?'s':''}${S.search?' across all lines':hf?' (filtered)':''}${spentInfo}</div>`;
  if (!figs.length) {
    html += `<div class="empty-state"><div class="emoji">🔍</div><div class="title">No figures found</div><div class="text-sm">Try adjusting your search or filters</div></div>`;
  } else {
    // Render first batch immediately
    const first = figs.slice(0, BATCH_SIZE);
    const rest = figs.slice(BATCH_SIZE);
    first.forEach(f => { html += renderFigRow(f); });
    // Placeholder for remaining rows
    if (rest.length) html += `<div id="figListRest"></div>`;
    // Schedule remaining rows for next frame
    if (rest.length) {
      requestAnimationFrame(() => {
        const container = document.getElementById('figListRest');
        if (!container) return;
        container.innerHTML = rest.map(f => renderFigRow(f)).join('');
      });
    }
  }
  html += '<div class="bottom-spacer"></div></div>';
  return html;
}

// ─── Detail Screen ────────────────────────────────────────────────
