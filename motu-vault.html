// ─── CSV Import ──────────────────────────────────────────────────────────────
const SERIES_MAP = {

const GROUP_MAP = {

};

function parseCSV(text) {
  // Guard against absurdly large files (>10MB)
  if (text.length > 10000000) throw new Error('File too large (max 10MB)');
  const lines = text.split('\n').filter(l => l.trim());
  const parseRow = line => {
    const cols=[]; let cur=''; let inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur);cur='';}
      else cur+=c;
    }
    cols.push(cur); return cols;
  };
  const headers = parseRow(lines[0]).map(h=>h.trim());
  const idx = h => headers.indexOf(h);
  const [iGenre,iSeries,iGroup,iName,iWave,iPaid,iCond,iNote,iWhere,iVariation] =
    ['Genre','Series','Group','Name','Wave','Purchase Price','Condition','Note','Where Purchased','Variation Name'].map(idx);
  return lines.slice(1).map(l => {
    const c = parseRow(l);
    const csvGroup = c[iGroup]?.trim() || '';
    const mappedGroup = GROUP_MAP[csvGroup] || csvGroup;
    return { genre:c[iGenre], series:c[iSeries], name:c[iName]?.trim(),
      group:mappedGroup, wave:c[iWave]?.trim()||'', paid:c[iPaid]?.trim(), cond:COND_MAP[c[iCond]?.trim()]||'',
      note:c[iNote]?.trim(), where:c[iWhere]?.trim(), variation:c[iVariation]?.trim()||'' };
  }).filter(r => r.genre === 'Masters of the Universe' && SERIES_MAP[r.series]);
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [figs,  setFigs]  = useState(() => {
    const cached = store.get(CACHE_KEY);
    if (cached?.rows?.length) {
      return cached.rows.map(f => ({
        ...f,
        image: f.image || (f.slug ? `${IMG}/${f.slug}.jpg` : '')
      }));
    }
    // Single dev-preview seed so the app renders before first fetch
    return [{id:'classics-5101',name:'He-Man',line:'classics',group:'Heroic Warriors',wave:'Wave 1',year:2008,retail:20,slug:'he-man-5101',faction:'Heroic Warriors',image:''}];
  });
  const [fetchError, setFetchError] = useState(false);
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | syncing | ok | err
  const [syncTs,     setSyncTs]     = useState(() => store.get(CACHE_KEY)?.ts || null);
  const [coll, setColl] = useState(() => {
    const c = store.get('motu-c2');
    if (!c) return {};
    // Scrub variants fields with no real word characters on load
    const cleaned = Object.fromEntries(Object.entries(c).map(([id, entry]) => {
      if (entry?.variants !== undefined && !/\w/.test(entry.variants)) {
        const { variants, ...rest } = entry;
        return [id, rest];
      }
      return [id, entry];
    }));
    // Write back if anything changed
    if (JSON.stringify(cleaned) !== JSON.stringify(c)) store.set('motu-c2', cleaned);
    return cleaned;
  });
  const [tab, setTab]         = useState('lines');   // lines | all | collection
  const [activeLine, setActiveLine] = useState(null);
  const [activeSubline, setActiveSubline] = useState(null);
  const [screen, setScreen]   = useState('main');    // main | detail | figure
  const [activeFig, setActiveFig] = useState(null);
  const [srch, setSrch]       = useState('');
  const [filterFaction, setFilterFaction] = useState('');
  const [filterStatus, setFilterStatus]   = useState('');
  const [filterVariants, setFilterVariants] = useState(false);
  const [sortBy, setSortBy]   = useState(() => localStorage.getItem('motu-sort') || 'wave');
  const [theme, setTheme]     = useState(() => localStorage.getItem('motu-theme') || 'eternia');
  const [lineOrder, setLineOrder] = useState(() => store.get('motu-line-order') || LINES.map(l=>l.id)); // lineId being edited
  const [sheet, setSheet]     = useState(null);   // null | 'filter' | 'sort' | 'add' | 'edit' | 'import' | 'theme'
  const [iErr, setIErr]       = useState({});
  const [customPhotos, setCustomPhotos] = useState({});
  const [loaded, setLoaded]   = useState(false);
  const init = useRef(false);
  const scrollRef = useRef(null);
  const savedScroll = useRef(0);

  const T = THEMES[theme] || THEMES.eternia;

  // CSS vars
  const cssVars = `
    :root {
      --bg:${T.bg};--bg2:${T.bg2};--bg3:${T.bg3};--bd:${T.bd};
      --acc:${T.acc};--gold:${T.gold};
      --t1:${T.t1};--t2:${T.t2};--t3:${T.t3};
      --gn:#34d399;--rd:#f87171;--bl:#60a5fa;--or:#fb923c;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

  `;


  // Fetch the latest figures.json from GitHub and update the app.
  // Merges remote rows with local custom figures (line='custom') so user additions survive.
  // manual=true shows red on failure; auto-fetch (background) silently ignores errors.
  // firstLoad=true means figs is empty — we stay on loading screen until this resolves.
  const fetchFigs = useCallback(async (manual = false, firstLoad = false) => {
    setSyncStatus('syncing');
    setFetchError(false);
    try {
      const res = await fetch(FIGS_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const remote = await res.json();
      if (!Array.isArray(remote) || remote.length < 100) throw new Error('Invalid data');
      setFigs(prev => {
        const custom = prev.filter(f => f.line === 'custom');
        const ids = new Set(remote.map(f => f.id));
        const hydrated = remote.map(f => ({
          ...f,
          image: f.slug ? `${IMG}/${f.slug}.jpg` : ''
        }));
        const merged = [...hydrated, ...custom.filter(f => !ids.has(f.id))];
        const ts = Date.now();
        store.set(CACHE_KEY, { rows: merged, ts });
        setSyncTs(ts);
        return merged;
      });
      setSyncStatus('ok');
      setTimeout(() => setSyncStatus('idle'), 3000);
      if (firstLoad) setLoaded(true);
    } catch(e) {
      console.error('figures.json fetch failed:', e.message, e);
      setSyncStatus(manual ? 'err' : 'idle');
      if (manual) setTimeout(() => setSyncStatus('idle'), 5000);
      if (firstLoad) setFetchError(true);
    }
  }, []);

  useEffect(() => {
    if (init.current) return; init.current = true;
    // Load custom photo index (just the keys, not the data - lazy load per figure)
    setCustomPhotos(prev => {
      const keys = Object.keys(localStorage).filter(k => k.startsWith('motu-photo-'));
      const map = {};
      keys.forEach(k => { map[k.replace('motu-photo-','')] = true; });
      return map;
    });
    const cached = store.get(CACHE_KEY);
    const hasCache = !!(cached?.rows?.length);
    // Only mark loaded immediately if we have cached figures to show.
    // Otherwise stay on loading screen until fetchFigs resolves.
    if (hasCache) setLoaded(true);
    if (!cached?.ts || Date.now() - cached.ts > CACHE_TTL) fetchFigs(false, !hasCache);
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  useEffect(() => { localStorage.setItem('motu-sort', sortBy); }, [sortBy]);
  useEffect(() => { if (srch) setTab('all'); }, [srch]);
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
  }, [activeLine, activeSubline, tab]);
  useEffect(() => { localStorage.setItem('motu-theme', theme); }, [theme]);
  useEffect(() => { store.set('motu-line-order', lineOrder); }, [lineOrder]);

  const goToLine = useCallback(lineId => {

  const saveFigs = useCallback(f => { setFigs(f); }, []);
  const saveColl = useCallback(c => { setColl(c); store.set('motu-c2', c); }, []);

  const setStatus = useCallback((id, status) => {
    setColl(prev => {
      const n = { ...prev };
      if (!n[id]) n[id] = {};

      else n[id] = { ...n[id], status };
      store.set('motu-c2', n);
      return n;
    });
  }, []);

  const updateColl = useCallback((id, key, val) => {
    setColl(prev => {
      const n = { ...prev, [id]: { ...prev[id], [key]: val } };
      store.set('motu-c2', n);
      return n;
    });
  }, []);

  const deleteFig = useCallback(id => {
    const f = figs.filter(x => x.id !== id);
    saveFigs(f);
    setColl(prev => { const n = { ...prev }; delete n[id]; store.set('motu-c2', n); return n; });
  }, [figs, saveFigs]);

  // Import
  const doImport = useCallback((csvText, overwrite=false) => {
    const motuRows = parseCSV(csvText);
    // Match hierarchy: 4-key (name+line+group+wave) → 3-key → 2-key (unambiguous only).
    // This handles figures like "Beast Man" which appear in multiple sublines/waves.
    const idx4 = {}, idx3 = {}, idx2 = {};
    figs.forEach(f => {
      const k4 = normalize(f.name) + '|' + f.line + '|' + normalize(f.group||'') + '|' + normalize(f.wave||'');
      const k3 = normalize(f.name) + '|' + f.line + '|' + normalize(f.group||'');
      const k2 = normalize(f.name) + '|' + f.line;
      if (!idx4[k4]) idx4[k4] = f;
      if (!idx3[k3]) idx3[k3] = f;
      idx2[k2] = idx2[k2] ? 'AMBIGUOUS' : f;
    });
    const matchedIds = new Set();
    let skipped=0, unmatched=[];
    const newColl = { ...coll };
    motuRows.forEach(row => {
      const lineId = SERIES_MAP[row.series];
      const k4 = normalize(row.name) + '|' + lineId + '|' + normalize(row.group||'') + '|' + normalize(row.wave||'');
      const k3 = normalize(row.name) + '|' + lineId + '|' + normalize(row.group||'');
      const k2 = normalize(row.name) + '|' + lineId;
      // Try most specific first, fall back to less specific.
      // k2 fallback only matches if the normalized names are identical (guards against
      // "Ninjor" in CSV matching "Ninjor (Filmation)" in the app via loose line-only key).
      const fig = idx4[k4] || idx3[k3] || (() => {
        const candidate = idx2[k2];
        if (!candidate || candidate === 'AMBIGUOUS') return null;
        // Require the normalized names to actually match
        if (normalize(candidate.name) !== normalize(row.name)) return null;
        return candidate;
      })();
      if (!fig) { unmatched.push(ln(lineId) + ': ' + row.name + (row.group ? ' [' + row.group + ']' : '')); return; }
      // Build note string for this row
      const noteParts = [
        row.variation ? 'Variant: ' + row.variation : '',
        row.note || '',
        row.where  ? 'From: ' + row.where : '',
      ].filter(Boolean);
      const rowNote = noteParts.join(' | ');

      if (matchedIds.has(fig.id)) {
        // Already matched — append this variant to the variants field
        if (row.variation) {
          const existingVars = newColl[fig.id]?.variants || '';
          if (!existingVars.split(',').map(v=>v.trim()).includes(row.variation)) {
            newColl[fig.id] = { ...newColl[fig.id],
              variants: [existingVars, row.variation].filter(Boolean).join(', ') };
          }
        }
        skipped++;
        return;
      }
      if (!overwrite && newColl[fig.id]?.status === 'owned') { skipped++; return; }
      // Store variation in its own field, notes separately
      const importNote = [row.note, row.where ? 'From: ' + row.where : ''].filter(Boolean).join(' | ');
      newColl[fig.id] = { ...newColl[fig.id], status:'owned',
        ...(row.cond && {condition:row.cond}),
        ...(row.paid && {paid:row.paid}),
        ...(row.variation && {variants:row.variation}),
        ...(importNote && {notes:importNote}),
      };
      matchedIds.add(fig.id);
    });
    saveColl(newColl);
    return { matched: matchedIds.size, skipped, unmatched };
  }, [figs, coll, saveColl]);

  // Export CSV
  const exportCSV = useCallback(() => {
    const h = ['Name','Line','Group','Wave','Year','Retail','Faction','Status','Condition','Paid','Notes'];
    const rows = figs.map(f => {
      const c = coll[f.id] || {};
      return [f.name,ln(f.line),f.group,f.wave,f.year,f.retail,f.faction,c.status||'',c.condition||'',c.paid||'',c.notes||''];
    });
    const csv = [h,...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const url = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    const a = document.createElement('a');
    a.href = url;
    a.download = 'motu-collection.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, [figs, coll]);

  // Stats — derived from figs cross-referenced with coll to avoid counting
  // orphaned coll entries (figures that were deleted or not in current seed).
  const stats = useMemo(() => {
    const owned = figs.filter(f=>coll[f.id]?.status==='owned').length;
    const wish  = figs.filter(f=>coll[f.id]?.status==='wishlist').length;
    const ord   = figs.filter(f=>coll[f.id]?.status==='ordered').length;
    const paid  = figs.filter(f=>coll[f.id]?.status==='owned'&&coll[f.id]?.paid)
                      .reduce((s,f)=>s+Number(coll[f.id].paid),0);
    return { total:figs.length, owned, wish, ord, paid };
  }, [figs, coll]);

  // Line stats
  const lineStats = useMemo(() => LINES.map(l => {
    const t = figs.filter(f=>f.line===l.id).length;
    const o = figs.filter(f=>f.line===l.id&&coll[f.id]?.status==='owned').length;
    return { ...l, total:t, owned:o, pct: t ? Math.round(o/t*100) : 0 };
  }), [figs, coll]);

  // Filtered + sorted figures
  const sortedFigs = useMemo(() => {
    let list = [...figs];
    // When searching, go global — ignore line/subline/tab constraints
    const isGlobalSearch = srch.length > 0;
    if (!isGlobalSearch && activeLine) list = list.filter(f=>f.line===activeLine);
    if (!isGlobalSearch && activeSubline && activeSubline !== '__all__') {
      const sublines = SUBLINES[activeLine] || [];
      const sl = sublines.find(s=>s.key===activeSubline);
      if (sl) list = list.filter(f=>sl.groups.includes(f.group));
    }
    if (!isGlobalSearch && tab==='collection') list = list.filter(f=>coll[f.id]?.status);
    if (filterFaction) list = list.filter(f=>f.faction===filterFaction);
    if (filterStatus)  list = list.filter(f=>coll[f.id]?.status===filterStatus);
    if (filterVariants) list = list.filter(f => /\w/.test(coll[f.id]?.variants||''));
    if (srch) { const s=srch.toLowerCase(); list=list.filter(f=>f.name.toLowerCase().includes(s)); }
    if (sortBy==='name')    list.sort((a,b)=>a.name.localeCompare(b.name));
    else if (sortBy==='name-desc') list.sort((a,b)=>b.name.localeCompare(a.name));
    else if (sortBy==='year')   list.sort((a,b)=>(a.year||9999)-(b.year||9999));
    else if (sortBy==='year-desc') list.sort((a,b)=>(b.year||0)-(a.year||0));
    else if (sortBy==='wave') list.sort((a,b)=>{const na=parseFloat(a.wave||''),nb=parseFloat(b.wave||'');return(isNaN(na)?99:na)-(isNaN(nb)?99:nb);});
    else if (sortBy==='retail') list.sort((a,b)=>(a.retail||0)-(b.retail||0));
    else if (sortBy==='retail-desc') list.sort((a,b)=>(b.retail||0)-(a.retail||0));
    return list;
  }, [figs, coll, activeLine, activeSubline, tab, filterFaction, filterStatus, filterVariants, srch, sortBy]);

  const hasFilters = srch || filterFaction || filterStatus || filterVariants;

  if (!loaded) return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:T.bg,padding:32}}>
      <style>{cssVars}</style>
      <img src={MOTU_LOGO} alt="Masters of the Universe" style={{width:'100%',maxWidth:320,marginBottom:32,display:'block'}}/>
      {fetchError ? <>
        <div style={{color:'#f87171',fontSize:14,fontWeight:600,marginBottom:8}}>Could not load figures</div>
        <div style={{color:T.t3,fontSize:12,marginBottom:24,textAlign:'center',lineHeight:1.6}}>Check your connection and try again.</div>
        <button onClick={()=>fetchFigs(true, true)}
          style={{padding:'12px 32px',borderRadius:12,border:'1px solid #f87171',background:'rgba(248,113,113,.1)',color:'#f87171',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:"'Outfit',sans-serif"}}>
          Retry
        </button>
      </> : <>
        <div style={{color:T.t3,fontSize:12,letterSpacing:1}}>Loading figures…</div>
      </>}
    </div>
  );

  // ── Figure Detail Screen ──────────────────────────────────────────────────
  if (screen === 'figure' && activeFig) {
    const f = activeFig;
    const c = coll[f.id] || {};
    const customPhoto = customPhotos[f.id] ? photoStore.get(f.id) : null;
    const imgUrl = customPhoto || (f.image && !iErr[f.id] ? f.image : null);
    return (
      <div style={{height:'100%',display:'flex',flexDirection:'column',background:T.bg,overflow:'hidden'}}>
        <style>{cssVars}</style>
        {/* Header */}
        <div style={{padding:'16px 16px 12px',paddingTop:'max(16px,env(safe-area-inset-top))',background:T.bg2,borderBottom:`1px solid ${T.bd}`,display:'flex',alignItems:'center',gap:12}}>
          <button onClick={()=>{
            setScreen('main');
            // Two rAF frames: first lets React commit the DOM, second lets the browser paint.
            requestAnimationFrame(()=>{
              requestAnimationFrame(()=>{
                if(scrollRef.current) scrollRef.current.scrollTop = savedScroll.current;
              });
            });
          }} style={{background:'none',border:'none',color:T.t1,padding:8,cursor:'pointer',borderRadius:8}}>
            <Icon d={ICO.back} s={22}/>
          </button>
          <div style={{flex:1,fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:T.t1,lineHeight:1.3}}>{f.name}</div>
          <button onClick={()=>{if(confirm(`Delete "${f.name}"?`)){deleteFig(f.id);setScreen('main');}}} style={{background:'none',border:'none',color:'#f87171',padding:8,cursor:'pointer',borderRadius:8}}>
            <Icon d={ICO.trash} s={20}/>
          </button>
        </div>
        {/* Scrollable content */}
        <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
          {/* Image + photo capture */}
          <PhotoSection f={f} imgUrl={imgUrl} T={T}
            hasCustom={!!customPhotos[f.id]}
            onImgErr={()=>setIErr(p=>({...p,[f.id]:true}))}
            onPhoto={dataUrl=>{
              const ok = photoStore.set(f.id, dataUrl);
              if (!ok) {
                alert('Photo could not be saved — your device storage may be full. Try removing other photos first.');
                return;
              }
              setCustomPhotos(p=>({...p,[f.id]:true}));
              setIErr(p=>({...p,[f.id]:false}));
            }}
            onClearPhoto={()=>{
              photoStore.del(f.id);
              setCustomPhotos(p=>{const n={...p};delete n[f.id];return n;});
            }}
          />
          {/* Info pills */}
          <div style={{padding:'16px',display:'flex',flexWrap:'wrap',gap:8}}>
            {[ln(f.line),f.group,f.wave?`Wave ${f.wave}`:'',f.year,f.faction].filter(Boolean).map((tag,i)=>(
              <span key={i} style={{padding:'5px 12px',borderRadius:20,background:T.bg3,border:`1px solid ${T.bd}`,fontSize:12,color:T.t2}}>{tag}</span>
            ))}
          </div>
          {/* Retail price */}
          {f.retail && <div style={{padding:'0 16px 16px',fontSize:14,color:T.t2}}>Retail: <span style={{color:T.gold,fontWeight:600}}>${f.retail.toFixed(2)}</span></div>}

          {/* Status buttons */}
          <div style={{padding:'0 16px 16px'}}>
            <div style={{fontSize:11,color:T.t3,textTransform:'uppercase',letterSpacing:1.5,marginBottom:10}}>Status</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {STATUSES.map(s => {
                const active = c.status === s;
                const col = STATUS_COLOR[s];
                return (
                  <button key={s} onClick={()=>setStatus(f.id,s)}
                    style={{padding:'14px 8px',borderRadius:12,border:`2px solid ${active?col:T.bd}`,
                      background:active?`${col}22`:T.bg2,color:active?col:T.t2,
                      fontSize:14,fontWeight:600,cursor:'pointer',transition:'all .15s',fontFamily:"'Outfit',sans-serif"}}>
                    {active && '✓ '}{STATUS_LABEL[s]}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Collection details */}
          {c.status && (
            <div style={{padding:'0 16px 16px',display:'flex',flexDirection:'column',gap:12}}>
              <div style={{fontSize:11,color:T.t3,textTransform:'uppercase',letterSpacing:1.5}}>Collection Details</div>
              <div>
                <div style={{fontSize:12,color:T.t3,marginBottom:4}}>Condition</div>
                <select value={c.condition||''} onChange={e=>updateColl(f.id,'condition',e.target.value)}
                  style={{width:'100%',padding:'12px',background:T.bg3,border:`1px solid ${T.bd}`,borderRadius:10,color:T.t1,fontSize:14,fontFamily:"'Outfit',sans-serif"}}>
                  <option value=''>Select...</option>
                  {CONDITIONS.map(x=><option key={x} value={x}>{x}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:12,color:T.t3,marginBottom:4}}>Price Paid</div>
                <input type="number" step="0.01" value={c.paid||''} placeholder="$0.00"
                  onChange={e=>updateColl(f.id,'paid',e.target.value)}
                  style={{width:'100%',padding:'12px',background:T.bg3,border:`1px solid ${T.bd}`,borderRadius:10,color:T.t1,fontSize:14,fontFamily:"'Outfit',sans-serif"}}/>
              </div>
              <div>
                <div style={{fontSize:12,color:T.t3,marginBottom:4}}>Variants Owned</div>
                <input type="text" value={c.variants||''} placeholder="e.g. Dark Face, Painted Back…"
                  onChange={e=>updateColl(f.id,'variants',e.target.value)}
                  style={{width:'100%',padding:'12px',background:T.bg3,border:`1px solid ${T.bd}`,borderRadius:10,color:T.t1,fontSize:14,fontFamily:"'Outfit',sans-serif"}}/>
                <div style={{fontSize:10,color:T.t3,marginTop:4}}>Comma-separate multiple variants</div>
              </div>
              <div>
                <div style={{fontSize:12,color:T.t3,marginBottom:4}}>Notes</div>
                <textarea value={c.notes||''} placeholder="Notes..."
                  onChange={e=>updateColl(f.id,'notes',e.target.value)} rows={3}
                  style={{width:'100%',padding:'12px',background:T.bg3,border:`1px solid ${T.bd}`,borderRadius:10,color:T.t1,fontSize:14,resize:'vertical',fontFamily:"'Outfit',sans-serif"}}/>
              </div>
            </div>
          )}
          {/* Raw data debug — always visible so corrupt entries can be inspected and cleared */}
          <div style={{padding:'0 16px 16px'}}>
            <div style={{fontSize:11,color:T.t3,textTransform:'uppercase',letterSpacing:1.5,marginBottom:8}}>Stored Data</div>
            <div style={{background:T.bg3,border:`1px solid ${T.bd}`,borderRadius:10,padding:'12px',fontFamily:'monospace',fontSize:11,color:T.t2,wordBreak:'break-all',lineHeight:1.6,marginBottom:8}}>
              {JSON.stringify(coll[f.id] || {}, null, 2) || '(none)'}
            </div>
            {coll[f.id]?.variants !== undefined && (
              <button onClick={()=>updateColl(f.id,'variants','')}
                style={{padding:'8px 16px',borderRadius:8,border:'1px solid #f87171',background:'rgba(248,113,113,.1)',color:'#f87171',fontSize:12,cursor:'pointer',fontFamily:"'Outfit',sans-serif"}}>
                Clear variants field
              </button>
            )}
          </div>
          <div style={{height:'calc(32px + var(--safe-bottom))'}}/>
        </div>
      </div>
    );
  }

  // ── Main Screen ───────────────────────────────────────────────────────────
  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:T.bg,overflow:'hidden'}}>
      <style>{cssVars}</style>
      <GlobalStyles/>

      {/* Top bar */}

                <span style={{color:T.gold,fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700}}>
                  {activeSubline==='__all__'?'All Figures':(SUBLINES[activeLine]||[]).find(s=>s.key===activeSubline)?.label}

          </div>

                <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:T.t2,marginBottom:4}}>No figures found</div>

          const active = (tab===key && !activeLine) || (key==='lines'&&activeLine&&tab==='all');

            <button key={key} onClick={()=>{setTab(key);if(key!=='all'||!activeLine)setActiveLine(null);}}

            </button>

      {/* Bottom sheets */}
      {sheet && (
        <BottomSheet title={
          sheet==='filter'?'Filter':sheet==='sort'?'Sort By':sheet==='import'?'Import CSV':sheet==='theme'?'Theme':'Options'

            <FilterSheet filterFaction={filterFaction} setFilterFaction={setFilterFaction}
              filterStatus={filterStatus} setFilterStatus={setFilterStatus}

            <ThemeSheet theme={theme} setTheme={t=>{setTheme(t);setSheet(null);}} coll={coll} saveColl={saveColl} T={T}/>
          )}
        </BottomSheet>
      )}
    </div>
  );
}

// ── Line Grid ───────────────────────────────────────────────────────────────
function LineGrid({lineStats, lineOrder, setLineOrder, T, IMG, goToLine}) {
  const [editing, setEditing] = useState(false);

  const ordered = [...lineOrder]
    .map(id => lineStats.find(l => l.id === id))
    .filter(Boolean)
    .concat(lineStats.filter(l => !lineOrder.includes(l.id)));

  const move = (id, dir) => {
    setLineOrder(prev => {
      const arr = [...prev];
      const i = arr.indexOf(id);
      const j = i + dir;
      if (j < 0 || j >= arr.length) return prev;
      [arr[i], arr[j]] = [arr[j], arr[i]];
      return arr;
    });
  };

  return (
    <div>
      {/* Edit order button */}
      <div style={{display:'flex',justifyContent:'flex-end',padding:'0 16px 8px'}}>
        <button onClick={()=>setEditing(e=>!e)}
          style={{display:'flex',alignItems:'center',gap:5,padding:'5px 12px',borderRadius:8,
            border:`1px solid ${editing?T.acc:T.bd}`,
            background:editing?`${T.acc}22`:'none',
            color:editing?T.acc:T.t3,fontSize:11,
            cursor:'pointer',fontFamily:"'Outfit',sans-serif",transition:'all .15s'}}>
          {editing ? '✓ Done' : '⇅ Reorder'}
        </button>
      </div>
      {editing ? (
        // ── Reorder list ──
        <div style={{padding:'0 16px 16px',display:'flex',flexDirection:'column',gap:8}}>
          {ordered.map((l, idx) => (
            <div key={l.id} style={{display:'flex',alignItems:'center',gap:10,
              padding:'12px 14px',background:T.bg2,border:`1px solid ${T.bd}`,
              borderRadius:14}}>
              {/* Up/Down buttons */}
              <div style={{display:'flex',flexDirection:'column',gap:4,flexShrink:0}}>
                <button onClick={()=>move(l.id,-1)} disabled={idx===0}
                  style={{width:28,height:28,borderRadius:7,border:`1px solid ${idx===0?T.bd+'88':T.bd}`,
                    background:T.bg3,color:idx===0?T.t3+'44':T.t1,cursor:idx===0?'default':'pointer',
                    fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',
                    transition:'all .1s'}}>↑</button>
                <button onClick={()=>move(l.id,1)} disabled={idx===ordered.length-1}
                  style={{width:28,height:28,borderRadius:7,border:`1px solid ${idx===ordered.length-1?T.bd+'88':T.bd}`,
                    background:T.bg3,color:idx===ordered.length-1?T.t3+'44':T.t1,
                    cursor:idx===ordered.length-1?'default':'pointer',
                    fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',
                    transition:'all .1s'}}>↓</button>
              </div>
              {/* Line name */}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,color:T.t1}}>{l.name}</div>
                <div style={{fontSize:11,color:T.t3,marginTop:2}}>{l.yr} · {l.total} figures · {l.owned} owned</div>
              </div>
              {/* Completion */}
              <div style={{fontSize:12,fontWeight:600,color:l.pct===100?'#34d399':T.gold,flexShrink:0}}>
                {l.pct}%
              </div>
            </div>
          ))}
        </div>
      ) : (
        // ── Normal grid ──
        <div style={{padding:'0 16px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          {ordered.map(l => {
            const bannerImg = `${IMG}/${l.id}.jpg`;
            return (
              <div key={l.id}
                onClick={()=>goToLine(l.id)}
                style={{position:'relative',borderRadius:18,overflow:'hidden',
                  border:`1px solid ${T.bd}`,aspectRatio:'3/4',cursor:'pointer'}}>
                <img src={bannerImg} alt={l.name}
                  style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',objectPosition:'top'}}
                  onError={e=>e.target.style.display='none'}/>
                <div style={{position:'absolute',inset:0,
                  background:'linear-gradient(to bottom,rgba(0,0,0,.1) 0%,rgba(0,0,0,.3) 40%,rgba(0,0,0,.85) 100%)'}}/>
                <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 12px 14px'}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,
                    color:'#fff',lineHeight:1.2,marginBottom:2,
                    textShadow:'0 1px 4px rgba(0,0,0,.8)'}}>{l.name}</div>
                  <div style={{fontSize:10,color:'rgba(255,255,255,.6)',marginBottom:6}}>{l.yr}</div>
                  {l.total > 0 && <>
                    <div style={{height:2,background:'rgba(255,255,255,.2)',borderRadius:2,overflow:'hidden',marginBottom:4}}>
                      <div style={{height:'100%',width:`${l.pct}%`,
                        background:l.pct===100?'#34d399':T.gold,borderRadius:2}}/>
                    </div>
                    <div style={{fontSize:10,color:l.pct===100?'#34d399':'rgba(255,255,255,.7)',fontWeight:600}}>
                      {l.owned}/{l.total} · {l.pct}%</div>
                  </>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Subline Cards ────────────────────────────────────────────────────────────
function SublineCards({lineId, figs, coll, T, onSelect}) {
  const sublines = SUBLINES[lineId] || [];
  const allFigs  = figs.filter(f=>f.line===lineId);
  const allOwned = allFigs.filter(f=>coll[f.id]?.status==='owned').length;
  const allPct   = allFigs.length ? Math.round(allOwned/allFigs.length*100) : 0;
  return (
    <div style={{padding:16,display:'flex',flexDirection:'column',gap:12}}>
      {/* All figures card */}
      <button onClick={()=>onSelect('__all__')}
        style={{padding:'18px 20px',background:T.bg3,border:`2px solid ${T.bd}`,borderRadius:16,
          cursor:'pointer',textAlign:'left',WebkitAppearance:'none',fontFamily:"'Outfit',sans-serif",
          display:'flex',alignItems:'center',gap:16,transition:'all .15s'}}>
        <svg width={48} height={48} style={{flexShrink:0}}>
          <circle cx={24} cy={24} r={20} fill="none" stroke={T.bd} strokeWidth={3}/>
          <circle cx={24} cy={24} r={20} fill="none" stroke={allPct===100?'#34d399':T.gold} strokeWidth={3}
            strokeDasharray={`${2*Math.PI*20}`}
            strokeDashoffset={`${2*Math.PI*20*(1-allPct/100)}`}
            strokeLinecap="round" transform="rotate(-90 24 24)"
            style={{transition:'stroke-dashoffset .4s'}}/>
          <text x={24} y={28} textAnchor="middle" fill={allPct===100?'#34d399':T.gold}
            fontSize={11} fontWeight={700} fontFamily="'Outfit',sans-serif">{allPct}%</text>
        </svg>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:T.gold,marginBottom:4}}>All Figures</div>
          <div style={{fontSize:12,color:T.t3}}>{allOwned} owned of {allFigs.length}</div>
          <div style={{height:3,background:T.bd,borderRadius:2,marginTop:8,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${allPct}%`,background:allPct===100?'#34d399':T.gold,borderRadius:2,transition:'width .4s'}}/>
          </div>
        </div>
        <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={T.t3} strokeWidth={2} strokeLinecap="round">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
      {/* Divider */}
      <div style={{height:1,background:T.bd,margin:'0 4px'}}/>
      {sublines.map(sl => {
        const slFigs = figs.filter(f=>f.line===lineId && sl.groups.includes(f.group));
        const owned  = slFigs.filter(f=>coll[f.id]?.status==='owned').length;
        const pct    = slFigs.length ? Math.round(owned/slFigs.length*100) : 0;
        if (!slFigs.length) return null;
        return (
          <button key={sl.key} onClick={()=>onSelect(sl.key)}
            style={{padding:'18px 20px',background:T.bg2,border:`1px solid ${T.bd}`,borderRadius:16,
              cursor:'pointer',textAlign:'left',WebkitAppearance:'none',fontFamily:"'Outfit',sans-serif",
              display:'flex',alignItems:'center',gap:16,transition:'all .15s'}}>
            {/* Progress ring */}
            <svg width={48} height={48} style={{flexShrink:0}}>
              <circle cx={24} cy={24} r={20} fill="none" stroke={T.bd} strokeWidth={3}/>
              <circle cx={24} cy={24} r={20} fill="none" stroke={pct===100?'#34d399':T.acc} strokeWidth={3}
                strokeDasharray={`${2*Math.PI*20}`}
                strokeDashoffset={`${2*Math.PI*20*(1-pct/100)}`}
                strokeLinecap="round" transform="rotate(-90 24 24)"
                style={{transition:'stroke-dashoffset .4s'}}/>
              <text x={24} y={28} textAnchor="middle" fill={pct===100?'#34d399':T.t1}
                fontSize={11} fontWeight={700} fontFamily="'Outfit',sans-serif">{pct}%</text>
            </svg>
            {/* Text */}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:T.t1,marginBottom:4}}>{sl.label}</div>
              <div style={{fontSize:12,color:T.t3}}>{owned} owned of {slFigs.length}</div>
              {/* Mini progress bar */}
              <div style={{height:3,background:T.bd,borderRadius:2,marginTop:8,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${pct}%`,background:pct===100?'#34d399':T.acc,borderRadius:2,transition:'width .4s'}}/>
              </div>
            </div>
            {/* Arrow */}
            <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={T.t3} strokeWidth={2} strokeLinecap="round">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </button>
        );
      })}
    </div>
  );
}

// ── Photo Section ────────────────────────────────────────────────────────────
function PhotoSection({f, imgUrl, T, hasCustom, onImgErr, onPhoto, onClearPhoto}) {
  const fileRef = useRef();
  const [localUrl, setLocalUrl] = useState(imgUrl);

  // Keep in sync if imgUrl changes (e.g. iErr clears)
  useEffect(()=>setLocalUrl(imgUrl),[imgUrl]);

  const handleFile = e => {
    const file = e.target.files?.[0]; if(!file) return;
    if (file.size > 20000000) { alert('Image too large. Please choose an image under 20MB.'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      // Compress: resize to max 600px, JPEG quality 0.65
      const img = new Image();
      img.onload = () => {
        const MAX = 600;
        const scale = Math.min(1, MAX / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.65);
        setLocalUrl(dataUrl);
        onPhoto(dataUrl);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  return (
    <div style={{position:'relative',background:T.bg3}}>
      <div style={{aspectRatio:'1',maxHeight:320,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
        {localUrl
          ? <img src={localUrl} alt={f.name} onError={onImgErr}
              style={{width:'100%',height:'100%',objectFit:'contain'}}/>
          : <div style={{fontFamily:"'Cinzel',serif",fontSize:72,color:T.t3,fontWeight:900}}>{f.name[0]}</div>
        }
      </div>
      {/* Photo controls overlay */}
      <div style={{position:'absolute',bottom:10,right:10,display:'flex',gap:8}}>
        <button onClick={()=>fileRef.current.click()}
          style={{padding:'8px 14px',borderRadius:10,background:'rgba(0,0,0,.65)',border:'1px solid rgba(255,255,255,.15)',color:'#fff',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:6,fontFamily:"'Outfit',sans-serif",backdropFilter:'blur(4px)'}}>

        )}

  );
}

// ── Sort Sheet ──────────────────────────────────────────────────────────────
function SortSheet({sortBy,setSortBy,T}) {

    {v:'name',      l:'Name A → Z'},

// ── Import Sheet ────────────────────────────────────────────────────────────
function ImportSheet({onImport, T}) {
  const [result, setResult] = useState(null);
  const [busy, setBusy]     = useState(false);
  const [overwrite, setOverwrite] = useState(false);
  const [drag, setDrag]     = useState(false);
  const fileRef = useRef();

  const handle = text => {
    setBusy(true);
    setTimeout(()=>{ setResult(onImport(text, overwrite)); setBusy(false); }, 50);
  };

  return (
    <div style={{padding:'0 20px 20px'}}>
      {!result && !busy && <>
        <p style={{fontSize:14,color:T.t2,marginBottom:16,lineHeight:1.6}}>
          Export your collection from ActionFigure411.com, then drop the CSV file below. Only MOTU figures will be imported.
        </p>
        {/* Overwrite toggle */}
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',background:T.bg3,borderRadius:12,marginBottom:16,cursor:'pointer'}} onClick={()=>setOverwrite(o=>!o)}>
          <div style={{width:24,height:24,borderRadius:6,border:`2px solid ${overwrite?T.acc:T.bd}`,background:overwrite?T.acc:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .15s'}}>
            {overwrite && <Icon d={ICO.check} s={14}/>}
          </div>
          <div>
            <div style={{fontSize:14,color:T.t1,fontWeight:500}}>Overwrite existing</div>
            <div style={{fontSize:12,color:T.t3}}>Re-import figures already marked as owned</div>
          </div>
        </div>
        {/* Drop zone */}
        <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f){const r=new FileReader();r.onload=ev=>handle(ev.target.result);r.readAsText(f);}}} onClick={()=>fileRef.current.click()}
          style={{border:`2px dashed ${drag?T.acc:T.bd}`,borderRadius:16,padding:'40px 20px',textAlign:'center',cursor:'pointer',background:drag?`${T.acc}11`:'transparent',transition:'all .15s'}}>
          <div style={{fontSize:48,marginBottom:12}}>📂</div>
          <div style={{fontSize:15,color:T.t1,fontWeight:500,marginBottom:4}}>Drop export.csv here</div>
          <div style={{fontSize:13,color:T.t3}}>or tap to browse files</div>
          <input ref={fileRef} type="file" accept=".csv" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>handle(ev.target.result);r.readAsText(f);}}}/>
        </div>
      </>}
      {busy && <div style={{textAlign:'center',padding:'40px 0'}}>
        <div style={{fontSize:32,marginBottom:12}}>⚙️</div>
        <div style={{color:T.t2,fontSize:15}}>Importing...</div>
      </div>}
      {result && <div style={{textAlign:'center',padding:'20px 0'}}>
        <div style={{fontSize:48,marginBottom:12}}>{result.matched>0?'✅':'🤷'}</div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:22,color:T.gold,marginBottom:4}}>{result.matched} imported</div>
        {result.skipped>0 && <div style={{fontSize:13,color:T.t3,marginBottom:8}}>{result.skipped} already owned, skipped</div>}
        {result.unmatched.length>0 && <details style={{textAlign:'left',marginTop:16}}>
          <summary style={{fontSize:13,color:T.t3,cursor:'pointer',padding:'8px 0'}}>{result.unmatched.length} not found in app</summary>
          <div style={{marginTop:8,maxHeight:160,overflowY:'auto',fontSize:12,color:T.t3,lineHeight:2}}>
            {result.unmatched.map((u,i)=><div key={i}>{u}</div>)}
          </div>
        </details>}
        <button onClick={()=>setResult(null)} style={{marginTop:20,padding:'12px 32px',borderRadius:12,border:`1px solid ${T.bd}`,background:T.bg3,color:T.t1,fontSize:14,cursor:'pointer',fontFamily:"'Outfit',sans-serif"}}>Import Another</button>
      </div>}
    </div>
  );
}

// ── Theme Sheet ─────────────────────────────────────────────────────────────
function ThemeSheet({theme, setTheme, coll, saveColl, T}) {
  const [repairDone, setRepairDone] = useState(null); // null | { fixed, names }

  // Find entries with a variants field that has no real characters
  const corrupt = Object.entries(coll).filter(([, entry]) =>
    entry?.variants !== undefined && !/\w/.test(entry.variants)
  );

  const repair = () => {
    const names = corrupt.map(([id]) => id);
    const cleaned = Object.fromEntries(Object.entries(coll).map(([id, entry]) => {
      if ((entry?.variants||'').replace(/[,\s]/g,'').length === 0) {
        const { variants, ...rest } = entry;
        return [id, rest];
      }
      return [id, entry];
    }));
    saveColl(cleaned);
    setRepairDone({ fixed: names.length, names });
  };

  return (
    <div style={{padding:'0 20px 20px',display:'flex',flexDirection:'column',gap:10}}>
      {Object.entries(THEMES).map(([key,Th])=>(
        <button key={key} onClick={()=>setTheme(key)}
          style={{padding:'16px',borderRadius:14,border:`2px solid ${theme===key?Th.acc:Th.bd}`,background:Th.bg2,cursor:'pointer',display:'flex',alignItems:'center',gap:14,textAlign:'left',fontFamily:"'Outfit',sans-serif"}}>
          <div style={{width:40,height:40,borderRadius:10,background:`linear-gradient(135deg,${Th.gold},${Th.acc})`,flexShrink:0}}/>
          <div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:Th.t1}}>{Th.name}</div>
            <div style={{fontSize:12,color:Th.t2,marginTop:2}}>{Th.bg} · {Th.acc}</div>
          </div>
          {theme===key && <div style={{marginLeft:'auto',color:Th.acc}}><Icon d={ICO.check} s={20}/></div>}
        </button>
      ))}

      {/* Variants diagnostic — shows every coll entry passing the variants filter */}
      {(() => {
        const passing = Object.entries(coll).filter(([, e]) => /\w/.test(e?.variants||''));
        if (!passing.length) return null;
        return (
          <div style={{marginTop:8,padding:'16px',borderRadius:14,border:`1px solid ${T.bd}`,background:T.bg3}}>
            <div style={{fontSize:11,color:T.t3,textTransform:'uppercase',letterSpacing:1,marginBottom:10}}>Variant Filter Matches ({passing.length})</div>
            {passing.map(([id, entry]) => (
              <div key={id} style={{marginBottom:10,paddingBottom:10,borderBottom:`1px solid ${T.bd}`}}>
                <div style={{fontSize:11,color:T.acc,fontFamily:'monospace',marginBottom:2}}>{id}</div>
                <div style={{fontSize:11,color:T.t2,fontFamily:'monospace',wordBreak:'break-all',marginBottom:6}}>variants: "{entry.variants}"</div>
                <button onClick={()=>{
                  const {variants,...rest} = entry;
                  saveColl({...coll,[id]:rest});
                }} style={{padding:'5px 12px',borderRadius:7,border:'1px solid #f87171',background:'rgba(248,113,113,.1)',color:'#f87171',fontSize:11,cursor:'pointer',fontFamily:"'Outfit',sans-serif"}}>
                  Clear variants
                </button>
              </div>
            ))}
          </div>
        );
      })()}
    </div>
  );
}

// ── Error Boundary ──────────────────────────────────────────────────────────
// Catches any render-time throw and shows a readable crash screen instead of
// a blank page. Without this, React 18 silently unmounts the entire tree.
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(err, info) { console.error('MOTU Vault render error:', err, info); }
  render() {
    if (this.state.err) {
      return (
        <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',
          justifyContent:'center',background:'#08080f',padding:32,fontFamily:"'Outfit',sans-serif"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:28,fontWeight:900,color:'#d4a843',marginBottom:8}}>M</div>
          <div style={{color:'#f87171',fontSize:15,fontWeight:600,marginBottom:8}}>Something went wrong</div>
          <div style={{color:'#9a92b0',fontSize:12,marginBottom:24,textAlign:'center',maxWidth:320,lineHeight:1.6}}>
            {this.state.err.message || 'Unknown error'}
          </div>
          <button onClick={()=>this.setState({err:null})}
            style={{padding:'10px 24px',borderRadius:10,border:'1px solid #d4a843',background:'none',
              color:'#d4a843',cursor:'pointer',fontSize:14,fontFamily:"'Outfit',sans-serif"}}>
            Try Again
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
