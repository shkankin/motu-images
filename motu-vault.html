      <div>
        <div class="field-label text-dim text-sm">Variants Owned</div>
        <input type="text" value="${esc(c.variants||'')}" placeholder="e.g. Dark Face, Painted Back…" onchange="updateColl('${f.id}','variants',this.value);saveColl()">
        <div class="field-hint">Comma-separate multiple variants</div>
      </div>
      <div>
        <div class="field-label text-dim text-sm">Notes</div>
        <textarea rows="3" placeholder="Notes…" onchange="updateColl('${f.id}','notes',this.value);saveColl()">${esc(c.notes||'')}</textarea>
      </div>
    </div>` : ''}
    <div class="detail-spacer"></div>
  </div>`;
  app().innerHTML = html;
}

// ─── Sheets ───────────────────────────────────────────────────────
function renderSheet() {
  const titles = {filter:'Filter', sort:'Sort By', import:'Import', export:'Export / Backup', theme:'Theme', menu:'Settings', stats:'Collection Stats'};
  let body = '';
  if (S.sheet === 'filter') body = renderFilterSheet();
  else if (S.sheet === 'sort') body = renderSortSheet();
  else if (S.sheet === 'import') body = renderImportSheet();
  else if (S.sheet === 'export') body = renderExportSheet();
  else if (S.sheet === 'theme') body = renderThemeSheet();
  else if (S.sheet === 'menu') body = renderMenuSheet();
  else if (S.sheet === 'stats') body = renderStatsSheet();

  return `<div class="sheet-overlay" id="sheetOverlay" onclick="if(event.target===this||event.target.classList.contains('sheet-backdrop'))closeSheet()">
    <div class="sheet-backdrop"></div>
    <div class="sheet-panel">
      <div class="sheet-handle"><div class="sheet-handle-bar"></div></div>
      <div class="sheet-header">
        <div class="sheet-title">${titles[S.sheet]||'Options'}</div>
        <button class="sheet-close" onclick="closeSheet()">${icon(ICO.x,20)}</button>
      </div>
      <div class="sheet-body">${body}</div>
    </div>
  </div>`;
}

function renderMenuSheet() {
  const menuItems = [
    {label:'Collection Stats',    icon:ICO.heart, action:"openSheet('stats')"},
    {label:'Theme',              icon:ICO.palette, action:"openSheet('theme')"},
    {label:'Manage Collections', icon:ICO.sort, action:"closeSheet();S.editingOrder=true;S.tab='lines';S.activeLine=null;S.activeSubline=null;render()"},
    {label:'Import',             icon:ICO.import, action:"openSheet('import')"},
    {label:'Export / Backup',    icon:ICO.export, action:"openSheet('export')"},
  ];
  return menuItems.map(m => `
    <button onclick="${m.action}" style="width:100%;display:flex;align-items:center;gap:14px;padding:16px;border-radius:12px;border:1px solid var(--bd);background:var(--bg3);margin-bottom:10px;text-align:left;font-size:15px;color:var(--t1)">
      <span style="color:var(--acc)">${icon(m.icon, 20)}</span>
      ${m.label}
      <span style="margin-left:auto;color:var(--t3)">${icon(ICO.chevR, 16)}</span>
    </button>`).join('');
}

function renderFilterSheet() {
  let html = '<div class="label text-upper text-dim text-xs" style="margin-bottom:10px">Faction</div><div class="chip-group">';
  ['', ...FACTIONS].forEach(f => {
    html += `<button class="chip ${S.filterFaction===f?'active':''}" onclick="S.filterFaction='${esc(f)}';S.savedScroll=0;render()">${f||'All'}</button>`;
  });
  html += '</div><div class="label text-upper text-dim text-xs" style="margin-bottom:10px">Status</div><div class="chip-group">';
  const statusOpts = [
    {v:'', l:'All'}, ...STATUSES.map(s => ({v:s, l:STATUS_LABEL[s]})), {v:'unowned', l:'Unowned'}
  ];
  statusOpts.forEach(s => {
    const active = S.filterStatus === s.v;
    html += `<button class="chip ${active?'active':''}" onclick="S.filterStatus='${s.v}';S.savedScroll=0;render()">${s.l}</button>`;
  });
  html += '</div><div class="label text-upper text-dim text-xs" style="margin-bottom:10px">Variants</div><div class="chip-group">';
  html += `<button class="chip ${!S.filterVariants?'active':''}" onclick="S.filterVariants=false;S.savedScroll=0;render()">All</button>`;
  html += `<button class="chip ${S.filterVariants?'active':''}" onclick="S.filterVariants=true;S.savedScroll=0;render()">Has Variants</button>`;
  html += '</div>';
  if (hasFilters()) html += `<button class="clear-all-btn" onclick="S.filterFaction='';S.filterStatus='';S.filterVariants=false;S.search='';S.savedScroll=0;render()">Clear All Filters</button>`;
  return html;
}

function renderSortSheet() {
  const opts = [
    {v:'year',l:'Year — oldest first (default)'},{v:'year-desc',l:'Year — newest first'},
    {v:'wave',l:'Wave'},{v:'name',l:'Name A → Z'},{v:'name-desc',l:'Name Z → A'},
    {v:'retail',l:'Price (low → high)'},{v:'retail-desc',l:'Price (high → low)'},
  ];
  return opts.map(o => `<button class="sort-option ${S.sortBy===o.v?'active':''}" onclick="S.sortBy='${o.v}';store.set('motu-sort',S.sortBy);closeSheet()">
    ${o.l}${S.sortBy===o.v ? icon(ICO.check,18) : ''}
  </button>`).join('');
}

function renderImportSheet() {
  return `<p class="text-md text-muted" style="margin-bottom:16px;line-height:1.6">
    Import from ActionFigure411.com CSV, a MOTU Vault CSV export, or restore a JSON backup.
  </p>
  <div class="overwrite-toggle" onclick="this.querySelector('.checkbox').classList.toggle('checked')">
    <div class="checkbox"><span style="color:#fff">${icon(ICO.check,14)}</span></div>
    <div>
      <div class="text-md" style="font-weight:500">Overwrite existing</div>
      <div class="text-sm text-dim">Re-import figures already marked as owned</div>
    </div>
  </div>
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('csvInput').click()">
    <div style="font-size:48px;margin-bottom:12px">📂</div>
    <div class="text-md" style="font-weight:500;margin-bottom:4px">Drop CSV or JSON backup here</div>
    <div class="text-sm text-dim">or tap to browse files</div>
    <input type="file" id="csvInput" accept=".csv,.json" style="display:none" onchange="handleImportFile(this)">
  </div>`;
}

function renderThemeSheet() {
  return Object.entries(THEMES).map(([key, th]) =>
    `<button class="theme-option" style="border-color:${S.theme===key?th.acc:'var(--bd)'};background:${th.bg}" onclick="setTheme('${key}')">
      <div class="swatch" style="background:linear-gradient(135deg,${th.gold},${th.acc})"></div>
      <div style="flex:1">
        <div class="font-display" style="font-size:15px;color:#eae6f2">${th.name}</div>
        <div class="text-sm" style="color:#9a92b0;margin-top:2px">${th.bg} · ${th.acc}</div>
      </div>
      ${S.theme===key ? `<div style="color:${th.acc}">${icon(ICO.check,20)}</div>` : ''}
    </button>`
  ).join('');
}

// ─── History Management ───────────────────────────────────────────
// Each navigation action pushes a state so Android/browser back button
// walks backward through the app instead of closing it.
let _skipPush = false; // flag to avoid pushing during popstate handling

function navState() {
  // Snapshot of the navigable state (not the full S — just what back needs)
  return {
    screen: S.screen,
    tab: S.tab,
    activeLine: S.activeLine,
    activeSubline: S.activeSubline,
    activeFigId: S.activeFig?.id || null,
    sheet: S.sheet,
    search: S.search,
  };
}

function pushNav() {
  if (_skipPush) return;
  history.pushState(navState(), '');
}

function restoreNav(state) {
  if (!state) return;
  S.screen = state.screen || 'main';
  S.tab = state.tab || 'lines';
  S.activeLine = state.activeLine || null;
  S.activeSubline = state.activeSubline || null;
  S.activeFig = state.activeFigId ? S.figs.find(f => f.id === state.activeFigId) || null : null;
  S.sheet = state.sheet || null;
  S.search = state.search || '';
}

// Listen for back button (Android hardware back, browser back, swipe back)
window.addEventListener('popstate', e => {
  _skipPush = true;

  // If a sheet is open, just close it (don't go further back)
  if (S.sheet) {
    S.sheet = null;
    render();
    _skipPush = false;
    return;
  }

  // If on figure detail, go back to list
  if (S.screen === 'figure') {
    S.screen = 'main';
    render();
    _skipPush = false;
    return;
  }

  // If viewing a subline, go back to line
  if (S.activeSubline) {
    S.activeSubline = null;
    render();
    _skipPush = false;
    return;
  }

  // If viewing a line, go back to lines grid
  if (S.activeLine) {
    S.activeLine = null;
    S.activeSubline = null;
    S.tab = 'lines';
    render();
    _skipPush = false;
    return;
  }

  // If searching, clear search
  if (S.search) {
    S.search = '';
    render();
    _skipPush = false;
    return;
  }

  // At root — push a state back so next back press has something to pop
  // This prevents the app from closing on the first back press at home
  history.pushState(navState(), '');
  _skipPush = false;
});

// Seed the initial history entry so we always have something to pop
history.replaceState(navState(), '');

// ─── Event Handlers ───────────────────────────────────────────────
let _searchTimer = null;
window.onSearch = val => {
  S.search = val;
  if (val) S.tab = 'all';
  // Clearing search — do full render to restore UI (clear button, breadcrumbs, tab state)
  if (!val) { pushNav(); render(); return; }
  // Typing — surgical content update only, preserves input focus
  if (_searchTimer) cancelAnimationFrame(_searchTimer);
  _searchTimer = requestAnimationFrame(() => {
    const ca = document.getElementById('contentArea');
    if (ca) {
      ca.innerHTML = '<div id="topSpacer"></div>' + renderContent();
      const tb = document.getElementById('topBar');
      const ts = document.getElementById('topSpacer');
      if (ts && tb) ts.style.height = tb.offsetHeight + 'px';
    }
    // Show clear button if it's not already there
    const wrap = document.querySelector('.search-wrap');
    const inp = document.getElementById('searchInput');
    if (wrap && inp && !wrap.querySelector('.search-clear')) {
      const btn = document.createElement('button');
      btn.className = 'search-clear';
      btn.innerHTML = icon(ICO.x, 14);
      btn.onclick = () => onSearch('');
      wrap.appendChild(btn);
    }
    _searchTimer = null;
  });
};
window.navTo = key => { S.tab = key; S.searchBarHidden = false; S.barsHidden = false; if (key !== 'all' || !S.activeLine) { S.activeLine = null; S.activeSubline = null; } pushNav(); render(); };
window.goToLine = id => { S.activeLine = id; S.activeSubline = null; S.tab = 'all'; S.savedScroll = 0; S.searchBarHidden = false; S.barsHidden = false; S._justNavigated = true; pushNav(); render(); };
window.goBack = () => { history.back(); };
window.goHome = () => { S.tab = 'lines'; S.activeLine = null; S.activeSubline = null; S.search = ''; S.savedScroll = 0; S.searchBarHidden = false; S.barsHidden = false; pushNav(); render(); };
window.clearSubline = () => { history.back(); };
window.selectSubline = key => { S.activeSubline = key; S.tab = 'all'; S.savedScroll = 0; S.searchBarHidden = false; S._justNavigated = true; pushNav(); render(); };
window.toggleReorder = () => { S.editingOrder = !S.editingOrder; render(); };
window.goToFiltered = status => {
  S.sheet = null;
  S.filterStatus = status;
  S.filterFaction = '';
  S.filterVariants = false;
  S.activeLine = null;
  S.activeSubline = null;
  S.tab = 'all';
  S.savedScroll = 0;
  S.barsHidden = false;
  S.searchBarHidden = false;
  pushNav();
  render();
};
window.toggleHidden = toggleHidden;
window.moveLine = (id, dir) => {
  const arr = [...S.lineOrder]; const i = arr.indexOf(id); const j = i + dir;
  if (j < 0 || j >= arr.length) return;
  [arr[i], arr[j]] = [arr[j], arr[i]];
  S.lineOrder = arr; store.set('motu-line-order', arr); render();
};

window.openFig = id => {
  const ca = document.getElementById('contentArea');
  if (ca) S.savedScroll = ca.scrollTop;
  S.activeFig = S.figs.find(f => f.id === id);
  S.screen = 'figure'; pushNav(); render();
};
window.closeDetail = () => { history.back(); };
window.deleteFig = id => {
  if (!confirm('Delete this figure?')) return;
  S.figs = S.figs.filter(f => f.id !== id);
  delete S.coll[id]; saveColl();
  S.screen = 'main'; render();
};

window.openSheet = name => { S.sheet = name; pushNav(); render();
  requestAnimationFrame(() => { const el = document.getElementById('sheetOverlay'); if (el) el.classList.add('visible'); });
};
window.closeSheet = () => { history.back(); };
window.setTheme = t => { S.theme = t; S.titleIdx = 0; S.iconIdx = 0; store.set('motu-theme', t); document.documentElement.setAttribute('data-theme', t); closeSheet(); };
window.imgErr = id => { S.imgErrors[id] = true; };

// Long-press status cycle: owned → wishlist → ordered → for-sale → clear
const STATUS_CYCLE = ['owned','wishlist','ordered','for-sale', ''];
window.cycleStatus = (e, id) => {
  e.stopPropagation();
  const cur = S.coll[id]?.status || '';
  const idx = STATUS_CYCLE.indexOf(cur);
  const next = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
  if (next) {
    if (!S.coll[id]) S.coll[id] = {};
    S.coll[id].status = next;
  } else {
    if (S.coll[id]) { delete S.coll[id].status; if (!Object.keys(S.coll[id]).length) delete S.coll[id]; }
  }
  saveColl();
  if (!patchFigRow(id)) render();
};

window.handlePhoto = (input, figId) => {
  const file = input.files?.[0]; if (!file) return;
  if (file.size > 20000000) { alert('Image too large (max 20MB).'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = async () => {
      const MAX = 600;
      const scale = Math.min(1, MAX / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.65));
      const ok = await photoStore.save(figId, blob);
      if (!ok) { alert('Storage full.'); return; }
      S.customPhotos[figId] = true;
      S.imgErrors[figId] = false;
      renderDetail();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
};
window.clearPhoto = async id => {
  await photoStore.del(id); delete S.customPhotos[id]; renderDetail();
};

window.handleCSV = input => {
  const file = input.files?.[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const overwrite = document.querySelector('.checkbox.checked') !== null;
    const result = doImport(ev.target.result, overwrite);
    const body = document.querySelector('.sheet-body');
    if (body) {
      body.innerHTML = `<div style="text-align:center;padding:20px 0">
        <div style="font-size:48px;margin-bottom:12px">${result.matched>0?'✅':'🤷'}</div>
        <div class="font-display" style="font-size:22px;color:var(--gold);margin-bottom:4px">${result.matched} imported</div>
        ${result.skipped>0 ? `<div class="text-sm text-dim" style="margin-bottom:8px">${result.skipped} already owned, skipped</div>` : ''}
        ${result.unmatched.length>0 ? `<details style="text-align:left;margin-top:16px">
          <summary class="text-sm text-dim" style="cursor:pointer;padding:8px 0">${result.unmatched.length} not found in app</summary>
          <div style="margin-top:8px;max-height:160px;overflow-y:auto;font-size:12px;color:var(--t3);line-height:2">${result.unmatched.map(u=>'<div>'+esc(u)+'</div>').join('')}</div>
        </details>` : ''}
      </div>`;
    }
  };
  reader.readAsText(file);
};

// Drop zone support
document.addEventListener('dragover', e => {
  e.preventDefault();
  const dz = document.getElementById('dropZone');
  if (dz) dz.classList.add('dragover');
});
document.addEventListener('dragleave', () => {
  const dz = document.getElementById('dropZone');
  if (dz) dz.classList.remove('dragover');
});
document.addEventListener('drop', e => {
  e.preventDefault();
  const dz = document.getElementById('dropZone');
  if (dz) {
    dz.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) {
      if (file.name.endsWith('.json')) {
        importJSON(file);
      } else {
        const r = new FileReader();
        r.onload = ev => {
          const overwrite = document.querySelector('.checkbox.checked') !== null;
          const result = doImport(ev.target.result, overwrite);
          const body = document.querySelector('.sheet-body');
          if (body) {
            body.innerHTML = `<div style="text-align:center;padding:20px 0">
              <div style="font-size:48px;margin-bottom:12px">${result.matched>0?'✅':'🤷'}</div>
              <div class="font-display" style="font-size:22px;color:var(--gold);margin-bottom:4px">${result.matched} imported</div>
            </div>`;
          }
        };
        r.readAsText(file);
      }
    }
  }
});

// ─── Boot ─────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
  // Listen for background update notification from SW
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'UPDATE_AVAILABLE') {
      // Auto-reload on next user interaction to pick up new version
      const handler = () => {
        window.removeEventListener('touchstart', handler);
        window.removeEventListener('click', handler);
        window.location.reload();
      };
      window.addEventListener('touchstart', handler, {once: true});
      window.addEventListener('click', handler, {once: true});
    }
  });
}
init();
</script>
</body>
</html>
