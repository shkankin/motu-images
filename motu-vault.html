<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06060c">
<meta name="color-scheme" content="dark light">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="description" content="Track your Masters of the Universe action figure collection — works offline, no account needed.">
<title>MOTU Collector</title>
<!-- Preload the splash logo in parallel with HTML parse -->
<link rel="preload" as="image" href="masters_logo.png" fetchpriority="high">
<!-- Paint black immediately + define splash styles inline so they apply at
     first paint (independent of external stylesheet loading). -->
<style>
html,body{background:#000;margin:0}
.splash{position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;contain:strict}
/* Logo: rise from below starting huge, settle at 1/3 from top, hold, recede. 2.8s total. */
.splash-logo{
  width:280px;max-width:70vw;
  transform:translate3d(0,120vh,0) scale(2.4);
  opacity:0;
  will-change:transform,opacity;
  backface-visibility:hidden;
  filter:drop-shadow(0 0 40px rgba(255,204,51,.5));
  animation:splashLogo 2.8s cubic-bezier(.33,.1,.33,1) forwards;
}
@keyframes splashLogo{
  0%   {transform:translate3d(0,120vh,0) scale(2.4); opacity:0}
  10%  {opacity:1}
  25%  {transform:translate3d(0,-17vh,0) scale(1);   opacity:1}
  75%  {transform:translate3d(0,-17vh,0) scale(1);   opacity:1}
  100% {transform:translate3d(0,-140vh,0) scale(.08); opacity:0}
}
/* Single flash during hold phase */
.splash-flash{
  position:absolute;inset:0;background:#fff;opacity:0;
  pointer-events:none;will-change:opacity;mix-blend-mode:screen;
  animation:splashFlash .28s ease-out 1.35s forwards;
}
@keyframes splashFlash{
  0%  {opacity:0}
  25% {opacity:.7}
  100%{opacity:0}
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>
<link rel="dns-prefetch" href="https://raw.githubusercontent.com">
<!-- Load fonts CSS without blocking first paint; applies when ready. -->
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@400;500;600;700&display=swap"></noscript>
<link rel="stylesheet" href="vault.css">
<!-- v6.01: parallel ES module fetch + pre-parse -->
<link rel="modulepreload" href="./js/state.js">
<link rel="modulepreload" href="./js/photos.js">
<link rel="modulepreload" href="./js/data.js">
<link rel="modulepreload" href="./js/eggs.js">
<link rel="modulepreload" href="./js/render.js">
<link rel="modulepreload" href="./js/handlers.js">
<link rel="modulepreload" href="./js/ui-sheets.js">
<link rel="modulepreload" href="./js/app.js">
</head>
<body>

  <a href="#app" class="skip-link">Skip to main content</a>
  <div id="routeAnnouncer" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>
<!-- v5.01: splash temporarily disabled per user request. Restore by removing the comment markers.
<div class="splash" id="splash">
  <img class="splash-logo" src="masters_logo.png" alt="Masters of the Universe" onerror="this.parentElement.remove()">
  <div class="splash-flash"></div>
</div>
-->
<noscript><div style="padding:40px 20px;text-align:center;color:#fff;font-family:system-ui">MOTU Vault requires JavaScript to run. Please enable it in your browser settings.</div></noscript>
<div id="app"></div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
