const SERIES_MAP = {
  'Origins':'origins','Masterverse':'masterverse','Mattel Classics':'classics',
  'Mattel 200x':'200x','Eternia Minis':'eternia-minis','Mondo':'mondo',
  'Super7':'super7','The New Adventures of He-Man':'new-adventures','Original':'original',
};
const COND_MAP = {'Boxed':'Mint in Box','Loose':'Loose Complete','Incomplete':'Loose Incomplete','Damaged':'Damaged','':''};

// Maps AF411 CSV group names to seed group names
const GROUP_MAP = {
  'Origins Action Figures':'Action Figures',
  'Origins Deluxe':'Action Figures',
  'Origins Exclusives':'Exclusives',
  'Origins Beasts, Vehicles and Playsets':'Vehicles & Playsets',
  'Turtles of Grayskull':'Turtles of Grayskull',
  'Stranger Things Crossover':'Crossovers',
  'Thundercats Crossover':'Crossovers',
  'Transformers Collaboration':'Crossovers',
  'Revelation Action Figures':'Revelation',
  'Revelation Deluxe Figures':'Revelation Deluxe',
  'Eternia Action Figures':'Action Figures',
  'Eternia Vehicles and Playsets':'Vehicles & Playsets',
  'Original Action Figures':'Action Figures',
  'Original Vehicles and Playsets':'Vehicles and Playsets',
};

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const parseRow = line => {
    const cols=[]; let cur=''; let inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur);cur='';}
      else cur+=c;
    }
    cols.push(cur); return cols;
  };
  const headers = parseRow(lines[0]).map(h=>h.trim());
  const idx = h => headers.indexOf(h);
  const [iGenre,iSeries,iGroup,iName,iPaid,iCond,iNote,iWhere] =
    ['Genre','Series','Group','Name','Purchase Price','Condition','Note','Where Purchased'].map(idx);
  return lines.slice(1).map(l => {
    const c = parseRow(l);
    const csvGroup = c[iGroup]?.trim() || '';
    const mappedGroup = GROUP_MAP[csvGroup] || csvGroup;
    return { genre:c[iGenre], series:c[iSeries], name:c[iName]?.trim(),
      group:mappedGroup, paid:c[iPaid]?.trim(), cond:COND_MAP[c[iCond]?.trim()]||'',
      note:c[iNote]?.trim(), where:c[iWhere]?.trim() };
  }).filter(r => r.genre === 'Masters of the Universe' && SERIES_MAP[r.series]);
}

    ${theme === 'motu' ? `

  const saveColl = useCallback(c => { setColl(c); store.set('motu-c2', c); }, []);

  const setStatus = useCallback((id, status) => {
    setColl(prev => {
      const n = { ...prev };
      if (!n[id]) n[id] = {};
      if (n[id].status === status) { delete n[id].status; if (!Object.keys(n[id]).length) delete n[id]; }
      else n[id] = { ...n[id], status };
      store.set('motu-c2', n);

    });

  const updateColl = useCallback((id, key, val) => {
    setColl(prev => {
      const n = { ...prev, [id]: { ...prev[id], [key]: val } };
      store.set('motu-c2', n);
      return n;
    });
  }, []);

  const deleteFig = useCallback(id => {
    const f = figs.filter(x => x.id !== id);
    saveFigs(f);
    setColl(prev => { const n = { ...prev }; delete n[id]; store.set('motu-c2', n); return n; });
  }, [figs, saveFigs]);

  // Import
  const doImport = useCallback((csvText, overwrite=false) => {
    const motuRows = parseCSV(csvText);
    // Build both a 3-key index (name+line+group) and a 2-key index (name+line)
    const idx3 = {}, idx2 = {};
    figs.forEach(f => {
      const k3 = normalize(f.name) + '|' + f.line + '|' + normalize(f.group||'');
      const k2 = normalize(f.name) + '|' + f.line;
      if (!idx3[k3]) idx3[k3] = f;
      idx2[k2] = idx2[k2] ? 'AMBIGUOUS' : f;
    });
    let matched=0, skipped=0, unmatched=[];
    const newColl = { ...coll };
    motuRows.forEach(row => {
      const lineId = SERIES_MAP[row.series];
      const k3 = normalize(row.name) + '|' + lineId + '|' + normalize(row.group||'');
      const k2 = normalize(row.name) + '|' + lineId;
      // Try 3-key first (precise), fall back to unambiguous 2-key
      const fig = idx3[k3] || (idx2[k2] !== 'AMBIGUOUS' ? idx2[k2] : null);
      if (!fig) { unmatched.push(ln(lineId) + ': ' + row.name + (row.group ? ' [' + row.group + ']' : '')); return; }
      if (!overwrite && newColl[fig.id]?.status === 'owned') { skipped++; return; }
      const note = [row.note, row.where ? 'From: ' + row.where : ''].filter(Boolean).join(' | ');
      newColl[fig.id] = { ...newColl[fig.id], status:'owned',
        ...(row.cond && {condition:row.cond}),
        ...(row.paid && {paid:row.paid}),
        ...(note && {notes:note}),
      };
      matched++;
    });
    saveColl(newColl);
    return { matched, skipped, unmatched };
  }, [figs, coll, saveColl]);

  // Export CSV
  const exportCSV = useCallback(() => {
    const h = ['Name','Line','Group','Wave','Year','Retail','Faction','Status','Condition','Paid','Notes'];
    const rows = figs.map(f => {
      const c = coll[f.id] || {};
      return [f.name,ln(f.line),f.group,f.wave,f.year,f.retail,f.faction,c.status||'',c.condition||'',c.paid||'',c.notes||''];
    });
    const csv = [h,...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download = 'motu-collection.csv'; a.click();
  }, [figs, coll]);

  // Stats
  const stats = useMemo(() => {
    const owned = Object.values(coll).filter(c=>c.status==='owned').length;
    const wish  = Object.values(coll).filter(c=>c.status==='wishlist').length;
    const ord   = Object.values(coll).filter(c=>c.status==='ordered').length;
    const paid  = Object.entries(coll).filter(([,c])=>c.status==='owned'&&c.paid).reduce((s,[,c])=>s+Number(c.paid),0);
    return { total:figs.length, owned, wish, ord, paid };
  }, [figs, coll]);

  // Line stats
  const lineStats = useMemo(() => LINES.map(l => {
    const t = figs.filter(f=>f.line===l.id).length;
    const o = figs.filter(f=>f.line===l.id&&coll[f.id]?.status==='owned').length;
    return { ...l, total:t, owned:o, pct: t ? Math.round(o/t*100) : 0 };
  }), [figs, coll]);

  // Filtered + sorted figures
  const sortedFigs = useMemo(() => {
    let list = [...figs];
    // When searching, go global — ignore line/subline/tab constraints
    const isGlobalSearch = srch.length > 0;
    if (!isGlobalSearch && activeLine) list = list.filter(f=>f.line===activeLine);
    if (!isGlobalSearch && activeSubline && activeSubline !== '__all__') {
      const sublines = SUBLINES[activeLine] || [];
      const sl = sublines.find(s=>s.key===activeSubline);
      if (sl) list = list.filter(f=>sl.groups.includes(f.group));
    }
    if (!isGlobalSearch && tab==='collection') list = list.filter(f=>coll[f.id]?.status);
    if (filterFaction) list = list.filter(f=>f.faction===filterFaction);
    if (filterStatus)  list = list.filter(f=>coll[f.id]?.status===filterStatus);
    if (srch) { const s=srch.toLowerCase(); list=list.filter(f=>f.name.toLowerCase().includes(s)); }
    if (sortBy==='name')    list.sort((a,b)=>a.name.localeCompare(b.name));
    else if (sortBy==='name-desc') list.sort((a,b)=>b.name.localeCompare(a.name));
    else if (sortBy==='year')   list.sort((a,b)=>(a.year||9999)-(b.year||9999));
    else if (sortBy==='year-desc') list.sort((a,b)=>(b.year||0)-(a.year||0));
    else if (sortBy==='wave') list.sort((a,b)=>{const na=parseFloat(a.wave||''),nb=parseFloat(b.wave||'');return(isNaN(na)?99:na)-(isNaN(nb)?99:nb);});
    else if (sortBy==='retail') list.sort((a,b)=>(a.retail||0)-(b.retail||0));
    else if (sortBy==='retail-desc') list.sort((a,b)=>(b.retail||0)-(a.retail||0));
    return list;
  }, [figs, coll, activeLine, activeSubline, tab, filterFaction, filterStatus, srch, sortBy]);

  const hasFilters = srch || filterFaction || filterStatus;

  if (!loaded) return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:T.bg}}>
      <style>{cssVars}</style>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:32,fontWeight:900,color:T.gold,letterSpacing:2}}>M</div>
      <div style={{color:T.t3,fontSize:13,marginTop:8,fontFamily:"'Cinzel',serif",letterSpacing:3}}>MOTU VAULT</div>
    </div>
  );

  // ── Figure Detail Screen ──────────────────────────────────────────────────
  if (screen === 'figure' && activeFig) {
    const f = activeFig;
    const c = coll[f.id] || {};
    const customPhoto = customPhotos[f.id] ? photoStore.get(f.id) : null;
    const imgUrl = customPhoto || (f.image && !iErr[f.id] ? f.image : null);
    return (
      <div style={{height:'100%',display:'flex',flexDirection:'column',background:T.bg,overflow:'hidden'}}>
        <style>{cssVars}</style>
        {/* Header */}
        <div style={{padding:'16px 16px 12px',paddingTop:'max(16px,env(safe-area-inset-top))',background:T.bg2,borderBottom:`1px solid ${T.bd}`,display:'flex',alignItems:'center',gap:12}}>
          <button onClick={()=>setScreen('main')} style={{background:'none',border:'none',color:T.t1,padding:8,cursor:'pointer',borderRadius:8}}>
            <Icon d={ICO.back} s={22}/>
          </button>
          <div style={{flex:1,fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:T.t1,lineHeight:1.3}}>{f.name}</div>
          <button onClick={()=>{if(confirm(`Delete "${f.name}"?`)){deleteFig(f.id);setScreen('main');}}} style={{background:'none',border:'none',color:'#f87171',padding:8,cursor:'pointer',borderRadius:8}}>
            <Icon d={ICO.trash} s={20}/>
          </button>
        </div>
        {/* Scrollable content */}
        <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
          {/* Image + photo capture */}
          <PhotoSection f={f} imgUrl={imgUrl} T={T}
            hasCustom={!!customPhotos[f.id]}
            onImgErr={()=>setIErr(p=>({...p,[f.id]:true}))}
            onPhoto={dataUrl=>{
              photoStore.set(f.id, dataUrl);
              setCustomPhotos(p=>({...p,[f.id]:true}));
              setIErr(p=>({...p,[f.id]:false}));
            }}
            onClearPhoto={()=>{
              photoStore.del(f.id);
              setCustomPhotos(p=>{const n={...p};delete n[f.id];return n;});
            }}
          />
          {/* Info pills */}
          <div style={{padding:'16px',display:'flex',flexWrap:'wrap',gap:8}}>
            {[ln(f.line),f.group,f.wave?`Wave ${f.wave}`:'',f.year,f.faction].filter(Boolean).map((tag,i)=>(
              <span key={i} style={{padding:'5px 12px',borderRadius:20,background:T.bg3,border:`1px solid ${T.bd}`,fontSize:12,color:T.t2}}>{tag}</span>
            ))}
          </div>
          {/* Retail price */}
          {f.retail && <div style={{padding:'0 16px 16px',fontSize:14,color:T.t2}}>Retail: <span style={{color:T.gold,fontWeight:600}}>${f.retail.toFixed(2)}</span></div>}

          {/* Status buttons */}
          <div style={{padding:'0 16px 16px'}}>
            <div style={{fontSize:11,color:T.t3,textTransform:'uppercase',letterSpacing:1.5,marginBottom:10}}>Status</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {STATUSES.map(s => {
                const active = c.status === s;
                const col = STATUS_COLOR[s];
                return (
                  <button key={s} onClick={()=>setStatus(f.id,s)}
                    style={{padding:'14px 8px',borderRadius:12,border:`2px solid ${active?col:T.bd}`,
                      background:active?`${col}22`:T.bg2,color:active?col:T.t2,
                      fontSize:14,fontWeight:600,cursor:'pointer',transition:'all .15s',fontFamily:"'Outfit',sans-serif"}}>
                    {active && '✓ '}{STATUS_LABEL[s]}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Collection details */}
          {c.status && (
            <div style={{padding:'0 16px 16px',display:'flex',flexDirection:'column',gap:12}}>
              <div style={{fontSize:11,color:T.t3,textTransform:'uppercase',letterSpacing:1.5}}>Collection Details</div>
              <div>
                <div style={{fontSize:12,color:T.t3,marginBottom:4}}>Condition</div>
                <select value={c.condition||''} onChange={e=>updateColl(f.id,'condition',e.target.value)}
                  style={{width:'100%',padding:'12px',background:T.bg3,border:`1px solid ${T.bd}`,borderRadius:10,color:T.t1,fontSize:14,fontFamily:"'Outfit',sans-serif"}}>
                  <option value=''>Select...</option>
                  {CONDITIONS.map(x=><option key={x} value={x}>{x}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:12,color:T.t3,marginBottom:4}}>Price Paid</div>
                <input type="number" step="0.01" value={c.paid||''} placeholder="$0.00"
                  onChange={e=>updateColl(f.id,'paid',e.target.value)}
                  style={{width:'100%',padding:'12px',background:T.bg3,border:`1px solid ${T.bd}`,borderRadius:10,color:T.t1,fontSize:14,fontFamily:"'Outfit',sans-serif"}}/>
              </div>
              <div>
                <div style={{fontSize:12,color:T.t3,marginBottom:4}}>Notes</div>
                <textarea value={c.notes||''} placeholder="Notes..."
                  onChange={e=>updateColl(f.id,'notes',e.target.value)} rows={3}
                  style={{width:'100%',padding:'12px',background:T.bg3,border:`1px solid ${T.bd}`,borderRadius:10,color:T.t1,fontSize:14,resize:'vertical',fontFamily:"'Outfit',sans-serif"}}/>
              </div>
            </div>
          )}
          <div style={{height:'calc(32px + var(--safe-bottom))'}}/>
        </div>
      </div>
    );
  }

  // ── Main Screen ───────────────────────────────────────────────────────────
  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:T.bg,overflow:'hidden'}}>
      <style>{cssVars}</style>
      <GlobalStyles/>

      {/* Top bar */}
      <div style={{background:T.bg2,borderBottom:`1px solid ${T.bd}`,paddingTop:'max(12px,env(safe-area-inset-top))'}}>
        {/* Logo row */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px 12px'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:8,background:`linear-gradient(135deg,${T.gold},${T.acc})`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Cinzel',serif",fontWeight:900,fontSize:18,color:T.bg}}>M</div>
            <div>
              <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:16,color:T.gold,letterSpacing:.5}}>MOTU Vault</div>
              <div style={{fontSize:9,color:T.t3,letterSpacing:2,textTransform:'uppercase'}}>{stats.total} Figures · {stats.owned} Owned</div>
            </div>
          </div>
          <div style={{display:'flex',gap:4}}>
            <TapButton icon={ICO.import} label="Import" onTap={()=>setSheet('import')} T={T}/>
            <TapButton icon={ICO.csv}    label="Export" onTap={exportCSV} T={T}/>
            <TapButton icon={ICO.palette} label="Theme" onTap={()=>setSheet('theme')} T={T}/>
          </div>
        </div>
        {/* Search row */}
        <div style={{padding:'0 16px 12px',display:'flex',gap:8,alignItems:'center'}}>
          <div style={{flex:1,position:'relative'}}>
            <div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:T.t3,pointerEvents:'none'}}>
              <Icon d={ICO.search} s={16}/>
            </div>
            <input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="Search figures..."
              style={{width:'100%',padding:'11px 12px 11px 38px',background:T.bg3,border:`1px solid ${T.bd}`,borderRadius:12,color:T.t1,fontSize:15,fontFamily:"'Outfit',sans-serif",outline:'none'}}/>
            {srch && <button onClick={()=>setSrch('')} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:T.t3,cursor:'pointer',padding:4}}>
              <Icon d={ICO.x} s={14}/>
            </button>}
          </div>
          <button onClick={()=>setSheet('filter')}
            style={{padding:'11px 14px',borderRadius:12,border:`1px solid ${hasFilters?T.acc:T.bd}`,background:hasFilters?`${T.acc}22`:T.bg3,color:hasFilters?T.acc:T.t2,cursor:'pointer',display:'flex',alignItems:'center',gap:6,fontSize:14,fontFamily:"'Outfit',sans-serif"}}>
            <Icon d={ICO.filter} s={18}/>
            {hasFilters && <span style={{width:6,height:6,borderRadius:'50%',background:T.acc,display:'inline-block'}}/>}
          </button>
          <button onClick={()=>setSheet('sort')}
            style={{padding:'11px 14px',borderRadius:12,border:`1px solid ${T.bd}`,background:T.bg3,color:T.t2,cursor:'pointer',display:'flex',alignItems:'center',gap:6,fontSize:14,fontFamily:"'Outfit',sans-serif"}}>
            <Icon d={ICO.sort} s={18}/>
          </button>
        </div>
        {/* Line pill if inside a line */}
        {activeLine && (
          <div>
            {/* Breadcrumb */}
            <div style={{padding:'0 16px 10px',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <button onClick={()=>{setActiveLine(null);setActiveSubline(null);setTab('lines');}} style={{background:'none',border:'none',color:T.t2,cursor:'pointer',padding:'2px 0',display:'flex',alignItems:'center',gap:4,fontSize:13}}>
                <Icon d={ICO.back} s={14}/> Lines
              </button>
              <span style={{color:T.t3}}>›</span>
              {activeSubline
                ? <button onClick={()=>setActiveSubline(null)} style={{background:'none',border:'none',color:T.t2,cursor:'pointer',padding:'2px 0',fontSize:13,fontFamily:"'Cinzel',serif",fontWeight:700}}>{ln(activeLine)}</button>
                : <span style={{color:T.gold,fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700}}>{ln(activeLine)}</span>
              }
              {activeSubline && <>
                <span style={{color:T.t3}}>›</span>
                <span style={{color:T.gold,fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700}}>
                  {activeSubline==='__all__'?'All Figures':(SUBLINES[activeLine]||[]).find(s=>s.key===activeSubline)?.label}
                </span>
              </>}
            </div>

          </div>
        )}
      </div>

      {/* Content */}
      <div ref={scrollRef} style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        {tab==='lines' && !activeLine ? (
          // ── Lines grid ──
          <div style={{padding:16,display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            {lineStats.map(l => {
              // Banner image: upload origins.jpg, masterverse.jpg etc. to your image repo
              const bannerImg = `${IMG}/${l.id}.jpg`;
              return (
                <div key={l.id} style={{position:'relative',borderRadius:18,overflow:'hidden',
                  border:`1px solid ${T.bd}`,aspectRatio:'3/4',cursor:'pointer'}}
                  onClick={()=>goToLine(l.id)}>
                  {/* Figure image background */}
                  <img src={bannerImg} alt={l.name}
                    style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',objectPosition:'top'}}
                    onError={e=>e.target.style.display='none'}/>
                  {/* Gradient overlay */}
                  <div style={{position:'absolute',inset:0,
                    background:'linear-gradient(to bottom, rgba(0,0,0,.1) 0%, rgba(0,0,0,.3) 40%, rgba(0,0,0,.85) 100%)'}}/>
                  {/* Edit rep button — commented out, using custom banners instead */}
                  {/* <button onClick={e=>{e.stopPropagation();setRepPicker(l.id);}}>...</button> */}
                  {/* Text overlay at bottom */}
                  <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 12px 14px'}}>
                    <div style={{fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,
                      color:'#fff',lineHeight:1.2,marginBottom:2,
                      textShadow:'0 1px 4px rgba(0,0,0,.8)'}}>{l.name}</div>
                    <div style={{fontSize:10,color:'rgba(255,255,255,.6)',marginBottom:6}}>{l.yr}</div>
                    {l.total > 0 && <>
                      <div style={{height:2,background:'rgba(255,255,255,.2)',borderRadius:2,overflow:'hidden',marginBottom:4}}>
                        <div style={{height:'100%',width:`${l.pct}%`,
                          background:l.pct===100?'#34d399':T.gold,borderRadius:2}}/>
                      </div>
                      <div style={{fontSize:10,color:l.pct===100?'#34d399':'rgba(255,255,255,.7)',fontWeight:600}}>
                        {l.owned}/{l.total} · {l.pct}%</div>
                    </>}
                  </div>
                </div>
              );
            })}
          </div>
        ) : (!srch && activeLine && !activeSubline && SUBLINES[activeLine]) ? (
          // ── Subline cards ──
          <SublineCards lineId={activeLine} figs={figs} coll={coll} T={T}
            onSelect={sl=>{setActiveSubline(sl);setTab('all');}}/>
        ) : (
          // ── Figure list ──
          <div style={{padding:'12px 12px 0'}}>
            <div style={{fontSize:11,color:T.t3,marginBottom:8,paddingLeft:4}}>
              {sortedFigs.length} figure{sortedFigs.length!==1?'s':''}{srch?' across all lines':hasFilters?' (filtered)':''}
            </div>
            {sortedFigs.length === 0 ? (
              <div style={{textAlign:'center',padding:'60px 20px',color:T.t3}}>
                <div style={{fontSize:40,marginBottom:12}}>🔍</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:T.t2,marginBottom:4}}>No figures found</div>
                <div style={{fontSize:13}}>Try adjusting your search or filters</div>
              </div>
            ) : sortedFigs.map(f => (
              <FigureRow key={f.id} f={f} c={coll[f.id]||{}} T={T}
                imgErr={iErr[f.id]}
                customPhoto={customPhotos[f.id] ? photoStore.get(f.id) : null}
                showLine={!!srch}
                onImgErr={()=>setIErr(p=>({...p,[f.id]:true}))}
                onTap={()=>{setActiveFig(f);setScreen('figure');}}
                onStatus={s=>setStatus(f.id,s)}/>
            ))}
            <div style={{height:'calc(80px + var(--safe-bottom))'}}/>
          </div>
        )}
      </div>

      {/* Rep picker modal — commented out, using custom banners instead */}
      {/* {repPicker && <RepPickerModal ... />} */}

      {/* Bottom nav */}
      <div style={{background:T.bg2,borderTop:`1px solid ${T.bd}`,paddingBottom:'max(8px,var(--safe-bottom))',display:'grid',gridTemplateColumns:'1fr 1fr 1fr'}}>
        {[
          {key:'lines', icon:ICO.lines, label:'Lines'},
          {key:'all',   icon:ICO.list,  label:'All'},
          {key:'collection', icon:ICO.heart, label:`Collection`},
        ].map(({key,icon,label}) => {
          const active = tab===key && !activeLine || (key==='lines'&&activeLine&&tab==='all');
          const isActive = tab===key;
          return (
            <button key={key} onClick={()=>{setTab(key);if(key!=='all'||!activeLine)setActiveLine(null);}}
              style={{padding:'10px 0 8px',background:'none',border:'none',color:isActive?T.acc:T.t3,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3,fontFamily:"'Outfit',sans-serif",fontSize:10,fontWeight:isActive?600:400,transition:'color .15s'}}>
              <Icon d={icon} s={22} stroke={isActive?2.5:1.5}/>
              {label}{key==='collection'?<span style={{fontSize:9,background:isActive?T.acc:T.bd,color:isActive?T.bg:T.t3,borderRadius:8,padding:'1px 5px',marginLeft:2}}>{stats.owned}</span>:''}
            </button>
          );
        })}
      </div>

      {/* Bottom sheets */}
      {sheet && (
        <BottomSheet title={
          sheet==='filter'?'Filter':sheet==='sort'?'Sort By':sheet==='import'?'Import CSV':sheet==='theme'?'Theme':'Options'
        } onClose={()=>setSheet(null)} T={T}>
          {sheet==='filter' && (
            <FilterSheet filterFaction={filterFaction} setFilterFaction={setFilterFaction}
              filterStatus={filterStatus} setFilterStatus={setFilterStatus}
              onClear={()=>{setFilterFaction('');setFilterStatus('');setSrch('');}}
              hasFilters={hasFilters} T={T}/>
          )}
          {sheet==='sort' && (
            <SortSheet sortBy={sortBy} setSortBy={s=>{setSortBy(s);setSheet(null);}} T={T}/>
          )}
          {sheet==='import' && (
            <ImportSheet onImport={(text,overwrite)=>{
              const r=doImport(text,overwrite);
              return r;
            }} T={T}/>
          )}
          {sheet==='theme' && (
            <ThemeSheet theme={theme} setTheme={t=>{setTheme(t);setSheet(null);}}/>
          )}
        </BottomSheet>
      )}
    </div>
  );
}

// ── Figure Row ─────────────────────────────────────────────────────────────
function FigureRow({f, c, T, imgErr, customPhoto, showLine, onImgErr, onTap, onStatus}) {
  const statusColor = c.status ? STATUS_COLOR[c.status] : null;
  return (
    <div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 4px',borderBottom:`1px solid ${T.bd}22`,cursor:'pointer'}}
      onClick={onTap}>
      {/* Thumbnail */}
      <div style={{width:56,height:56,borderRadius:10,background:T.bg3,flexShrink:0,overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',border:`2px solid ${statusColor||T.bd}`}}>
        {(customPhoto||f.image) && !imgErr
          ? <img src={customPhoto||f.image} alt={f.name} onError={onImgErr} style={{width:'100%',height:'100%',objectFit:'cover'}} loading="lazy"/>
          : <span style={{fontFamily:"'Cinzel',serif",fontSize:20,color:T.t3,fontWeight:700}}>{f.name[0]}</span>
        }
      </div>
      {/* Text */}
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14,fontWeight:600,color:T.t1,lineHeight:1.3,marginBottom:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{f.name}</div>
        <div style={{fontSize:11,color:T.t3,display:'flex',gap:6,flexWrap:'wrap'}}>
          {showLine && <span style={{color:T.acc,fontWeight:600}}>{ln(f.line)}</span>}
          {f.group && <span>{showLine ? '· ' : ''}{f.group}</span>}
          {f.wave && <span>· W{f.wave}</span>}
          {f.year && <span>· {f.year}</span>}
        </div>
      </div>
      {/* Status dot / quick-own */}
      <div style={{flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
        {c.status
          ? <div style={{width:10,height:10,borderRadius:'50%',background:statusColor}}/>
          : <button onClick={e=>{e.stopPropagation();onStatus('owned');}}
              style={{width:36,height:36,borderRadius:10,border:`1px solid ${T.bd}`,background:T.bg3,color:T.t3,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}
              title="Mark owned">
              <Icon d={ICO.check} s={16}/>
            </button>
        }
      </div>
    </div>
  );
}

// ── Rep Picker Modal ─────────────────────────────────────────────────────────
function RepPickerModal({lineId, figs, T, currentSlug, onSelect, onReset, onClose}) {
  const lineFigs = figs.filter(f => f.line === lineId && f.slug && f.image);
  const [imgErrs, setImgErrs] = useState({});

  return (
    <div style={{position:'fixed',inset:0,zIndex:300,display:'flex',flexDirection:'column'}}
      onClick={onClose}>
      {/* Backdrop */}
      <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.7)',backdropFilter:'blur(6px)'}}/>
      {/* Sheet */}
      <div style={{position:'absolute',bottom:0,left:0,right:0,
        background:T.bg2,borderRadius:'20px 20px 0 0',
        border:`1px solid ${T.bd}`,
        paddingBottom:'max(20px,env(safe-area-inset-bottom))',
        maxHeight:'80vh',display:'flex',flexDirection:'column'}}
        onClick={e=>e.stopPropagation()}>
        {/* Handle + header */}
        <div style={{padding:'12px 20px 0',textAlign:'center'}}>
          <div style={{width:36,height:4,borderRadius:2,background:T.bd,margin:'0 auto 12px'}}/>
        </div>
        <div style={{padding:'0 20px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:16,fontWeight:700,color:T.gold}}>
            Choose Representative
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button onClick={onReset}
              style={{fontSize:12,color:T.t3,background:'none',border:`1px solid ${T.bd}`,
                borderRadius:8,padding:'6px 10px',cursor:'pointer',fontFamily:"'Outfit',sans-serif"}}>
              Reset
            </button>
            <button onClick={onClose} style={{background:'none',border:'none',color:T.t3,cursor:'pointer',padding:4}}>
              <Icon d={ICO.x} s={20}/>
            </button>
          </div>
        </div>
        {/* Grid */}
        <div style={{overflowY:'auto',WebkitOverflowScrolling:'touch',
          padding:'0 16px 16px',
          display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
          {lineFigs.map(f => {
            const isSelected = f.slug === currentSlug;
            return (
              <button key={f.id} onClick={()=>onSelect(f.slug)}
                style={{padding:0,background:'none',border:`2px solid ${isSelected?T.acc:T.bd}`,
                  borderRadius:12,overflow:'hidden',cursor:'pointer',
                  aspectRatio:'1',position:'relative',WebkitAppearance:'none'}}>
                {f.image && !imgErrs[f.id]
                  ? <img src={f.image} alt={f.name} loading="lazy"
                      onError={()=>setImgErrs(p=>({...p,[f.id]:true}))}
                      style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                  : <div style={{width:'100%',height:'100%',background:T.bg3,
                      display:'flex',alignItems:'center',justifyContent:'center',
                      fontFamily:"'Cinzel',serif",fontSize:18,color:T.t3,fontWeight:700}}>
                      {f.name[0]}
                    </div>
                }
                {isSelected && (
                  <div style={{position:'absolute',inset:0,background:`${T.acc}44`,
                    display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <div style={{background:T.acc,borderRadius:'50%',width:28,height:28,
                      display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <Icon d={ICO.check} s={16}/>
                    </div>
                  </div>
                )}
                <div style={{position:'absolute',bottom:0,left:0,right:0,
                  background:'linear-gradient(transparent,rgba(0,0,0,.75))',
                  padding:'8px 4px 4px',fontSize:8,color:'rgba(255,255,255,.8)',
                  textAlign:'center',lineHeight:1.2,
                  fontFamily:"'Outfit',sans-serif"}}>
                  {f.name.length > 18 ? f.name.slice(0,16)+'…' : f.name}
                </div>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Subline Cards ────────────────────────────────────────────────────────────
function SublineCards({lineId, figs, coll, T, onSelect}) {
  const sublines = SUBLINES[lineId] || [];
  const allFigs  = figs.filter(f=>f.line===lineId);
  const allOwned = allFigs.filter(f=>coll[f.id]?.status==='owned').length;
  const allPct   = allFigs.length ? Math.round(allOwned/allFigs.length*100) : 0;
  return (
    <div style={{padding:16,display:'flex',flexDirection:'column',gap:12}}>
      {/* All figures card */}
      <button onClick={()=>onSelect('__all__')}
        style={{padding:'18px 20px',background:T.bg3,border:`2px solid ${T.bd}`,borderRadius:16,
          cursor:'pointer',textAlign:'left',WebkitAppearance:'none',fontFamily:"'Outfit',sans-serif",
          display:'flex',alignItems:'center',gap:16,transition:'all .15s'}}>
        <svg width={48} height={48} style={{flexShrink:0}}>
          <circle cx={24} cy={24} r={20} fill="none" stroke={T.bd} strokeWidth={3}/>
          <circle cx={24} cy={24} r={20} fill="none" stroke={allPct===100?'#34d399':T.gold} strokeWidth={3}
            strokeDasharray={`${2*Math.PI*20}`}
            strokeDashoffset={`${2*Math.PI*20*(1-allPct/100)}`}
            strokeLinecap="round" transform="rotate(-90 24 24)"
            style={{transition:'stroke-dashoffset .4s'}}/>
          <text x={24} y={28} textAnchor="middle" fill={allPct===100?'#34d399':T.gold}
            fontSize={11} fontWeight={700} fontFamily="'Outfit',sans-serif">{allPct}%</text>
        </svg>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:T.gold,marginBottom:4}}>All Figures</div>
          <div style={{fontSize:12,color:T.t3}}>{allOwned} owned of {allFigs.length}</div>
          <div style={{height:3,background:T.bd,borderRadius:2,marginTop:8,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${allPct}%`,background:allPct===100?'#34d399':T.gold,borderRadius:2,transition:'width .4s'}}/>
          </div>
        </div>
        <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={T.t3} strokeWidth={2} strokeLinecap="round">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
      {/* Divider */}
      <div style={{height:1,background:T.bd,margin:'0 4px'}}/>
      {sublines.map(sl => {
        const slFigs = figs.filter(f=>f.line===lineId && sl.groups.includes(f.group));
        const owned  = slFigs.filter(f=>coll[f.id]?.status==='owned').length;
        const pct    = slFigs.length ? Math.round(owned/slFigs.length*100) : 0;
        if (!slFigs.length) return null;
        return (
          <button key={sl.key} onClick={()=>onSelect(sl.key)}
            style={{padding:'18px 20px',background:T.bg2,border:`1px solid ${T.bd}`,borderRadius:16,
              cursor:'pointer',textAlign:'left',WebkitAppearance:'none',fontFamily:"'Outfit',sans-serif",
              display:'flex',alignItems:'center',gap:16,transition:'all .15s'}}>
            {/* Progress ring */}
            <svg width={48} height={48} style={{flexShrink:0}}>
              <circle cx={24} cy={24} r={20} fill="none" stroke={T.bd} strokeWidth={3}/>
              <circle cx={24} cy={24} r={20} fill="none" stroke={pct===100?'#34d399':T.acc} strokeWidth={3}
                strokeDasharray={`${2*Math.PI*20}`}
                strokeDashoffset={`${2*Math.PI*20*(1-pct/100)}`}
                strokeLinecap="round" transform="rotate(-90 24 24)"
                style={{transition:'stroke-dashoffset .4s'}}/>
              <text x={24} y={28} textAnchor="middle" fill={pct===100?'#34d399':T.t1}
                fontSize={11} fontWeight={700} fontFamily="'Outfit',sans-serif">{pct}%</text>
            </svg>
            {/* Text */}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:T.t1,marginBottom:4}}>{sl.label}</div>
              <div style={{fontSize:12,color:T.t3}}>{owned} owned of {slFigs.length}</div>
              {/* Mini progress bar */}
              <div style={{height:3,background:T.bd,borderRadius:2,marginTop:8,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${pct}%`,background:pct===100?'#34d399':T.acc,borderRadius:2,transition:'width .4s'}}/>
              </div>
            </div>
            {/* Arrow */}
            <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={T.t3} strokeWidth={2} strokeLinecap="round">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </button>
        );
      })}
    </div>
  );
}

// ── Photo Section ────────────────────────────────────────────────────────────
function PhotoSection({f, imgUrl, T, hasCustom, onImgErr, onPhoto, onClearPhoto}) {
  const fileRef = useRef();
  const [localUrl, setLocalUrl] = useState(imgUrl);

  // Keep in sync if imgUrl changes (e.g. iErr clears)
  useEffect(()=>setLocalUrl(imgUrl),[imgUrl]);

  const handleFile = e => {
    const file = e.target.files?.[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      // Compress: resize to max 600px, JPEG quality 0.65
      const img = new Image();
      img.onload = () => {
        const MAX = 600;
        const scale = Math.min(1, MAX / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.65);
        setLocalUrl(dataUrl);
        onPhoto(dataUrl);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  return (
    <div style={{position:'relative',background:T.bg3}}>
      <div style={{aspectRatio:'1',maxHeight:320,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
        {localUrl
          ? <img src={localUrl} alt={f.name} onError={onImgErr}
              style={{width:'100%',height:'100%',objectFit:'contain'}}/>
          : <div style={{fontFamily:"'Cinzel',serif",fontSize:72,color:T.t3,fontWeight:900}}>{f.name[0]}</div>
        }
      </div>
      {/* Photo controls overlay */}
      <div style={{position:'absolute',bottom:10,right:10,display:'flex',gap:8}}>
        <button onClick={()=>fileRef.current.click()}
          style={{padding:'8px 14px',borderRadius:10,background:'rgba(0,0,0,.65)',border:'1px solid rgba(255,255,255,.15)',color:'#fff',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:6,fontFamily:"'Outfit',sans-serif",backdropFilter:'blur(4px)'}}>
          <Icon d={ICO.img} s={14}/> {hasCustom ? 'Replace photo' : 'Add photo'}
        </button>
        {hasCustom && (
          <button onClick={()=>{setLocalUrl(f.image||null);onClearPhoto();}}
            style={{padding:'8px 12px',borderRadius:10,background:'rgba(0,0,0,.65)',border:'1px solid rgba(248,113,113,.4)',color:'#f87171',fontSize:12,cursor:'pointer',fontFamily:"'Outfit',sans-serif",backdropFilter:'blur(4px)'}}>
            Remove
          </button>
        )}
      </div>
      <input ref={fileRef} type="file" accept="image/*" capture="environment"
        style={{display:'none'}} onChange={handleFile}/>
    </div>
  );
}

        onClick={e=>e.stopPropagation()}>
        <div style={{padding:'12px 20px 0',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div style={{width:36,height:4,borderRadius:2,background:T.bd,margin:'0 auto 12px'}}/>
        </div>
        <div style={{padding:'0 20px',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexShrink:0}}>

      </div>

}

// ── Filter Sheet ────────────────────────────────────────────────────────────

  return (
    <div style={{padding:'0 20px 20px'}}>
      <div style={{fontSize:12,color:T.t3,textTransform:'uppercase',letterSpacing:1.5,marginBottom:10}}>Faction</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:20}}>
        {['', ...FACTIONS].map(f=>(
          <button key={f} onClick={()=>setFilterFaction(f)}
            style={{padding:'8px 16px',borderRadius:20,border:`1px solid ${filterFaction===f?T.acc:T.bd}`,background:filterFaction===f?`${T.acc}22`:T.bg3,color:filterFaction===f?T.acc:T.t2,fontSize:13,cursor:'pointer',fontFamily:"'Outfit',sans-serif"}}>
            {f||'All'}
          </button>
        ))}
      </div>
      <div style={{fontSize:12,color:T.t3,textTransform:'uppercase',letterSpacing:1.5,marginBottom:10}}>Status</div>

        {['',...STATUSES].map(s=>(

            {s?STATUS_LABEL[s]:'All'}
          </button>
        ))}

      {hasFilters && <button onClick={onClear} style={{width:'100%',padding:'14px',borderRadius:12,border:`1px solid #f87171`,background:'rgba(248,113,113,.1)',color:'#f87171',fontSize:15,cursor:'pointer',fontWeight:600,fontFamily:"'Outfit',sans-serif"}}>Clear All Filters</button>}
    </div>
  );
}

// ── Sort Sheet ──────────────────────────────────────────────────────────────
function SortSheet({sortBy,setSortBy,T}) {
  const opts = [
    {v:'wave',      l:'Wave (default)'},
    {v:'name',      l:'Name A → Z'},
    {v:'name-desc', l:'Name Z → A'},
    {v:'year',      l:'Year (oldest first)'},

        <button key={o.v} onClick={()=>setSortBy(o.v)}
          style={{padding:'14px 16px',borderRadius:12,border:`1px solid ${sortBy===o.v?T.acc:T.bd}`,background:sortBy===o.v?`${T.acc}22`:T.bg3,color:sortBy===o.v?T.acc:T.t1,fontSize:15,cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',justifyContent:'space-between',fontFamily:"'Outfit',sans-serif"}}>
          {o.l}
          {sortBy===o.v && <Icon d={ICO.check} s={18}/>}
        </button>
      ))}
    </div>
  );
}

// ── Import Sheet ────────────────────────────────────────────────────────────
function ImportSheet({onImport, T}) {
  const [result, setResult] = useState(null);
  const [busy, setBusy]     = useState(false);
  const [overwrite, setOverwrite] = useState(false);
  const [drag, setDrag]     = useState(false);
  const fileRef = useRef();

  const handle = text => {
    setBusy(true);
    setTimeout(()=>{ setResult(onImport(text, overwrite)); setBusy(false); }, 50);
  };

  return (
    <div style={{padding:'0 20px 20px'}}>
      {!result && !busy && <>
        <p style={{fontSize:14,color:T.t2,marginBottom:16,lineHeight:1.6}}>
          Export your collection from ActionFigure411.com, then drop the CSV file below. Only MOTU figures will be imported.
        </p>
        {/* Overwrite toggle */}
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',background:T.bg3,borderRadius:12,marginBottom:16,cursor:'pointer'}} onClick={()=>setOverwrite(o=>!o)}>
          <div style={{width:24,height:24,borderRadius:6,border:`2px solid ${overwrite?T.acc:T.bd}`,background:overwrite?T.acc:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .15s'}}>
            {overwrite && <Icon d={ICO.check} s={14}/>}
          </div>
          <div>
            <div style={{fontSize:14,color:T.t1,fontWeight:500}}>Overwrite existing</div>
            <div style={{fontSize:12,color:T.t3}}>Re-import figures already marked as owned</div>
          </div>
        </div>
        {/* Drop zone */}
        <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f){const r=new FileReader();r.onload=ev=>handle(ev.target.result);r.readAsText(f);}}} onClick={()=>fileRef.current.click()}
          style={{border:`2px dashed ${drag?T.acc:T.bd}`,borderRadius:16,padding:'40px 20px',textAlign:'center',cursor:'pointer',background:drag?`${T.acc}11`:'transparent',transition:'all .15s'}}>
          <div style={{fontSize:48,marginBottom:12}}>📂</div>
          <div style={{fontSize:15,color:T.t1,fontWeight:500,marginBottom:4}}>Drop export.csv here</div>
          <div style={{fontSize:13,color:T.t3}}>or tap to browse files</div>
          <input ref={fileRef} type="file" accept=".csv" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>handle(ev.target.result);r.readAsText(f);}}}/>
        </div>
      </>}
      {busy && <div style={{textAlign:'center',padding:'40px 0'}}>
        <div style={{fontSize:32,marginBottom:12}}>⚙️</div>
        <div style={{color:T.t2,fontSize:15}}>Importing...</div>
      </div>}
      {result && <div style={{textAlign:'center',padding:'20px 0'}}>
        <div style={{fontSize:48,marginBottom:12}}>{result.matched>0?'✅':'🤷'}</div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:22,color:T.gold,marginBottom:4}}>{result.matched} imported</div>
        {result.skipped>0 && <div style={{fontSize:13,color:T.t3,marginBottom:8}}>{result.skipped} already owned, skipped</div>}
        {result.unmatched.length>0 && <details style={{textAlign:'left',marginTop:16}}>
          <summary style={{fontSize:13,color:T.t3,cursor:'pointer',padding:'8px 0'}}>{result.unmatched.length} not found in app</summary>
          <div style={{marginTop:8,maxHeight:160,overflowY:'auto',fontSize:12,color:T.t3,lineHeight:2}}>
            {result.unmatched.map((u,i)=><div key={i}>{u}</div>)}
          </div>
        </details>}
        <button onClick={()=>setResult(null)} style={{marginTop:20,padding:'12px 32px',borderRadius:12,border:`1px solid ${T.bd}`,background:T.bg3,color:T.t1,fontSize:14,cursor:'pointer',fontFamily:"'Outfit',sans-serif"}}>Import Another</button>
      </div>}
    </div>
  );
}
