function doImport(csvText, overwrite = false) {
  // Detect format: MOTU Vault export has 'Line' header, AF411 has 'Series'
  const firstLine = csvText.split('\n')[0] || '';
  const isVaultFormat = /\bLine\b/.test(firstLine) && !/\bSeries\b/.test(firstLine);

  if (isVaultFormat) return doImportVault(csvText, overwrite);
  return doImportAF411(csvText, overwrite);
}

// Reverse map: line name → line id
const LINE_ID_MAP = Object.fromEntries(LINES.map(l => [l.name, l.id]));

function doImportVault(csvText, overwrite) {
  const lines = csvText.split('\n').filter(l => l.trim());
  const parseRow = line => {
    const cols = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += c;
    }
    cols.push(cur); return cols;
  };
  const headers = parseRow(lines[0]).map(h => h.trim());
  const col = h => headers.indexOf(h);
  const [iName,iLine,iGroup,iWave,iStatus,iCond,iPaid,iNotes] =
    ['Name','Line','Group','Wave','Status','Condition','Paid','Notes'].map(col);

  const idx4 = {}, idx3 = {}, idx2 = {};
  S.figs.forEach(f => {
    const k4 = normalize(f.name)+'|'+f.line+'|'+normalize(f.group||'')+'|'+normalize(f.wave||'');
    const k3 = normalize(f.name)+'|'+f.line+'|'+normalize(f.group||'');
    const k2 = normalize(f.name)+'|'+f.line;
    if (!idx4[k4]) idx4[k4] = f;
    if (!idx3[k3]) idx3[k3] = f;
    idx2[k2] = idx2[k2] ? 'AMBIGUOUS' : f;
  });

  const matchedIds = new Set();
  let skipped = 0; const unmatched = [];

  lines.slice(1).forEach(l => {
    const c = parseRow(l);
    const name = c[iName]?.trim();
    if (!name) return;
    const lineName = c[iLine]?.trim() || '';
    const lineId = LINE_ID_MAP[lineName] || lineName.toLowerCase().replace(/\s+/g,'-');
    const group = c[iGroup]?.trim() || '';
    const wave = c[iWave]?.trim() || '';
    const status = c[iStatus]?.trim() || '';
    const cond = c[iCond]?.trim() || '';
    const paid = c[iPaid]?.trim() || '';
    const notes = c[iNotes]?.trim() || '';

    const k4 = normalize(name)+'|'+lineId+'|'+normalize(group)+'|'+normalize(wave);
    const k3 = normalize(name)+'|'+lineId+'|'+normalize(group);
    const k2 = normalize(name)+'|'+lineId;
    const fig = idx4[k4] || idx3[k3] || (() => {
      const c2 = idx2[k2];
      if (!c2 || c2 === 'AMBIGUOUS') return null;
      return c2;
    })();

    if (!fig) { unmatched.push(lineName + ': ' + name + (group ? ' [' + group + ']' : '')); return; }
    if (matchedIds.has(fig.id)) { skipped++; return; }
    if (!overwrite && S.coll[fig.id]?.status && status) { skipped++; return; }

    if (status) {
      S.coll[fig.id] = {...(S.coll[fig.id]||{}), status,
        ...(cond && {condition:cond}), ...(paid && {paid}), ...(notes && {notes})};
    }
    matchedIds.add(fig.id);
  });
  saveColl();
  return { matched: matchedIds.size, skipped, unmatched };
}

function doImportAF411(csvText, overwrite) {
  const motuRows = parseCSV(csvText);
  const idx4 = {}, idx3 = {}, idx2 = {};
  S.figs.forEach(f => {
    const k4 = normalize(f.name)+'|'+f.line+'|'+normalize(f.group||'')+'|'+normalize(f.wave||'');
    const k3 = normalize(f.name)+'|'+f.line+'|'+normalize(f.group||'');
    const k2 = normalize(f.name)+'|'+f.line;
    if (!idx4[k4]) idx4[k4] = f;
    if (!idx3[k3]) idx3[k3] = f;
    idx2[k2] = idx2[k2] ? 'AMBIGUOUS' : f;
  });
  const matchedIds = new Set();
  let skipped = 0; const unmatched = [];
  motuRows.forEach(row => {
    const lineId = SERIES_MAP[row.series];
    const k4 = normalize(row.name)+'|'+lineId+'|'+normalize(row.group||'')+'|'+normalize(row.wave||'');
    const k3 = normalize(row.name)+'|'+lineId+'|'+normalize(row.group||'');
    const k2 = normalize(row.name)+'|'+lineId;
    const fig = idx4[k4] || idx3[k3] || (() => {
      const c = idx2[k2];
      if (!c || c === 'AMBIGUOUS') return null;
      if (normalize(c.name) !== normalize(row.name)) return null;
      return c;
    })();
    if (!fig) { unmatched.push(ln(lineId)+': '+row.name+(row.group?' ['+row.group+']':'')); return; }
    if (matchedIds.has(fig.id)) {
      if (row.variation) {
        const ex = S.coll[fig.id]?.variants || '';
        if (!ex.split(',').map(v=>v.trim()).includes(row.variation))
          S.coll[fig.id] = {...S.coll[fig.id], variants: [ex, row.variation].filter(Boolean).join(', ')};
      }
      skipped++; return;
    }
    if (!overwrite && S.coll[fig.id]?.status === 'owned') { skipped++; return; }
    const importNote = [row.note, row.where ? 'From: '+row.where : ''].filter(Boolean).join(' | ');
    S.coll[fig.id] = {...S.coll[fig.id], status:'owned',
      ...(row.cond && {condition:row.cond}), ...(row.paid && {paid:row.paid}),
      ...(row.variation && {variants:row.variation}), ...(importNote && {notes:importNote})};
    matchedIds.add(fig.id);
  });
  saveColl();
  return { matched: matchedIds.size, skipped, unmatched };
}

      </button>
    </div>
    </div>
    ${S.activeLine ? renderBreadcrumb() : ''}
  </div>

  <!-- Content -->
  <div class="content-area" id="contentArea">
    <div id="topSpacer"></div>
    ${renderContent()}
  </div>

  <div class="bottom-nav${S.selectMode ? ' hidden' : ''}" id="bottomNav">
    ${renderNavBtn('lines', ICO.lines, 'Lines')}
    ${renderNavBtn('all', ICO.list, 'All', `<span class="badge">${stats.total}</span>`)}
    ${renderNavBtn('collection', ICO.heart, 'Collection', `<span class="badge">${stats.owned}</span>`)}
  </div>`;

  if (S.selectMode) html += renderSelectActionbar();
  if (S.sheet) html += renderSheet();
  app().innerHTML = html;

  // Re-apply visible class to sheet overlay (innerHTML wipes it)
  if (S.sheet) {
    const el = document.getElementById('sheetOverlay');
    if (el) requestAnimationFrame(() => el.classList.add('visible'));
  }

  // Set top spacer height to match fixed top bar, so content starts below it
  const tb = document.getElementById('topBar');
  const bn = document.getElementById('bottomNav');
  const ca = document.getElementById('contentArea');
  const ts = document.getElementById('topSpacer');
  if (ts && tb) ts.style.height = tb.offsetHeight + 'px';

  // Re-apply immersive state after innerHTML rebuild
  if (S.barsHidden && !S.sheet) {
    if (tb) tb.classList.add('immersive-hide');
    if (bn) bn.classList.add('immersive-hide');
  }

  // Restore scroll — savedScroll from fig nav takes priority; else preserve across renders
  if (ca) {
    const maxScroll = Math.max(0, ca.scrollHeight - ca.clientHeight);
    if (S.savedScroll && S.screen === 'main') {
      ca.scrollTop = Math.min(S.savedScroll, maxScroll);
      S.savedScroll = 0;
    } else if (_preservedScroll > 0 && !S.sheet && !S._justNavigated) {
      ca.scrollTop = Math.min(_preservedScroll, maxScroll);
    }
    S._justNavigated = false;
  }

  // Immersive scroll: hide/show bars via transform only — no layout changes
  if (ca) {
    let lastScrollTop = ca.scrollTop;
    let _suppressed = true; // suppress initial scroll events from restore
    requestAnimationFrame(() => { _suppressed = false; lastScrollTop = ca.scrollTop; });
    ca._scrollHandler && ca.removeEventListener('scroll', ca._scrollHandler);
    ca._scrollHandler = () => {
      if (_suppressed || S.editingOrder) return;
      const tb = document.getElementById('topBar');
      const bn = document.getElementById('bottomNav');
      const sb = document.getElementById('searchBar');
      if (!tb || !bn) return;
      const st = ca.scrollTop;
      const delta = st - lastScrollTop;
      lastScrollTop = st;
      const nearBottom = ca.scrollHeight - st - ca.clientHeight < 30;
      if (nearBottom) return;
      if (delta > 4 && st > 40 && !S.barsHidden) {
        tb.classList.add('immersive-hide');
        bn.classList.add('immersive-hide');
        if (sb) { sb.classList.add('hidden'); S.searchBarHidden = true; }
        S.barsHidden = true;
      } else if ((delta < -4 || st < 20) && S.barsHidden) {
        tb.classList.remove('immersive-hide');
        bn.classList.remove('immersive-hide');
        if (sb) { sb.classList.remove('hidden'); S.searchBarHidden = false; }
        S.barsHidden = false;
      }
    };
    ca.addEventListener('scroll', ca._scrollHandler, {passive: true});

    // Pull-to-refresh
    let _ptrStart = 0, _ptrActive = false;
    ca._ptrTouchStart && ca.removeEventListener('touchstart', ca._ptrTouchStart);
    ca._ptrTouchEnd && ca.removeEventListener('touchend', ca._ptrTouchEnd);
    ca._ptrTouchStart = e => { if (ca.scrollTop <= 0) _ptrStart = e.touches[0].clientY; else _ptrStart = 0; };
    ca._ptrTouchEnd = e => {
      if (_ptrStart && e.changedTouches[0].clientY - _ptrStart > 80 && ca.scrollTop <= 0 && !_ptrActive) {
        _ptrActive = true;
        haptic(20);
        toast('↻ Syncing…');
        fetchFigs(true).then(() => { _ptrActive = false; });
      }
      _ptrStart = 0;
    };
    ca.addEventListener('touchstart', ca._ptrTouchStart, {passive: true});
    ca.addEventListener('touchend', ca._ptrTouchEnd, {passive: true});

    // Long-press context menu on figure rows and cards
    requestAnimationFrame(() => {
      document.querySelectorAll('.fig-row[data-fig-id], .fig-card[data-fig-id]').forEach(el => {
        if (el._lpBound) return;
        el._lpBound = true;
        initLongPress(el, el.dataset.figId);
      });
    });
  }
}

function renderSelectActionbar() {
  const n = S.selected.size;
  const totalVisible = getSortedFigs().length;
  const allSelected = n > 0 && n === totalVisible;
  return `<div class="select-actionbar visible">
    <span class="count">${n}</span>
    <button onclick="selectAllVisible()" title="${allSelected ? 'Deselect all' : 'Select all'}">
      ${allSelected ? 'None' : 'All'}
    </button>
    <div class="select-actionbar-scroll">
      <button ${n ? '' : 'disabled'} onclick="batchSetStatus('owned')" style="color:${STATUS_HEX.owned};border-color:color-mix(in srgb, ${STATUS_HEX.owned} 40%, var(--bd))">Own</button>
      <button ${n ? '' : 'disabled'} onclick="batchSetStatus('wishlist')" style="color:${STATUS_HEX.wishlist};border-color:color-mix(in srgb, ${STATUS_HEX.wishlist} 40%, var(--bd))">Wish</button>
      <button ${n ? '' : 'disabled'} onclick="batchSetStatus('ordered')" style="color:${STATUS_HEX.ordered};border-color:color-mix(in srgb, ${STATUS_HEX.ordered} 40%, var(--bd))">Ord</button>
      <button ${n ? '' : 'disabled'} onclick="batchSetStatus('for-sale')" style="color:${STATUS_HEX['for-sale']};border-color:color-mix(in srgb, ${STATUS_HEX['for-sale']} 40%, var(--bd))">Sale</button>
      <button ${n ? '' : 'disabled'} onclick="batchSetStatus('')" style="color:var(--t2);border-color:var(--bd)">${icon(ICO.x,12)} Clr</button>
    </div>

}

function renderNavBtn(key, ico, label, extra='') {
  const active = (S.tab === key && !S.activeLine) || (key === 'lines' && S.activeLine && S.tab === 'all');
  const showIcon = key !== 'collection';
  return `<button class="${active?'active':''}" onclick="navTo('${key}')">${showIcon ? icon(ico,14,active?2.5:1.5) : ''}${label}${extra}</button>`;
}

function renderBreadcrumb() {
  let html = '<div class="breadcrumb">';
  html += `<button onclick="goBack()">${icon(ICO.back,14)} Lines</button><span class="sep">›</span>`;
  if (S.activeSubline) {
    html += `<button class="crumb-link" onclick="clearSubline()">${esc(ln(S.activeLine))}</button><span class="sep">›</span>`;
    const slLabel = S.activeSubline === '__all__' ? 'All Figures' : (SUBLINES[S.activeLine]||[]).find(s=>s.key===S.activeSubline)?.label || '';
    html += `<span class="current">${esc(slLabel)}</span>`;
  } else {
    html += `<span class="current">${esc(ln(S.activeLine))}</span>`;
  }
  html += '</div>';
  return html;
}

function renderContent() {
  if (S.tab === 'lines' && !S.activeLine) return renderLinesGrid();
  if (!S.search && S.activeLine && !S.activeSubline && SUBLINES[S.activeLine]) return renderSublines();
  return renderFigList();
}

function renderStatsSheet() {
  const stats = getStats();
  const unowned = stats.total - stats.owned - stats.wish - stats.ord - stats.sale;
  const pct = n => stats.total ? (n / stats.total * 100).toFixed(1) : 0;
  // Spent totals
  let totalSpent = 0, paidCount = 0;
  S.figs.filter(f => !figIsHidden(f) && S.coll[f.id]?.status === 'owned' && S.coll[f.id]?.paid).forEach(f => {
    const v = parseFloat(S.coll[f.id].paid) || 0;
    if (v > 0) { totalSpent += v; paidCount++; }
  });
  const avgStr = paidCount > 0 ? `$${(totalSpent / paidCount).toFixed(2)} avg` : '';

  let html = `<div class="stats-bar" style="padding:0 0 16px">
    <div class="stats-segments">
      ${stats.owned ? `<div class="seg owned" style="width:${pct(stats.owned)}%"></div>` : ''}
      ${stats.wish ? `<div class="seg wishlist" style="width:${pct(stats.wish)}%"></div>` : ''}
      ${stats.ord ? `<div class="seg ordered" style="width:${pct(stats.ord)}%"></div>` : ''}
      ${stats.sale ? `<div class="seg for-sale" style="width:${pct(stats.sale)}%"></div>` : ''}
    </div>
    <div class="stats-legend">
      <button class="stat-item" onclick="goToFiltered('owned')"><div class="stat-dot owned"></div><span class="stat-val">${stats.owned}</span> owned</button>
      <button class="stat-item" onclick="goToFiltered('wishlist')"><div class="stat-dot wishlist"></div><span class="stat-val">${stats.wish}</span> wish</button>
      <button class="stat-item" onclick="goToFiltered('ordered')"><div class="stat-dot ordered"></div><span class="stat-val">${stats.ord}</span> ord</button>
      ${stats.sale ? `<button class="stat-item" onclick="goToFiltered('for-sale')"><div class="stat-dot for-sale"></div><span class="stat-val">${stats.sale}</span> sale</button>` : ''}
      <button class="stat-item" onclick="goToFiltered('unowned')"><div class="stat-dot unowned"></div><span class="stat-val">${unowned}</span> unowned</button>
    </div>
    ${totalSpent > 0 ? `<div style="margin-top:10px;font-size:13px;color:var(--gold);font-weight:600">$${totalSpent.toFixed(2)} spent${avgStr ? ` · ${avgStr}` : ''}</div>` : ''}
  </div>`;

  // Per-line breakdown
  html += '<div class="label text-upper text-dim text-xs" style="margin-bottom:10px">By Line</div>';
  const lineStats = getLineStats();
  const ordered = [...S.lineOrder].map(id => lineStats.find(l => l.id === id)).filter(Boolean)
    .concat(lineStats.filter(l => !S.lineOrder.includes(l.id)));
  ordered.filter(l => !isLineFullyHidden(l.id) && l.total > 0).forEach(l => {
    html += `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid color-mix(in srgb, var(--bd) 30%, transparent)">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:var(--t1);margin-bottom:4px">${esc(l.name)}</div>
        <div style="height:4px;background:var(--bd);border-radius:2px;overflow:hidden">
          <div style="height:100%;width:${l.pct}%;background:${l.pct===100?'var(--gn)':'var(--acc)'};border-radius:2px;transition:width 0.3s"></div>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:13px;font-weight:700;color:${l.pct===100?'var(--gn)':'var(--gold)'}">${l.pct}%</div>
        <div style="font-size:10px;color:var(--t3)">${l.owned}/${l.total}</div>
      </div>
    </div>`;
  });

  return html;
}

function renderLinesGrid() {
  const lineStats = getLineStats();
  const ordered = [...S.lineOrder].map(id => lineStats.find(l => l.id === id)).filter(Boolean)
    .concat(lineStats.filter(l => !S.lineOrder.includes(l.id)));

  let html = '';
  if (S.editingOrder) {
    html += `<div class="reorder-toggle"><button class="active" onclick="toggleReorder()">✓ Done</button></div>`;
  }

  if (S.editingOrder) {
    html += '<div class="reorder-list">';
    ordered.forEach((l, i) => {
      const hidden = isLineFullyHidden(l.id);
      html += `<div class="reorder-item" style="${hidden?'opacity:0.4':''}">
        <div class="reorder-arrows">
          <button ${i===0?'disabled':''} onclick="moveLine('${l.id}',-1)">↑</button>
          <button ${i===ordered.length-1?'disabled':''} onclick="moveLine('${l.id}',1)">↓</button>
        </div>
        <div style="flex:1;min-width:0">
          <div class="font-display" style="font-size:14px;color:var(--t1)">${esc(l.name)}</div>
          <div class="text-sm text-dim" style="margin-top:2px">${l.yr} · ${l.total} figures · ${l.owned} owned</div>
        </div>
        <button onclick="event.stopPropagation();toggleHidden('${l.id}')" style="padding:4px 10px;border-radius:8px;border:1px solid ${hidden?'var(--rd)':'var(--bd)'};background:${hidden?'color-mix(in srgb, var(--rd) 10%, transparent)':'var(--bg3)'};color:${hidden?'var(--rd)':'var(--t3)'};font-size:10px;flex-shrink:0">
          ${hidden?'Hidden':'Hide'}
        </button>
        <div style="font-size:12px;font-weight:600;color:${l.pct===100?'var(--gn)':'var(--gold)'};flex-shrink:0">${l.pct}%</div>
      </div>`;
    });
    html += '</div>';
  } else {
    html += '<div class="lines-grid">';
    ordered.filter(l => !isLineFullyHidden(l.id)).forEach(l => {
      const completeCls = l.pct === 100 ? 'complete' : '';
      html += `<div class="line-card" onclick="goToLine('${l.id}')">
        <img src="${IMG}/${l.id}.jpg" alt="${esc(l.name)}" onerror="this.style.display='none'" loading="lazy">
        <div class="overlay"></div>
        <div class="card-info">
          <div class="card-name font-display">${esc(l.name)}</div>
          <div class="card-year">${l.yr}</div>
          ${l.total > 0 ? `
            <div class="progress-bar"><div class="progress-fill ${completeCls}" style="width:${l.pct}%"></div></div>
            <div class="card-stats ${completeCls}">${l.owned}/${l.total} · ${l.pct}%</div>
          ` : ''}
        </div>
      </div>`;
    });
    html += '</div>';
  }
  return html;
}

function renderSublines() {
  const subs = SUBLINES[S.activeLine] || [];
  const allFigs = S.figs.filter(f => f.line === S.activeLine && !figIsHidden(f));
  const allOwned = allFigs.filter(f => S.coll[f.id]?.status === 'owned').length;
  const allPct = allFigs.length ? Math.round(allOwned/allFigs.length*100) : 0;

  let html = '<div class="subline-list">';
  html += `<button class="subline-card all-card" onclick="selectSubline('__all__')">
    <div class="subline-ring">${progressRing(allPct, 48, 'var(--gold)')}</div>
    <div class="subline-info">
      <div class="subline-name">${esc(ln(S.activeLine))} — All Figures</div>
      <div class="subline-stats">${allOwned} owned of ${allFigs.length}</div>
      <div class="subline-progress"><div class="subline-progress-fill ${allPct===100?'complete':''}" style="width:${allPct}%"></div></div>
    </div>
    <div class="subline-arrow">${icon(ICO.chevR,18)}</div>
  </button>`;
  html += '<div style="height:1px;background:var(--bd);margin:0 4px"></div>';
  subs.forEach(sl => {
    const slFigs = S.figs.filter(f => f.line === S.activeLine && sl.groups.includes(f.group));
    if (!slFigs.length) return;
    const hidden = isSublineHidden(S.activeLine, sl.key);
    const visibleFigs = hidden ? [] : slFigs;
    const owned = visibleFigs.filter(f => S.coll[f.id]?.status === 'owned').length;
    const pct = visibleFigs.length ? Math.round(owned/visibleFigs.length*100) : 0;
    html += `<div class="subline-card" style="${hidden?'opacity:0.4':''}" onclick="if(!event.target.closest('.hide-btn'))selectSubline('${sl.key}')">
      <div class="subline-ring">${progressRing(pct)}</div>
      <div class="subline-info">
        <div class="subline-name">${esc(sl.label)}</div>
        <div class="subline-stats">${hidden ? slFigs.length + ' figures (hidden)' : owned + ' owned of ' + slFigs.length}</div>
        ${!hidden ? `<div class="subline-progress"><div class="subline-progress-fill ${pct===100?'complete':''}" style="width:${pct}%"></div></div>` : ''}
      </div>
      <button class="hide-btn" onclick="event.stopPropagation();toggleHidden('${S.activeLine}:${sl.key}')" style="padding:4px 10px;border-radius:8px;border:1px solid ${hidden?'var(--rd)':'var(--bd)'};background:${hidden?'color-mix(in srgb, var(--rd) 10%, transparent)':'var(--bg3)'};color:${hidden?'var(--rd)':'var(--t3)'};font-size:10px;flex-shrink:0">
        ${hidden?'Show':'Hide'}
      </button>
    </div>`;
  });
  html += '</div>';
  return html;
}

const BATCH_SIZE = 80;

function renderFigRow(f) {
  const c = S.coll[f.id] || {};
  const statusCls = c.status || '';
  const hasVar = /\w/.test(c.variants || '');
  const isNew = S.newFigIds.has(f.id);
  const hasCustom = S.customPhotos[f.id];
  const imgErr = S.imgErrors[f.id];
  const showImg = (hasCustom || f.image) && !imgErr;
  const imgSrc = (hasCustom && photoStore.get(f.id)) || f.image;
  const isSelected = S.selectMode && S.selected.has(f.id);
  const rowClick = S.selectMode ? `toggleSelect(event,'${f.id}')` : `openFig('${f.id}')`;
  const checkSvg = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;

  return `<div class="fig-row${isSelected ? ' selected' : ''}" data-fig-id="${f.id}" onclick="${rowClick}">
    ${S.selectMode ? `<div class="select-checkbox ${isSelected ? 'checked' : ''}">${checkSvg}</div>` : ''}
    <div class="fig-thumb ${statusCls}">
      ${showImg && imgSrc ? `<img src="${esc(imgSrc)}" alt="" loading="lazy" onerror="imgErr('${f.id}')">` :
        `<span class="initial">${esc(f.name[0])}</span>`}
    </div>
    <div class="fig-text">
      <div class="fig-name">${esc(f.name)}</div>
      <div class="fig-meta">
        ${S.search ? `<span class="line-name">${esc(ln(f.line))}</span>` : ''}
        ${f.group ? `<span>${S.search?'· ':''}${esc(f.group)}</span>` : ''}
        ${f.wave ? `<span>· W${esc(f.wave)}</span>` : ''}
        ${f.year ? `<span>· ${f.year}</span>` : ''}
      </div>
    </div>
    ${S.selectMode ? '' : `<div class="fig-actions">
      ${isNew ? '<div style="font-size:9px;font-weight:700;color:var(--acc);letter-spacing:0.5px">NEW</div>' : ''}
      ${hasVar ? '<div class="fig-var-badge">VAR</div>' : ''}
      ${c.status ? `<button class="quick-own" onclick="cycleStatus(event,'${f.id}')" title="Cycle status" style="border-color:${STATUS_COLOR[c.status]}"><div class="fig-status-dot ${statusCls}"></div></button>` :
        `<button class="quick-own" onclick="event.stopPropagation();setStatus('${f.id}','owned')" title="Mark owned">${icon(ICO.check,16)}</button>`}
    </div>`}
  </div>`;
}

function renderFigCard(f) {
  const c = S.coll[f.id] || {};
  const statusCls = c.status || '';
  const isNew = S.newFigIds.has(f.id);
  const hasCustom = S.customPhotos[f.id];
  const imgErr = S.imgErrors[f.id];
  const showImg = (hasCustom || f.image) && !imgErr;
  const imgSrc = (hasCustom && photoStore.get(f.id)) || f.image;
  const statusIcon = c.status
    ? `<div class="fig-status-dot ${statusCls}"></div>`
    : `<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>`;
  const badgeAction = c.status
    ? `cycleStatus(event,'${f.id}')`
    : `event.stopPropagation();setStatus('${f.id}','owned')`;

  const isSelected = S.selectMode && S.selected.has(f.id);
  const cardClick = S.selectMode ? `toggleSelect(event,'${f.id}')` : `openFig('${f.id}')`;
  const checkSvg = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;

  return `<div class="fig-card ${statusCls}${isSelected ? ' selected' : ''}" data-fig-id="${f.id}" onclick="${cardClick}">
    ${showImg && imgSrc ? `<img src="${esc(imgSrc)}" alt="" loading="lazy" onerror="imgErr('${f.id}')">` :
      `<div class="card-initial">${esc(f.name[0])}</div>`}
    <div class="card-overlay"></div>
    ${S.selectMode ? `<div class="select-checkbox select-checkbox-corner ${isSelected ? 'checked' : ''}">${checkSvg}</div>` : ''}
    ${!S.selectMode && isNew ? '<div class="new-badge">NEW</div>' : ''}
    ${S.selectMode ? '' : `<button class="status-badge ${statusCls}" onclick="${badgeAction}">${statusIcon}</button>`}
    <div class="card-info">
      <div class="card-fig-name">${esc(f.name)}</div>
      <div class="card-fig-meta">${S.search ? esc(ln(f.line)) + ' · ' : ''}${f.group ? esc(f.group) : ''}${f.year ? ' · ' + f.year : ''}</div>
    </div>
  </div>`;
}

function renderFigItem(f) {
  return S.viewMode === 'grid' ? renderFigCard(f) : renderFigRow(f);
}

function yearHeader(year) {
  return `<div style="padding:12px 4px 6px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--gold);letter-spacing:1px;border-bottom:1px solid var(--bd);margin-bottom:4px">${year || 'Unknown'}</div>`;
}

function renderFigsWithHeaders(figs, renderFn) {
  const showHeaders = !S.search && (S.sortBy === 'year' || S.sortBy === 'year-desc') && S.viewMode === 'list';
  let html = '';
  let lastYear = null;
  figs.forEach(f => {
    if (showHeaders && f.year !== lastYear) {
      lastYear = f.year;
      html += yearHeader(f.year);
    }
    html += renderFn(f);
  });
  return html;
}

function renderFigList() {
  const figs = getSortedFigs();
  const hf = hasFilters();
  const isGrid = S.viewMode === 'grid';
  let html = '<div class="fig-list">';
  // Compute spent for collection tab
  let spentInfo = '';
  if (S.tab === 'collection') {
    let spent = 0, paidCount = 0;
    figs.forEach(f => { const p = parseFloat(S.coll[f.id]?.paid); if (p > 0) { spent += p; paidCount++; } });
    if (spent > 0) {
      const avg = (spent / paidCount).toFixed(2);
      spentInfo = ` · <span style="color:var(--gold)">$${spent.toFixed(2)} spent</span> · <span style="color:var(--t2)">$${avg} avg</span>`;
    }
  }
  // View toggle + count row
  const listActive = !isGrid ? 'active' : '';
  const gridActive = isGrid ? 'active' : '';
  html += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-left:4px;gap:8px">
    <div class="fig-count" style="margin-bottom:0;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${figs.length} figure${figs.length!==1?'s':''}${S.search?' across all lines':hf?' (filtered)':''}${spentInfo}</div>
    <button class="select-btn${S.selectMode ? ' active' : ''}" onclick="${S.selectMode ? 'exitSelectMode()' : 'enterSelectMode()'}" title="Select mode">
      ${S.selectMode ? 'Done' : 'Select'}
    </button>
    <div class="view-toggle">
      <button class="${listActive}" onclick="setViewMode('list')" title="List view">${icon(ICO.list,14)}</button>
      <button class="${gridActive}" onclick="setViewMode('grid')" title="Grid view">${icon(ICO.lines,14)}</button>
    </div>
  </div>`;
  if (!figs.length) {
    html += `<div class="empty-state"><div class="emoji">🔍</div><div class="title">No figures found</div><div class="text-sm">Try adjusting your search or filters</div></div>`;
  } else {
    // Recently changed section for collection tab
    if (S.tab === 'collection' && !S.search && !hf && S._recentChanges?.length) {
      const recent = S._recentChanges.slice(0, 5).map(id => figById(id)).filter(Boolean);
      if (recent.length) {
        html += `<div style="padding:4px 4px 2px;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px">Recently changed</div>`;
        recent.forEach(f => { html += isGrid ? renderFigCard(f) : renderFigRow(f); });
        html += `<div style="height:1px;background:var(--bd);margin:12px 0"></div>`;
      }
    }
    const first = figs.slice(0, BATCH_SIZE);
    const rest = figs.slice(BATCH_SIZE);
    if (isGrid) {
      html += '<div class="fig-grid">';
      first.forEach(f => { html += renderFigCard(f); });
      if (rest.length) html += `<div id="figListRest" style="display:contents"></div>`;
      html += '</div>';
    } else {
      html += renderFigsWithHeaders(first, renderFigRow);
      if (rest.length) html += `<div id="figListRest"></div>`;
    }
    if (rest.length) {
      requestAnimationFrame(() => {
        const container = document.getElementById('figListRest');
        if (!container) return;
        if (isGrid) {
          container.innerHTML = rest.map(f => renderFigCard(f)).join('');
        } else {
          container.innerHTML = renderFigsWithHeaders(rest, renderFigRow);
        }
        // Bind long-press to newly rendered items
        container.querySelectorAll('[data-fig-id]').forEach(el => {
          if (!el._lpBound) { el._lpBound = true; initLongPress(el, el.dataset.figId); }
        });
      });
    }
  }
  html += '<div class="bottom-spacer"></div></div>';
  return html;
}

function renderDetail() {

// ─── History Management ───────────────────────────────────────────
// Each navigation action pushes a state so Android/browser back button
// walks backward through the app instead of closing it.
let _skipPush = false; // flag to avoid pushing during popstate handling

function navState() {
  // Snapshot of the navigable state (not the full S — just what back needs)
  return {
    screen: S.screen,
    tab: S.tab,
    activeLine: S.activeLine,
    activeSubline: S.activeSubline,
    activeFigId: S.activeFig?.id || null,
    sheet: S.sheet,
    search: S.search,
  };
}

function pushNav() {
  if (_skipPush) return;
  history.pushState(navState(), '');
}

function restoreNav(state) {
  if (!state) return;
  S.screen = state.screen || 'main';
  S.tab = state.tab || 'lines';
  S.activeLine = state.activeLine || null;
  S.activeSubline = state.activeSubline || null;
  S.activeFig = state.activeFigId ? figById(state.activeFigId) || null : null;
  S.sheet = state.sheet || null;
  S.search = state.search || '';
}

// Listen for back button (Android hardware back, browser back, swipe back)
window.addEventListener('popstate', e => {
  _skipPush = true;
  // Always restore bars on back navigation
  S.barsHidden = false;
  S.searchBarHidden = false;

  // If select mode is active, exit it first
  if (S.selectMode) {
    S.selectMode = false;
    S.selected = new Set();
    render();
    _skipPush = false;
    return;
  }

  // If photo viewer is open, close it first
  if (S.photoViewer) {
    S.photoViewer = null;
    render();
    _skipPush = false;
    return;
  }

  // If a sheet is open, just close it (don't go further back)
  if (S.sheet) {
    S.sheet = null;
    render();
    _skipPush = false;
    return;
  }

  // If on figure detail, go back to list
  if (S.screen === 'figure') {
    S.screen = 'main';
    render();
    _skipPush = false;
    return;
  }

  // If viewing a subline, go back to line
  if (S.activeSubline) {
    S.activeSubline = null;
    render();
    _skipPush = false;
    return;
  }

  // If viewing a line, go back to lines grid
  if (S.activeLine) {
    S.activeLine = null;
    S.activeSubline = null;
    S.tab = 'lines';
    render();
    _skipPush = false;
    return;
  }

  // If searching, clear search
  if (S.search) {
    S.search = '';
    render();
    _skipPush = false;
    return;
  }

  // At root — push a state back so next back press has something to pop
  // This prevents the app from closing on the first back press at home
  history.pushState(navState(), '');
  _skipPush = false;
});

// Seed the initial history entry so we always have something to pop
history.replaceState(navState(), '');

// ─── Event Handlers ───────────────────────────────────────────────
let _searchTimer = null;
window.onSearch = val => {
  S.search = val;
  if (val) S.tab = 'all';
  // Clearing search — do full render to restore UI (clear button, breadcrumbs, tab state)
  if (!val) { pushNav(); render(); return; }
  // Debounced content update — 120ms debounce preserves input focus
  if (_searchTimer) clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    const ca = document.getElementById('contentArea');
    if (ca) {
      ca.innerHTML = '<div id="topSpacer"></div>' + renderContent();
      const tb = document.getElementById('topBar');
      const ts = document.getElementById('topSpacer');
      if (ts && tb) ts.style.height = tb.offsetHeight + 'px';
      // Bind long-press to search results
      ca.querySelectorAll('[data-fig-id]').forEach(el => {
        if (!el._lpBound) { el._lpBound = true; initLongPress(el, el.dataset.figId); }
      });
    }
    // Show clear button if it's not already there
    const wrap = document.querySelector('.search-wrap');
    const inp = document.getElementById('searchInput');
    if (wrap && inp && !wrap.querySelector('.search-clear')) {
      const btn = document.createElement('button');
      btn.className = 'search-clear';
      btn.innerHTML = icon(ICO.x, 14);
      btn.onclick = () => onSearch('');
      wrap.appendChild(btn);
    }
    _searchTimer = null;
  }, 120);
};
window.navTo = key => { S.tab = key; S.searchBarHidden = false; S.barsHidden = false; if (key !== 'all' || !S.activeLine) { S.activeLine = null; S.activeSubline = null; } pushNav(); render(); };
window.goToLine = id => { S.activeLine = id; S.activeSubline = null; S.tab = 'all'; S.savedScroll = 0; S.searchBarHidden = false; S.barsHidden = false; S._justNavigated = true; pushNav(); render(); };
window.goBack = () => { history.back(); };
window.goHome = () => { S.tab = 'lines'; S.activeLine = null; S.activeSubline = null; S.search = ''; S.savedScroll = 0; S.searchBarHidden = false; S.barsHidden = false; pushNav(); render(); };
window.searchCharacter = name => {
  // Extract base character name: strip parenthetical suffixes, "Battle Armor", "200x" prefixes etc.
  let base = name.replace(/\s*\(.*?\)\s*/g, '').replace(/\s*-\s*(Battle|Deluxe|Mega|Mini|Giant|Lord|King|Prince).*$/i, '').trim();
  // Use first two words if name is long (e.g. "Battle Armor He-Man" → "He-Man")
  const parts = base.split(/\s+/);
  if (parts.length > 2) {
    // Try to find the core name — usually the last hyphenated word or proper noun
    const hyphenated = parts.find(p => p.includes('-'));
    if (hyphenated) base = hyphenated;
    else base = parts.slice(-2).join(' ');
  }
  S.screen = 'main'; S.search = base; S.tab = 'all';
  S.activeLine = null; S.activeSubline = null;
  S.savedScroll = 0; S.barsHidden = false; S.searchBarHidden = false;
  pushNav(); render();
};
window.clearSubline = () => { history.back(); };
window.selectSubline = key => { S.activeSubline = key; S.tab = 'all'; S.savedScroll = 0; S.searchBarHidden = false; S._justNavigated = true; pushNav(); render(); };
window.toggleReorder = () => { S.editingOrder = !S.editingOrder; render(); };
window.setViewMode = mode => { S.viewMode = mode; store.set('motu-view', mode); render(); };
window.goToFiltered = status => {
  S.sheet = null;
  S.filterStatus = status;
  S.filterFaction = '';
  S.filterVariants = false;
  S.activeLine = null;
  S.activeSubline = null;
  S.tab = 'all';
  S.savedScroll = 0;
  S.barsHidden = false;
  S.searchBarHidden = false;
  pushNav();
  render();
};
window.toggleHidden = toggleHidden;
window.moveLine = (id, dir) => {
  const arr = [...S.lineOrder]; const i = arr.indexOf(id); const j = i + dir;
  if (j < 0 || j >= arr.length) return;
  [arr[i], arr[j]] = [arr[j], arr[i]];
  S.lineOrder = arr; store.set('motu-line-order', arr); render();
};

window.openFig = id => {
  const ca = document.getElementById('contentArea');
  if (ca) S.savedScroll = ca.scrollTop;
  S.activeFig = figById(id);
  S.screen = 'figure'; pushNav(); render();
};
window.closeDetail = () => { history.back(); };
window.deleteFig = id => {
  if (!confirm('Delete this figure?')) return;
  S.figs = S.figs.filter(f => f.id !== id);
  rebuildFigIndex();
  delete S.coll[id]; saveColl();
  S.screen = 'main'; render();
};

window.openSheet = name => { S.sheet = name; pushNav(); render();
  requestAnimationFrame(() => { const el = document.getElementById('sheetOverlay'); if (el) el.classList.add('visible'); });
};
window.closeSheet = () => { history.back(); };
window.setTheme = t => { S.theme = t; S.titleIdx = 0; store.set('motu-theme', t); document.documentElement.setAttribute('data-theme', t); closeSheet(); };
window.imgErr = id => { S.imgErrors[id] = true; };

// ─── Batch Selection ────────────────────────────────────────────
window.enterSelectMode = () => {
  S.selectMode = true;
  S.selected = new Set();
  pushNav();
  haptic && haptic();
  render();
};
window.enterSelectModeWith = id => {
  S.selectMode = true;
  S.selected = new Set([id]);
  pushNav();
  haptic && haptic();
  render();
};
window.exitSelectMode = () => {
  if (S.selectMode) history.back();
  else { S.selectMode = false; S.selected = new Set(); render(); }
};
window.toggleSelect = (e, id) => {
  if (e) e.stopPropagation();
  if (S.selected.has(id)) S.selected.delete(id);
  else S.selected.add(id);
  haptic && haptic(8);
  // Surgical DOM patch for row/card
  const isSelected = S.selected.has(id);
  const el = document.querySelector(`.fig-row[data-fig-id="${id}"], .fig-card[data-fig-id="${id}"]`);
  if (el) {
    el.classList.toggle('selected', isSelected);
    const cb = el.querySelector('.select-checkbox');
    if (cb) cb.classList.toggle('checked', isSelected);
  }
  // Re-render actionbar (buttons enable/disable based on count)
  const bar = document.querySelector('.select-actionbar');
  if (bar) bar.outerHTML = renderSelectActionbar();
};
window.selectAllVisible = () => {
  const figs = getSortedFigs();
  if (S.selected.size === figs.length) {
    S.selected = new Set();
  } else {
    S.selected = new Set(figs.map(f => f.id));
  }
  haptic && haptic();
  render();
};
window.batchSetStatus = status => {
  const ids = Array.from(S.selected);
  if (!ids.length) return;
  let changed = 0;
  ids.forEach(id => {
    if (!S.coll[id]) S.coll[id] = {};
    if (status === '') {
      delete S.coll[id].status;
      if (!Object.keys(S.coll[id]).length) delete S.coll[id];
    } else {
      S.coll[id] = {...S.coll[id], status};
    }
    changed++;
    S._recentChanges = [id, ...S._recentChanges.filter(x => x !== id)].slice(0, 10);
  });
  saveColl();
  store.set('motu-recent', S._recentChanges);
  haptic && haptic(25);
  const label = status ? STATUS_LABEL[status] : 'Cleared';
  toast(`✓ ${changed} figures → ${label}`);
  render();
};

// Long-press status cycle: owned → wishlist → ordered → for-sale → clear
const STATUS_CYCLE = ['owned','wishlist','ordered','for-sale', ''];
window.cycleStatus = (e, id) => {
  e.stopPropagation();
  const prevColl = JSON.parse(JSON.stringify(S.coll[id] || {}));
  const cur = S.coll[id]?.status || '';
  const idx = STATUS_CYCLE.indexOf(cur);
  const next = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
  if (next) {
    if (!S.coll[id]) S.coll[id] = {};
    S.coll[id].status = next;
  } else {
    if (S.coll[id]) { delete S.coll[id].status; if (!Object.keys(S.coll[id]).length) delete S.coll[id]; }
  }
  saveColl(); haptic();
  S._recentChanges = [id, ...S._recentChanges.filter(x => x !== id)].slice(0, 10);
  store.set('motu-recent', S._recentChanges);
  const fig = figById(id);
  const name = fig ? fig.name : id;
  const newStatus = S.coll[id]?.status;
  if (newStatus) toastUndo(`✓ ${name} → ${STATUS_LABEL[newStatus]}`, id, prevColl);
  else toastUndo(`✗ ${name} cleared`, id, prevColl);
  triggerPulse(id, newStatus);
  if (!patchFigRow(id)) render();
  // Check completion when marking as owned
  if (newStatus === 'owned' && fig) checkCompletion(fig);
};

window.handlePhoto = (input, figId) => {
  const file = input.files?.[0]; if (!file) return;
  if (file.size > 20000000) { alert('Image too large (max 20MB).'); return; }
  // Check photo limit
  const existing = S.customPhotos[figId] || [];
  if (existing.length >= MAX_PHOTOS) {
    alert(`Maximum ${MAX_PHOTOS} photos per figure. Remove one first.`);
    input.value = '';
    return;
  }
  // Load via object URL instead of base64 data URL — avoids doubling memory
  // for large images and speeds up decode on mid-range Androids.
  const objUrl = URL.createObjectURL(file);
  const img = new Image();
  img.onload = async () => {
    try {
      const MAX = 800;
      const scale = Math.min(1, MAX / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.75));
      if (!blob) { alert('Could not process image.'); return; }
      const n = await photoStore.add(figId, blob, '');
      if (n < 0) { alert('Storage full or photo limit reached.'); return; }
      S.imgErrors[figId] = false;
      input.value = '';
      haptic && haptic();
      renderDetail();
    } finally {
      URL.revokeObjectURL(objUrl);
    }
  };
  img.onerror = () => {
    URL.revokeObjectURL(objUrl);
    alert('Could not read image file.');
    input.value = '';
  };
  img.src = objUrl;
};

window.removePhoto = async (id, n) => {
  if (!confirm('Remove this photo?')) return;
  await photoStore.remove(id, n);
  haptic && haptic();
  renderDetail();
};

window.clearPhoto = async id => {
  if (!confirm('Remove all photos for this figure?')) return;
  await photoStore.delAll(id);
  renderDetail();
};

window.setPhotoLabel = async (id, n, label) => {
  await photoStore.setLabel(id, n, label.trim());
  renderDetail();
};

window.setDefaultPhoto = (id, n) => {
  if (S.defaultPhoto[id] === n) {
    delete S.defaultPhoto[id];
  } else {
    S.defaultPhoto[id] = n;
  }
  store.set('motu-default-photo', S.defaultPhoto);
  haptic && haptic();
  // Preserve carousel scroll position across re-render
  const carousel = document.getElementById('photoCarousel');
  const scrollPos = carousel ? carousel.scrollLeft : 0;
  renderDetail();
  const newCarousel = document.getElementById('photoCarousel');
  if (newCarousel && scrollPos) {
    newCarousel.scrollLeft = scrollPos;
  }
};

// Full-screen photo viewer
window.openPhotoViewer = (id, startN) => {
  const photos = photoStore.getAll(id);
  if (!photos.length) return;
  const startIdx = Math.max(0, photos.findIndex(p => p.n === startN));
  S.photoViewer = { figId: id, photos, idx: startIdx };
  pushNav();
  haptic && haptic();
  render();
};
window.closePhotoViewer = () => { history.back(); };
window.photoViewerNav = dir => {
  if (!S.photoViewer) return;
  const len = S.photoViewer.photos.length;
  S.photoViewer.idx = (S.photoViewer.idx + dir + len) % len;
  render();
};

window.handleCSV = input => {
  const file = input.files?.[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const overwrite = document.querySelector('.checkbox.checked') !== null;
    const result = doImport(ev.target.result, overwrite);
    const body = document.querySelector('.sheet-body');
    if (body) {
      body.innerHTML = `<div style="text-align:center;padding:20px 0">
        <div style="font-size:48px;margin-bottom:12px">${result.matched>0?'✅':'🤷'}</div>
        <div class="font-display" style="font-size:22px;color:var(--gold);margin-bottom:4px">${result.matched} imported</div>
        ${result.skipped>0 ? `<div class="text-sm text-dim" style="margin-bottom:8px">${result.skipped} already owned, skipped</div>` : ''}
        ${result.unmatched.length>0 ? `<details style="text-align:left;margin-top:16px">
          <summary class="text-sm text-dim" style="cursor:pointer;padding:8px 0">${result.unmatched.length} not found in app</summary>
          <div style="margin-top:8px;max-height:160px;overflow-y:auto;font-size:12px;color:var(--t3);line-height:2">${result.unmatched.map(u=>'<div>'+esc(u)+'</div>').join('')}</div>
        </details>` : ''}
      </div>`;
    }
  };
  reader.readAsText(file);
};

// Drop zone support
document.addEventListener('dragover', e => {
  const dz = document.getElementById('dropZone');
  if (!dz) return;  // Don't interfere with unrelated drag operations
  e.preventDefault();
  dz.classList.add('dragover');
});
document.addEventListener('dragleave', () => {
  const dz = document.getElementById('dropZone');
  if (dz) dz.classList.remove('dragover');
});
document.addEventListener('drop', e => {
  const dz = document.getElementById('dropZone');
  if (!dz) return;
  e.preventDefault();
  dz.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  if (file.name.endsWith('.json')) {
    importJSON(file);
  } else {
    const r = new FileReader();
    r.onload = ev => {
      const overwrite = document.querySelector('.checkbox.checked') !== null;
      const result = doImport(ev.target.result, overwrite);
      const body = document.querySelector('.sheet-body');
      if (body) {
        body.innerHTML = `<div style="text-align:center;padding:20px 0">
          <div style="font-size:48px;margin-bottom:12px">${result.matched>0?'✅':'🤷'}</div>
          <div class="font-display" style="font-size:22px;color:var(--gold);margin-bottom:4px">${result.matched} imported</div>
        </div>`;
      }
    };
    r.readAsText(file);
  }
});

// ─── Boot ─────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
  // Listen for background update notification from SW
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'UPDATE_AVAILABLE') {
      // Auto-reload on next user interaction to pick up new version
      const handler = () => {
        window.removeEventListener('touchstart', handler);
        window.removeEventListener('click', handler);
        window.location.reload();
      };
      window.addEventListener('touchstart', handler, {once: true});
      window.addEventListener('click', handler, {once: true});
    }
  });
}
// Online/offline detection
window.addEventListener('online', () => {
  S.isOffline = false;
  toast('✓ Back online');
  haptic && haptic();
  render();
});
window.addEventListener('offline', () => {
  S.isOffline = true;
  toast('✗ Connection lost');
  haptic && haptic();
  render();
});

init();
</script>
</body>
</html>
