// § PHOTO-STORAGE ── OPFS + localStorage fallback, photoStore API ──
// Per figure: up to MAX_PHOTOS photos, each with optional label.
// OPFS filename: photo-{figId}-{n}.jpg  (n = 0..MAX_PHOTOS-1)
// Labels stored separately in localStorage: { [figId]: { [n]: label } }
// Per-copy photo assignment (v4.46+): { [figId]: { [n]: copyId } }
// A photo with no entry here is "shared" — visible from any copy view.
const MAX_PHOTOS = 8;
const PHOTO_LABELS_KEY = 'motu-photo-labels';
const PHOTO_COPY_KEY = 'motu-photo-copy';
const photoURLs = {};   // { "figId-n": objectURL }
let _opfsDir = null;
let _opfsReady = false;
let _photoLabels = {};  // { [figId]: { [n]: label } }
let _photoCopy = {};    // { [figId]: { [n]: copyId } } — n's copy assignment

async function initOPFS() {
  try {
    if (!navigator.storage?.getDirectory) return false;
    _opfsDir = await navigator.storage.getDirectory();
    _opfsReady = true;
    return true;
  } catch { return false; }
}

function loadPhotoLabels() {
  try { _photoLabels = JSON.parse(localStorage.getItem(PHOTO_LABELS_KEY) || '{}'); } catch { _photoLabels = {}; }
}
function savePhotoLabels() {
  try { localStorage.setItem(PHOTO_LABELS_KEY, JSON.stringify(_photoLabels)); } catch {}
}
function loadPhotoCopyMap() {
  try { _photoCopy = JSON.parse(localStorage.getItem(PHOTO_COPY_KEY) || '{}'); } catch { _photoCopy = {}; }
}
function savePhotoCopyMap() {
  try { localStorage.setItem(PHOTO_COPY_KEY, JSON.stringify(_photoCopy)); } catch {}
}
// Returns the copyId a photo is assigned to (null/undefined if shared).
function photoCopyOf(figId, n) {
  return _photoCopy[figId]?.[n];
}
// Set or clear a photo's copy assignment.
function setPhotoCopy(figId, n, copyId) {
  if (copyId == null) {
    if (_photoCopy[figId]) {
      delete _photoCopy[figId][n];
      if (!Object.keys(_photoCopy[figId]).length) delete _photoCopy[figId];
    }
  } else {
    if (!_photoCopy[figId]) _photoCopy[figId] = {};
    _photoCopy[figId][n] = copyId;
  }
  savePhotoCopyMap();
}

const photoStore = {
  // Sync: get primary (first) photo URL for a figure — used in list/grid thumbnails
  // Sync: get primary photo URL for list/grid thumbnails
  // Returns null if default is stock image (n=-1) so renderer falls through to f.image
  get: id => {
    const defN = S.defaultPhoto?.[id];
    if (defN === -1) return null;  // user chose stock as default
    const arr = S.customPhotos[id];
    if (!arr || !arr.length) return null;
    const targetN = defN != null ? defN : arr[0].n;
    return photoURLs[id + '-' + targetN] || photoURLs[id + '-' + arr[0].n] || null;
  },

  // Sync: get all photos for a figure — { url, label, n }[]
  getAll: id => {
    const arr = S.customPhotos[id] || [];
    return arr.map(({n, label}) => ({
      n, label: label || '',
      url: photoURLs[id + '-' + n] || null,
    })).filter(p => p.url);
  },

  // Sync: get photos belonging to a specific copy. Includes shared (unassigned)
  // photos when includeShared is true, so a single-copy figure sees everything.
  getForCopy: (id, copyId, includeShared = true) => {
    const arr = S.customPhotos[id] || [];
    return arr
      .filter(({n}) => {
        const owner = photoCopyOf(id, n);
        if (owner == null) return includeShared;
        return owner === copyId;
      })
      .map(({n, label}) => ({
        n, label: label || '',
        url: photoURLs[id + '-' + n] || null,
        copyId: photoCopyOf(id, n) ?? null,
      }))
      .filter(p => p.url);
  },

  // Async: add a new photo to a figure. Returns index (n) on success, -1 on failure.
  // Optional copyId associates the photo with a specific copy; null/undefined = shared.
  add: async (id, blob, label = '', copyId = null) => {
    try {
      const existing = S.customPhotos[id] || [];
      if (existing.length >= MAX_PHOTOS) return -1;
      // Find first free slot n
      const used = new Set(existing.map(p => p.n));
      let n = 0;
      while (used.has(n) && n < MAX_PHOTOS) n++;
      if (n >= MAX_PHOTOS) return -1;

      if (_opfsReady) {
        const fh = await _opfsDir.getFileHandle(`photo-${id}-${n}.jpg`, {create: true});
        const writable = await fh.createWritable();
        await writable.write(blob);
        await writable.close();
        const key = id + '-' + n;
        if (photoURLs[key]) URL.revokeObjectURL(photoURLs[key]);
        photoURLs[key] = URL.createObjectURL(blob);
      } else {
        // Fallback: localStorage base64
        const dataUrl = await new Promise((res, rej) => {
          const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(blob);
        });
        try { localStorage.setItem(`motu-photo-${id}-${n}`, dataUrl); }
        catch { return -1; }
        photoURLs[id + '-' + n] = dataUrl;
      }

      // Update state
      const arr = [...(S.customPhotos[id] || []), {n, label}];
      S.customPhotos[id] = arr;
      if (label) {
        if (!_photoLabels[id]) _photoLabels[id] = {};
        _photoLabels[id][n] = label;
        savePhotoLabels();
      }
      if (copyId != null) setPhotoCopy(id, n, copyId);
      return n;
    } catch { return -1; }
  },

  // Async: remove photo at index n for a figure
  remove: async (id, n) => {
    const key = id + '-' + n;
    if (photoURLs[key]) { URL.revokeObjectURL(photoURLs[key]); delete photoURLs[key]; }
    try {
      if (_opfsReady) await _opfsDir.removeEntry(`photo-${id}-${n}.jpg`);
    } catch {}
    try { localStorage.removeItem(`motu-photo-${id}-${n}`); } catch {}
    // Update state
    const arr = (S.customPhotos[id] || []).filter(p => p.n !== n);
    if (arr.length) S.customPhotos[id] = arr;
    else delete S.customPhotos[id];
    // Clean label
    if (_photoLabels[id]) {
      delete _photoLabels[id][n];
      if (!Object.keys(_photoLabels[id]).length) delete _photoLabels[id];
      savePhotoLabels();
    }
    // Clean copy assignment
    setPhotoCopy(id, n, null);
  },

  // Async: update label for photo n of figure id
  setLabel: async (id, n, label) => {
    if (!_photoLabels[id]) _photoLabels[id] = {};
    if (label) _photoLabels[id][n] = label;
    else delete _photoLabels[id][n];
    if (!Object.keys(_photoLabels[id]).length) delete _photoLabels[id];
    savePhotoLabels();
    const arr = S.customPhotos[id] || [];
    const idx = arr.findIndex(p => p.n === n);
    if (idx >= 0) arr[idx] = {...arr[idx], label};
  },

  // Delete all photos for a figure (used by clearPhoto legacy API)
  delAll: async id => {
    const arr = [...(S.customPhotos[id] || [])];
    for (const p of arr) await photoStore.remove(id, p.n);
  },

  // Load all photos into URL cache (called during init)
  loadAll: async () => {
    loadPhotoLabels();
    loadPhotoCopyMap();

    // Revoke any existing blob URLs before rebuilding to prevent leaks on double-call
    Object.entries(photoURLs).forEach(([, url]) => {
      if (url && url.startsWith('blob:')) URL.revokeObjectURL(url);
    });
    for (const k in photoURLs) delete photoURLs[k];
    S.customPhotos = {};

    // Parse filename: photo-{figId}-{n}.jpg
    // Note: figId itself may contain hyphens, so we must match -{digit}.jpg at the end
    const parsePhotoName = name => {
      if (!name.startsWith('photo-') || !name.endsWith('.jpg')) return null;
      const core = name.slice(6, -4);
      const m = core.match(/^(.+)-(\d+)$/);
      if (!m) return null;
      return {id: m[1], n: parseInt(m[2], 10)};
    };

    const buckets = {};  // { figId: [n, ...] }

    if (_opfsReady) {
      try {
        for await (const [name, handle] of _opfsDir) {
          if (handle.kind !== 'file') continue;
          const parsed = parsePhotoName(name);
          if (!parsed) continue;
          const file = await handle.getFile();
          photoURLs[parsed.id + '-' + parsed.n] = URL.createObjectURL(file);
          (buckets[parsed.id] = buckets[parsed.id] || []).push(parsed.n);
        }
      } catch(e) { console.error('OPFS loadAll error:', e); }
    }

    // Load localStorage fallback photos — guard against overwriting OPFS blob URLs
    try {
      const keys = Object.keys(localStorage).filter(k => /^motu-photo-.+-\d+$/.test(k));
      keys.forEach(k => {
        const core = k.slice('motu-photo-'.length);
        const m = core.match(/^(.+)-(\d+)$/);
        if (!m) return;
        const id = m[1], n = parseInt(m[2], 10);
        const cacheKey = id + '-' + n;
        if (photoURLs[cacheKey]) return; // OPFS already owns this slot
        photoURLs[cacheKey] = localStorage.getItem(k);
        (buckets[id] = buckets[id] || []).push(n);
      });
    } catch {}

    // Populate customPhotos from buckets, sorted by n
    Object.entries(buckets).forEach(([id, ns]) => {
      ns.sort((a, b) => a - b);
      S.customPhotos[id] = ns.map(n => ({n, label: _photoLabels[id]?.[n] || ''}));
    });
  },

  // One-time migration: rename photo-{figId}.jpg → photo-{figId}-0.jpg
  migrateToMulti: async () => {
    if (!_opfsReady) return 0;
    let migrated = 0;
    try {
      const toMigrate = [];
      for await (const [name, handle] of _opfsDir) {
        if (handle.kind !== 'file') continue;
        if (name.startsWith('photo-') && name.endsWith('.jpg')) {
          const core = name.slice(6, -4);
          // If core doesn't end with -digit, it's the old format
          if (!/-\d+$/.test(core)) toMigrate.push({name, id: core});
        }
      }
      for (const {name, id} of toMigrate) {
        try {
          const oldHandle = await _opfsDir.getFileHandle(name);
          const file = await oldHandle.getFile();
          const newHandle = await _opfsDir.getFileHandle(`photo-${id}-0.jpg`, {create: true});
          const writable = await newHandle.createWritable();
          await writable.write(await file.arrayBuffer());
          await writable.close();
          await _opfsDir.removeEntry(name);
          migrated++;
        } catch(e) { console.error('Migration failed for ' + name, e); }
      }
    } catch {}
    return migrated;
  },

  // Legacy migration: localStorage old single-photo format → OPFS multi-photo format
  migrateLegacyLS: async () => {
    if (!_opfsReady) return 0;
    let migrated = 0;
    try {
      // Old single-photo format: motu-photo-{figId}  (no trailing -digit)
      const keys = Object.keys(localStorage).filter(k =>
        k.startsWith('motu-photo-') && !/-\d+$/.test(k)
      );
      for (const k of keys) {
        const id = k.slice('motu-photo-'.length);
        const dataUrl = localStorage.getItem(k);
        if (!dataUrl) continue;
        try {
          const res = await fetch(dataUrl);
          const blob = await res.blob();
          const fh = await _opfsDir.getFileHandle(`photo-${id}-0.jpg`, {create: true});
          const writable = await fh.createWritable();
          await writable.write(blob);
          await writable.close();
          photoURLs[id + '-0'] = URL.createObjectURL(blob);
          localStorage.removeItem(k);
          migrated++;
        } catch(e) { console.error('LS migration failed for ' + id, e); }
      }
    } catch {}
    return migrated;
  },

  // Export all photos for a figure as [{label, dataUrl}, ...] (for JSON backup)
  exportAllAsDataURLs: async id => {
    const arr = S.customPhotos[id] || [];
    const result = [];
    for (const {n, label} of arr) {
      const key = id + '-' + n;
      const url = photoURLs[key];
      if (!url) continue;
      try {
        let dataUrl;
        if (url.startsWith('data:')) dataUrl = url;
        else {
          // Object URL — need to fetch blob and read as data URL
          const res = await fetch(url);
          const blob = await res.blob();
          dataUrl = await new Promise((r, rj) => {
            const fr = new FileReader();
            fr.onload = () => r(fr.result);
            fr.onerror = rj;
            fr.readAsDataURL(blob);
          });
        }
        result.push({label: label || '', dataUrl});
      } catch {}
    }
    return result;
  },

  // Get all photos for a figure as raw blobs (for ZIP packaging).
  // Returns [{n, label, blob}, ...]
  getAllAsBlobs: async id => {
    const arr = S.customPhotos[id] || [];
    const result = [];
    for (const {n, label} of arr) {
      const key = id + '-' + n;
      const url = photoURLs[key];
      if (!url) continue;
      try {
        const res = await fetch(url);
        const blob = await res.blob();
        result.push({n, label: label || '', blob});
      } catch {}
    }
    return result;
  },

  // Import photos for a figure from backup
  importPhotos: async (id, photos) => {
    let count = 0;
    for (const p of photos) {
      try {
        const res = await fetch(p.dataUrl);
        const blob = await res.blob();
        const n = await photoStore.add(id, blob, p.label || '');
        if (n >= 0) count++;
      } catch {}
    }
    return count;
  },
};

// Web Audio API playback — avoids the crackle that HTMLAudioElement produces
// on Android when audio focus transitions or the buffer starts before the
// download completes. We pre-decode each file into an AudioBuffer on first
// use, then play from the in-memory buffer (zero network latency on repeat).
// A 5ms gain ramp at start/end prevents DAC pop on abrupt onset/offset.
let _actx = null;
const _audioBuffers = {};   // url → decoded AudioBuffer
const _audioPending = {};   // url → Promise (dedupes concurrent fetches)

function getAudioContext() {
  // On mobile, an AudioContext can reach 'closed' state after a long period
  // of inactivity or OS audio-focus transitions. A closed context can't be
  // resumed or used — recreate it and drop stale decoded buffers (which
  // were bound to the old context and won't play from the new one).
  if (_actx && _actx.state === 'closed') {
    _actx = null;
    for (const k in _audioBuffers) delete _audioBuffers[k];
  }
  if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
  // Mobile browsers suspend the context until a user gesture — resume here.
  // We're always called from a tap/click so this is safe.
  if (_actx.state === 'suspended') _actx.resume().catch(() => {});
  return _actx;
}

async function loadAudioBuffer(url) {
  if (_audioBuffers[url]) return _audioBuffers[url];
  if (_audioPending[url]) return _audioPending[url];
  _audioPending[url] = fetch(url)
    .then(r => r.arrayBuffer())
    .then(ab => getAudioContext().decodeAudioData(ab))
    .then(buf => { _audioBuffers[url] = buf; delete _audioPending[url]; return buf; })
    .catch(() => { delete _audioPending[url]; return null; });
  return _audioPending[url];
}

// Preload a buffer without playing it (call during init / theme switch).
function preloadSound(url) { if (url) loadAudioBuffer(url).catch(() => {}); }

// Preload an image so it's in the browser cache when an egg fires.
function preloadImage(url) {
  if (!url) return;
  const img = new Image();
  img.src = url;
}

function playSound(url, volume = 0.9) {
  if (!url) return;
  const ctx = getAudioContext();
  loadAudioBuffer(url).then(buf => {
    if (!buf) return;
    const source = ctx.createBufferSource();
    source.buffer = buf;
    // Gain node for smooth ramp — eliminates onset/offset click
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(volume, ctx.currentTime + 0.005); // 5ms attack
    gain.gain.setValueAtTime(volume, ctx.currentTime + buf.duration - 0.04);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + buf.duration); // 40ms release
    source.connect(gain);
    gain.connect(ctx.destination);
    source.start(ctx.currentTime);
  }).catch(() => {});
}

  return (THEMES[S.theme]?.sounds || [null]).map(s => s ? IMG + s : null);

// § DATA-FETCH ── parseCSV, fetchFigs, newFigIds detection ─────────
function parseCSV(text) {
  if (text.length > 10000000) throw new Error('File too large');
  const lines = text.split('\n').filter(l => l.trim());
  const parseRow = line => {
    const cols = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += c;
    }
    cols.push(cur); return cols;
  };
  const headers = parseRow(lines[0]).map(h => h.trim());
  const idx = h => headers.indexOf(h);
  const [iGenre,iSeries,iGroup,iName,iWave,iPaid,iCond,iNote,iWhere,iVariation] =
    ['Genre','Series','Group','Name','Wave','Purchase Price','Condition','Note','Where Purchased','Variation Name'].map(idx);
  return lines.slice(1).map(l => {
    const c = parseRow(l);
    const csvGroup = c[iGroup]?.trim() || '';
    return { genre:c[iGenre], series:c[iSeries], name:c[iName]?.trim(),
      group:GROUP_MAP[csvGroup]||csvGroup, wave:c[iWave]?.trim()||'', paid:c[iPaid]?.trim(),
      cond:COND_MAP[c[iCond]?.trim()]||'', note:c[iNote]?.trim(), where:c[iWhere]?.trim(),
      variation:c[iVariation]?.trim()||'' };
  }).filter(r => r.genre === 'Masters of the Universe' && SERIES_MAP[r.series]);
}

// ─── Data Fetching ────────────────────────────────────────────────
// Concurrency guard: if a fetch is already in flight, return its promise
// instead of starting a second one. Prevents the 1s init() timer and a
// manual sync tap from racing each other on S.figs = [...].
let _fetchInFlight = null;
async function fetchFigs(manual = false, firstLoad = false) {
  if (_fetchInFlight) return _fetchInFlight;
  _fetchInFlight = (async () => {
    S.syncStatus = 'syncing'; render();
    S.fetchError = false;
    try {
      // Fetch main figures.json and kids-core.json in parallel
      const [res, kcRes] = await Promise.all([
        fetch(FIGS_URL + '?t=' + Date.now()),
        fetch(KIDS_CORE_URL + '?t=' + Date.now()).catch(() => null),
      ]);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const remote = await res.json();
      if (!Array.isArray(remote) || remote.length < 100) throw new Error('Invalid data');

      // Kids Core figures from repo (optional — 404 is fine if file doesn't exist yet)
      let kcRemote = [];
      if (kcRes && kcRes.ok) {
        try { kcRemote = await kcRes.json(); } catch {}
      }
      // Merge: remote kids-core figures get source:'kids-core' and image from slug
      const kcHydrated = (Array.isArray(kcRemote) ? kcRemote : []).map(f => ({
        ...f,
        line: 'kids-core',
        source: 'kids-core',
        image: f.slug ? `${IMG}/${f.slug}.jpg` : (f.image || ''),
      }));

      // Detect newly added figures
      const prevIds = new Set(S.figs.map(f => f.id));
      const custom = S.figs.filter(f => f.line === 'custom');
      // Local Kids Core figures (added via admin UI) — kept across syncs
      const localKC = store.get(KIDS_CORE_KEY) || [];
      const remoteIds = new Set([...remote, ...kcHydrated].map(f => f.id));
      const localKCFigs = localKC.map(f => ({
        ...f, line: 'kids-core', source: 'kids-core-local',
        image: f.slug ? `${IMG}/${f.slug}.jpg` : (f.image || ''),
      })).filter(f => !remoteIds.has(f.id)); // dedupe against repo

      const hydrated = remote.map(f => ({...f, image: f.slug ? `${IMG}/${f.slug}.jpg` : ''}));
      // Only flag as new if we had a previous catalog loaded (not first boot)
      if (prevIds.size > 100) {
        [...hydrated, ...kcHydrated].forEach(f => { if (!prevIds.has(f.id)) S.newFigIds.add(f.id); });
      }
      const kcIds = new Set([...kcHydrated, ...localKCFigs].map(f => f.id));
      S.figs = [
        ...hydrated,
        ...kcHydrated,
        ...localKCFigs,
        ...custom.filter(f => !remoteIds.has(f.id) && !kcIds.has(f.id)),
      ];
      rebuildFigIndex();
      S.syncTs = Date.now();
      store.set(CACHE_KEY, { rows: S.figs, ts: S.syncTs });
      S.syncStatus = 'ok';
      if (firstLoad) { S.loaded = true; }
      const newCount = S.newFigIds.size;
      if (manual || newCount) toast(`✓ Synced ${S.figs.length} figures${newCount ? ` · ${newCount} new` : ''}`);
      render();
      setTimeout(() => { S.syncStatus = 'idle'; render(); }, 3000);
    } catch(e) {
      console.error('Fetch failed:', e);
      S.syncStatus = manual ? 'err' : 'idle';
      if (manual) {
        // Detect offline vs other error
        const isNetwork = !navigator.onLine || /network|failed to fetch/i.test(e.message);
        if (isNetwork) {
          S.isOffline = !navigator.onLine;
          toast('✗ No connection — using cached data');
        } else {
          toast('✗ Sync failed');
        }
        setTimeout(() => { S.syncStatus = 'idle'; render(); }, 5000);
      }
      if (firstLoad) { S.fetchError = true; render(); }
      else render();
    } finally {
      _fetchInFlight = null;
    }
  })();
  return _fetchInFlight;
}

// § INIT ── init(), OPFS setup, cache load, splash removal ─────────
async function init() {
  // Splash-first: let the browser commit the splash animation's first frames
  // before we kick off heavy work (OPFS init, localStorage parsing, render,
  // figures.json fetch). Two rAFs ≈ 16-33ms — invisible to the user but
  // enough time for the CSS animation to be running on the compositor
  // thread before we start competing for the main thread.
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  // Load collection
  const c = store.get('motu-c2');
  if (c) {
    let loaded = Object.fromEntries(Object.entries(c).map(([id, entry]) => {
      if (entry?.variants !== undefined && !/\w/.test(entry.variants)) {
        const { variants, ...rest } = entry;
        return [id, rest];
      }
      return [id, entry];
    }));
    // v4.42 schema migration: flat fields → copies array. Idempotent.
    loaded = migrateColl(loaded);
    S.coll = loaded;
    saveColl();  // Persist migrated form so future loads skip the work
  }
  // Load persisted recent changes
  const rc = store.get('motu-recent');
  if (rc && Array.isArray(rc)) S._recentChanges = rc;
  const dp = store.get('motu-default-photo');
  if (dp && typeof dp === 'object') S.defaultPhoto = dp;
  // Load any field overrides — applied automatically inside rebuildFigIndex
  loadOverrides();
  // Initialize OPFS for photo storage
  await initOPFS();
  // One-time migrations (must run BEFORE loadAll so URL cache is correct)
  if (_opfsReady) {
    const m1 = await photoStore.migrateLegacyLS();     // Old LS single → OPFS
    const m2 = await photoStore.migrateToMulti();      // OPFS single → OPFS multi (photo-{id}.jpg → photo-{id}-0.jpg)
    if (m1 + m2 > 0) console.log(`Photo migrations: ${m1} from localStorage, ${m2} to multi-photo format`);
  }
  // Load all photos into URL cache (OPFS + localStorage fallback)
  await photoStore.loadAll();
  // Load cached figs
  const cached = store.get(CACHE_KEY);
  if (cached?.rows?.length) {
    S.figs = cached.rows.map(f => ({...f, image: f.image || (f.slug ? `${IMG}/${f.slug}.jpg` : '')}));
    rebuildFigIndex();
    S.syncTs = cached.ts;
    S.loaded = true;
  }
  // Apply theme
  document.documentElement.setAttribute('data-theme', S.theme);
  // Preload sounds so first play is buffer-ready, not mid-download
  Object.values(SND).forEach(preloadSound);
  const themeSounds = getThemeSounds().filter(Boolean);
  themeSounds.forEach(preloadSound);
  // Preload easter egg images so they fire without load delay
  preloadImage(IMG + '/adam-icon.png');
  preloadImage(IMG + '/eternia2-icon.png');
  // One-time migration: wave default → year default (v3.9)
  if (S.sortBy === 'wave') { S.sortBy = 'year'; store.set('motu-sort', 'year'); }
  // Render the UI behind the splash so it's ready by the time splash fades.
  render();
  // Defer the figures.json network request until the splash is well past its
  // entry phase (~1s in). Cached data already populated the view above, so
  // the user isn't waiting on this. Purely a politeness delay to keep the
  // network off the critical path during splash.
  const hasCache = !!(cached?.rows?.length);
  const needsFetch = !cached?.ts || Date.now() - cached.ts > CACHE_TTL;
  if (needsFetch) {
    setTimeout(() => fetchFigs(false, !hasCache), 1000);
  }
  // Remove splash when the CSS animation finishes. animationend keeps it
  // tight — no hard timer, no drift. Safety timeout covers the 2.8s animation
  // in case the image failed silently.
  const splash = document.getElementById('splash');
  if (splash) {
    let _splashTimer;
    const kill = () => { clearTimeout(_splashTimer); splash.remove(); };
    const img = splash.querySelector('.splash-logo');
    if (img) img.addEventListener('animationend', kill, {once: true});
    _splashTimer = setTimeout(kill, 3000);
    splash.addEventListener('click', kill, {once: true});
  }
  // Check for incoming share link in URL fragment
  checkShareLink();
  // v5.00: PWA shortcut deep-links via ?action=...
  checkShortcutAction();
}

// § TOAST-HAPTIC ── toast, toastUndo, undoStatus, haptic, showUpdateBanner, triggerPulse ──
function getToastContainer() {
  let c = document.getElementById('toastContainer');
  if (!c) { c = document.createElement('div'); c.id = 'toastContainer'; c.className = 'toast-container'; document.body.appendChild(c); }
  return c;
}
function toast(msg) {
  const container = getToastContainer();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 4000);
}

function haptic(ms = 15) {
  if (navigator.vibrate) navigator.vibrate(ms);
}

// In-app confirmation dialog — replaces blocking confirm()/alert() calls.
// Returns a Promise<boolean> so callers can await it.
// danger:true styles the confirm button red for destructive actions.
function appConfirm(message, {danger = false, ok = 'Confirm', cancel = 'Cancel'} = {}) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;padding-bottom:calc(16px + var(--safe-bottom,0px))';
    overlay.innerHTML = `
      <div style="width:100%;max-width:480px;background:var(--bg2);border-radius:20px 20px 16px 16px;padding:22px 20px 12px;box-shadow:0 -4px 32px rgba(0,0,0,.4)">
        <div style="font-size:15px;color:var(--t1);line-height:1.5;margin-bottom:18px;text-align:center">${esc(message)}</div>
        <div style="display:flex;gap:10px">
          <button id="appConfirmCancel" style="flex:1;padding:14px;border-radius:12px;border:1px solid var(--bd);background:var(--bg3);color:var(--t2);font-size:15px;font-weight:600">${esc(cancel)}</button>
          <button id="appConfirmOk" style="flex:1;padding:14px;border-radius:12px;border:none;background:${danger?'var(--rd)':'var(--acc)'};color:#fff;font-size:15px;font-weight:700">${esc(ok)}</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    // Disable buttons after one tap to prevent double-fire on rapid taps
    const finish = result => {
      overlay.querySelector('#appConfirmOk').disabled = true;
      overlay.querySelector('#appConfirmCancel').disabled = true;
      overlay.remove();
      resolve(result);
    };
    overlay.querySelector('#appConfirmOk').addEventListener('click', () => finish(true));
    overlay.querySelector('#appConfirmCancel').addEventListener('click', () => finish(false));
    overlay.addEventListener('click', e => { if (e.target === overlay) finish(false); });
  });
}

// ─── Status Pulse Animation ──────────────────────────────────────
function triggerPulse(id, status) {
  requestAnimationFrame(() => {
    const badge = document.querySelector(`.fig-card[data-fig-id="${id}"] .status-badge`) ||
                  document.querySelector(`.fig-row[data-fig-id="${id}"] .quick-own`);
    if (!badge) return;
    const color = status ? STATUS_HEX[status] : 'rgba(255,255,255,.3)';
    badge.style.setProperty('--pulse-color', color + '66');
    badge.classList.remove('pulsing');
    void badge.offsetWidth; // force reflow
    badge.classList.add('pulsing');
    badge.addEventListener('animationend', () => badge.classList.remove('pulsing'), {once: true});
  });
}

// ─── Undo Toast ──────────────────────────────────────────────────
function toastUndo(msg, figId, prevColl) {
  const container = getToastContainer();
  const el = document.createElement('div');
  el.className = 'toast has-undo';
  const msgSpan = document.createElement('span');
  msgSpan.className = 'toast-msg';
  msgSpan.textContent = msg;
  const btn = document.createElement('button');
  btn.className = 'toast-undo';
  btn.textContent = 'Undo';
  btn.onclick = () => undoStatus(figId);
  el.appendChild(msgSpan);
  el.appendChild(btn);
  el._undoPrev = prevColl;
  el.dataset.figId = figId;
  container.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 5500);
}

window.undoStatus = id => {
  const container = document.getElementById('toastContainer');
  if (!container) return;
  // Multiple toasts may exist for the same figure (rapid cycling).
  // We want the most recent one — querySelectorAll + last element.
  const allToasts = container.querySelectorAll(`[data-fig-id="${id}"]`);
  const toastEl = allToasts[allToasts.length - 1];
  if (!toastEl || !toastEl._undoPrev) return;
  const prev = toastEl._undoPrev;
  if (prev.status) S.coll[id] = prev;
  else { delete S.coll[id]; }
  saveColl();
  // Remove all toasts for this figure so stale undos can't fire
  allToasts.forEach(el => el.remove());
  toast('↩ Undone');
  if (!patchFigRow(id)) render();
};
