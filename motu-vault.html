<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06060c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>MOTU Collector</title>
<!-- Preload the splash logo in parallel with HTML parse -->
<link rel="preload" as="image" href="masters_logo.png">
<!-- Paint black immediately + define splash styles inline so they apply at
     first paint (independent of external stylesheet loading). -->
<style>
html,body{background:#000;margin:0}
.splash{position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;contain:strict}
/* Logo: rise from below starting huge, settle at 1/3 from top, hold, recede. 2.8s total. */
.splash-logo{
  width:280px;max-width:70vw;
  transform:translate3d(0,120vh,0) scale(2.4);
  opacity:0;
  will-change:transform,opacity;
  backface-visibility:hidden;
  filter:drop-shadow(0 0 40px rgba(255,204,51,.5));
  animation:splashLogo 2.8s cubic-bezier(.33,.1,.33,1) forwards;
}
@keyframes splashLogo{
  0%   {transform:translate3d(0,120vh,0) scale(2.4); opacity:0}
  10%  {opacity:1}
  25%  {transform:translate3d(0,-17vh,0) scale(1);   opacity:1}
  75%  {transform:translate3d(0,-17vh,0) scale(1);   opacity:1}
  100% {transform:translate3d(0,-140vh,0) scale(.08); opacity:0}
}
/* Single flash during hold phase */
.splash-flash{
  position:absolute;inset:0;background:#fff;opacity:0;
  pointer-events:none;will-change:opacity;mix-blend-mode:screen;
  animation:splashFlash .28s ease-out 1.35s forwards;
}
@keyframes splashFlash{
  0%  {opacity:0}
  25% {opacity:.7}
  100%{opacity:0}
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<!-- Load fonts CSS without blocking first paint; applies when ready. -->
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@400;500;600;700&display=swap"></noscript>
<style>
/* ═══════════════════════════════════════════════════════════════════
   MOTU VAULT — Pure CSS, Zero Dependencies
   ═══════════════════════════════════════════════════════════════════ */

/* ── Theme Variables ─────────────────────────────────────────────── */
:root {
  --bg:  #090e1c;
  --bg2: #12192b;
  --bg3: #1a253d;
  --bd:  #2a3b5c;
  --acc: #38bdf8;
  --gold:#e8c577;
  --t1:  #eae6f2;
  --t2:  #9a92b0;
  --t3:  #5e5678;
  --gn:  #5dd47b;
  --rd:  #e84855;
  --bl:  #60a5fa;
  --or:  #fb923c;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --radius: 14px;
  --radius-sm: 10px;
}

[data-theme="skeletor"] {
  --bg: #090212; --bg2: #16062b; --bg3: #220b40; --bd: #361850;
  --acc: #b14eff; --gold: #f2e162; --rd: #d63a76;
  --t1: #ede9f8; --t2: #9c87cc; --t3: #5e4a8a;
}
[data-theme="heman"] {
  --bg: #140803; --bg2: #241107; --bg3: #351c0e; --bd: #4a2916;
  --acc: #cbd5e1; --gold: #ff8a1f; --rd: #c43d2a;
  --t1: #fef3c7; --t2: #b45309; --t3: #78450f;
}
[data-theme="grayskull"] {
  --bg: #030d06; --bg2: #091a0f; --bg3: #102919; --bd: #1f3829;
  --acc: #a3e635; --gold: #b8e070; --gn: #4ade80;
  --t1: #e8f5e9; --t2: #6b9e70; --t3: #3d5e40;
}
[data-theme="snake"] {
  --bg: #120303; --bg2: #200608; --bg3: #300c10; --bd: #4a141a;
  --acc: #fde047; --gold: #d8c089; --rd: #d6293a; --gn: #4fb83a;
  --t1: #f5e8e8; --t2: #a07070; --t3: #6a3a3a;
}

/* ── Reset & Base ────────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body, #app {
  height: 100%; width: 100%;
  overflow: hidden;
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--t1);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; }

input, select, textarea {
  outline: none;
  font-family: 'Outfit', sans-serif;
  background: var(--bg3);
  border: 1px solid var(--bd);
  border-radius: var(--radius-sm);
  color: var(--t1);
  font-size: 14px;
  padding: 12px;
  width: 100%;
  transition: border-color 0.2s;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--acc);
}
input::placeholder, textarea::placeholder { color: var(--t3); }

button {
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
  transition: all 0.15s ease;
}
button:active { opacity: 0.7; transform: scale(0.97); }

/* ── Typography ──────────────────────────────────────────────────── */
.font-display { font-family: 'Cinzel', serif; font-weight: 700; }
.text-gold { color: var(--gold); }
.text-muted { color: var(--t2); }
.text-dim { color: var(--t3); }
.text-xs { font-size: 10px; }
.text-sm { font-size: 12px; }
.text-md { font-size: 14px; }
.text-upper { text-transform: uppercase; letter-spacing: 1.5px; }

/* ── Layout Shell ────────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  position: relative;
}

.top-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--bd);
  padding-top: max(12px, var(--safe-top));
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  transform: translateY(0);
  transition: transform 0.18s ease-out, opacity 0.15s ease-out;
}
.top-bar.immersive-hide {
  transform: translateY(-100%);
  opacity: 0;
  pointer-events: none;
}

.content-area {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.bottom-nav {
  background: var(--bg2);
  border-top: 1px solid var(--bd);
  padding-bottom: max(6px, var(--safe-bottom));
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  transform: translateY(0);
  transition: transform 0.18s ease-out, opacity 0.15s ease-out;
}
.bottom-nav.immersive-hide,
.bottom-nav.hidden {
  transform: translateY(100%);
  opacity: 0;
  pointer-events: none;
}

.bottom-nav button {
  padding: 7px 0 5px;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 5px;
  font-size: 12px;
  color: var(--t3);
  font-weight: 400;
  transition: color 0.15s;
}
.bottom-nav button.active { color: var(--acc); font-weight: 600; }
.bottom-nav button.active svg { stroke-width: 2.5; }
.bottom-nav .badge {
  font-size: 9px;
  background: var(--bd);
  color: var(--t3);
  border-radius: 8px;
  padding: 1px 5px;
  margin-left: 0px;
}
.bottom-nav button.active .badge { background: var(--acc); color: var(--bg); }

/* ── Header ──────────────────────────────────────────────────────── */
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px 12px;
}

.logo-group {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  object-fit: cover;
}
.logo-title {
  font-size: 16px;
  letter-spacing: 0.5px;
}
.logo-subtitle {
  font-size: 9px;
  letter-spacing: 2px;
}

.header-actions {
  display: flex;
  gap: 4px;
}

.icon-btn {
  width: 38px; height: 38px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--bd);
  background: var(--bg3);
  color: var(--t2);
  display: flex;
  align-items: center;
  justify-content: center;
}
.icon-btn:hover { border-color: var(--acc); color: var(--acc); }
.icon-btn.syncing { animation: spin 1s linear infinite; }
.icon-btn.sync-ok { border-color: var(--gn); color: var(--gn); }
.icon-btn.sync-err { border-color: var(--rd); color: var(--rd); }

@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* ── Search Bar ──────────────────────────────────────────────────── */
.search-bar-wrap {
  overflow: hidden;
  transition: max-height 0.25s ease, opacity 0.2s ease;
  max-height: 80px;
  opacity: 1;
}
.search-bar-wrap.hidden {
  max-height: 0;
  opacity: 0;
  pointer-events: none;
}
.search-row {
  padding: 0 16px 12px;
  display: flex;
  gap: 8px;
  align-items: center;
}

.search-wrap {
  flex: 1;
  position: relative;
}
.search-wrap .search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--t3); pointer-events: none;
}
.search-wrap input {
  padding: 11px 36px 11px 38px;
  border-radius: 12px;
  font-size: 15px;
}
.search-clear {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--t3);
  padding: 4px;
}

.filter-btn, .sort-btn {
  padding: 11px 14px;
  border-radius: 12px;
  border: 1px solid var(--bd);
  background: var(--bg3);
  color: var(--t2);
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
}
.filter-btn.active { border-color: var(--acc); background: color-mix(in srgb, var(--acc) 12%, transparent); color: var(--acc); }
.filter-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--acc);
  display: inline-block;
}

.sort-label { font-size: 11px; color: var(--t3); }

/* ── Breadcrumb ──────────────────────────────────────────────────── */
.breadcrumb {
  padding: 0 16px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 13px;
}
.breadcrumb button {
  color: var(--t2);
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  font-family: 'Cinzel', serif;
  font-weight: 700;
  padding: 2px 0;
}
.breadcrumb .sep { color: var(--t3); }
.breadcrumb .current {
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 14px;
}
.breadcrumb .crumb-link {
  font-family: 'Cinzel', serif;
  font-weight: 700;
}

/* ── Stats Bar ───────────────────────────────────────────────────── */
.stats-bar {
  padding: 12px 16px 4px;
}
.stats-segments {
  height: 8px; border-radius: 4px;
  background: var(--bg3);
  display: flex; overflow: hidden;
  margin-bottom: 8px;
  border: 1px solid var(--bd);
}
.stats-segments .seg {
  height: 100%;
  transition: width 0.4s ease;
}
.stats-segments .seg.owned { background: var(--gn); }
.stats-segments .seg.wishlist { background: var(--bl); }
.stats-segments .seg.ordered { background: var(--or); }
.stats-segments .seg.for-sale { background: var(--rd); }
.stats-legend {
  display: flex; gap: 12px; flex-wrap: wrap;
  font-size: 11px; color: var(--t2);
}
.stats-legend .stat-item {
  display: flex; align-items: center; gap: 4px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 6px;
  transition: background 0.15s;
}
.stats-legend .stat-item:active {
  background: color-mix(in srgb, var(--acc) 15%, transparent);
}
.stats-legend .stat-dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.stats-legend .stat-dot.owned { background: var(--gn); }
.stats-legend .stat-dot.wishlist { background: var(--bl); }
.stats-legend .stat-dot.ordered { background: var(--or); }
.stats-legend .stat-dot.for-sale { background: var(--rd); }
.stats-legend .stat-dot.unowned { background: var(--bd); }
.stats-legend .stat-val { font-weight: 600; }

/* ── Lines Grid ──────────────────────────────────────────────────── */
.lines-grid {
  padding: 14px 16px 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.line-card {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  border: 1px solid var(--bd);
  aspect-ratio: 3/4;
  cursor: pointer;
  transition: transform 0.2s;
}
.line-card:hover { transform: scale(1.02); }
.line-card img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: top;
}
.line-card .overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,.1) 0%, rgba(0,0,0,.3) 40%, rgba(0,0,0,.85) 100%);
}
.line-card .card-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 12px 12px 14px;
}
.line-card .card-name {
  font-size: 13px; line-height: 1.2;
  color: #fff; margin-bottom: 2px;
  text-shadow: 0 1px 4px rgba(0,0,0,.8);
}
.line-card .card-year { font-size: 10px; color: rgba(255,255,255,.6); margin-bottom: 6px; }
.line-card .progress-bar {
  height: 2px; background: rgba(255,255,255,.2);
  border-radius: 2px; overflow: hidden; margin-bottom: 4px;
}
.line-card .progress-fill {
  height: 100%; border-radius: 2px;
  background: var(--gold);
  transition: width 0.4s;
}
.line-card .progress-fill.complete { background: var(--gn); }
.line-card .card-stats { font-size: 10px; color: rgba(255,255,255,.7); font-weight: 600; }
.line-card .card-stats.complete { color: var(--gn); }

.reorder-toggle {
  display: flex;
  justify-content: flex-end;
  padding: 0 16px 8px;
  position: sticky;
  top: 0;
  z-index: 5;
  background: var(--bg);
  padding-top: 8px;
}
.reorder-toggle button {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 8px;
  border: 1px solid var(--bd);
  color: var(--t3); font-size: 11px;
  transition: all 0.15s;
}
.reorder-toggle button.active {
  border-color: var(--acc);
  background: color-mix(in srgb, var(--acc) 12%, transparent);
  color: var(--acc);
}

/* ── Reorder List ────────────────────────────────────────────────── */
.reorder-list {
  padding: 0 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.reorder-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: var(--radius);
}
.reorder-arrows {
  display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;
}
.reorder-arrows button {
  width: 28px; height: 28px;
  border-radius: 7px;
  border: 1px solid var(--bd);
  background: var(--bg3);
  color: var(--t1);
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}
.reorder-arrows button:disabled { color: color-mix(in srgb, var(--t3) 30%, transparent); cursor: default; }

/* ── Subline Cards ───────────────────────────────────────────────── */
.subline-list {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.subline-card {
  padding: 18px 20px;
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 16px;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.15s;
  width: 100%;
}
.subline-card:hover { border-color: var(--acc); }
.subline-card.all-card {
  background: var(--bg3);
  border-width: 2px;
}

.subline-ring { flex-shrink: 0; }
.subline-info { flex: 1; min-width: 0; }
.subline-name {
  font-family: 'Cinzel', serif;
  font-size: 15px; font-weight: 700;
  color: var(--t1); margin-bottom: 4px;
}
.subline-card.all-card .subline-name { color: var(--gold); }
.subline-stats { font-size: 12px; color: var(--t3); }
.subline-progress {
  height: 3px; background: var(--bd);
  border-radius: 2px; margin-top: 8px;
  overflow: hidden;
}
.subline-progress-fill {
  height: 100%; border-radius: 2px;
  background: var(--acc);
  transition: width 0.4s;
}
.subline-progress-fill.complete { background: var(--gn); }
.subline-arrow { flex-shrink: 0; color: var(--t3); }

/* ── Figure List ─────────────────────────────────────────────────── */
.fig-list { padding: 12px 12px 0; }
.fig-count { font-size: 11px; color: var(--t3); margin-bottom: 8px; padding-left: 4px; }

.fig-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 4px;
  border-bottom: 1px solid color-mix(in srgb, var(--bd) 15%, transparent);
  cursor: pointer;
  transition: background 0.1s;
}
.fig-row:hover { background: color-mix(in srgb, var(--bg3) 50%, transparent); }

.fig-thumb {
  width: 56px; height: 56px;
  border-radius: var(--radius-sm);
  background: var(--bg3);
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--bd);
}
.fig-thumb.owned { border-color: var(--gn); }
.fig-thumb.wishlist { border-color: var(--bl); }
.fig-thumb.ordered { border-color: var(--or); }
.fig-thumb.for-sale { border-color: var(--rd); }
.fig-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.fig-thumb .initial {
  font-family: 'Cinzel', serif;
  font-size: 20px; color: var(--t3); font-weight: 700;
}

.fig-text { flex: 1; min-width: 0; }
.fig-name {
  font-size: 14px; font-weight: 600;
  color: var(--t1); line-height: 1.3;
  margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.fig-meta {
  font-size: 11px; color: var(--t3);
  display: flex; gap: 6px; flex-wrap: wrap;
}
.fig-meta .line-name { color: var(--acc); font-weight: 600; }

.fig-actions { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.fig-var-badge { font-size: 9px; font-weight: 700; color: var(--gold); letter-spacing: 0.5px; }
.fig-status-dot { width: 10px; height: 10px; border-radius: 50%; }
.fig-status-dot.owned { background: var(--gn); }
.fig-status-dot.wishlist { background: var(--bl); }
.fig-status-dot.ordered { background: var(--or); }
.fig-status-dot.for-sale { background: var(--rd); }

.quick-own {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--bd);
  background: var(--bg3);
  color: var(--t3);
  display: flex; align-items: center; justify-content: center;
}

/* ── View Toggle ────────────────────────────────────────────────── */
.view-toggle {
  display: flex; gap: 4px;
}
.view-toggle button {
  width: 32px; height: 32px; border-radius: 8px;
  border: 1px solid var(--bd); background: var(--bg3);
  color: var(--t3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-family: 'Outfit', sans-serif;
}
.view-toggle button:active { opacity: 0.7; transform: scale(0.97); }
.view-toggle button.active {
  border-color: var(--acc);
  background: color-mix(in srgb, var(--acc) 12%, transparent);
  color: var(--acc);
}

/* ── Figure Grid ────────────────────────────────────────────────── */
.fig-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 0 12px;
}
.fig-card {
  position: relative; border-radius: var(--radius);
  overflow: hidden; border: 2px solid var(--bd);
  background: var(--bg3); aspect-ratio: 3/4;
  cursor: pointer; transition: transform 0.15s;
}
.fig-card:active { transform: scale(0.97); }
.fig-card.owned { border-color: var(--gn); }
.fig-card.wishlist { border-color: var(--bl); }
.fig-card.ordered { border-color: var(--or); }
.fig-card.for-sale { border-color: var(--rd); }

.fig-card img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: top;
}
.fig-card .card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,.85) 100%);
}
.fig-card .card-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 10px;
}
.fig-card .card-fig-name {
  font-size: 12px; font-weight: 600; color: #fff;
  line-height: 1.3; margin-bottom: 2px;
  text-shadow: 0 1px 4px rgba(0,0,0,.8);
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.fig-card .card-fig-meta {
  font-size: 9px; color: rgba(255,255,255,.6);
}
.fig-card .card-initial {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif; font-size: 36px;
  color: var(--t3); font-weight: 900;
}
.fig-card .status-badge {
  position: absolute; top: 8px; right: 8px;
  width: 26px; height: 26px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,.15);
  background: rgba(0,0,0,.5);
  z-index: 2;
}
.fig-card .status-badge.owned { background: rgba(52,211,153,.25); border-color: rgba(52,211,153,.4); }
.fig-card .status-badge.wishlist { background: rgba(96,165,250,.25); border-color: rgba(96,165,250,.4); }
.fig-card .status-badge.ordered { background: rgba(251,146,60,.25); border-color: rgba(251,146,60,.4); }
.fig-card .status-badge.for-sale { background: rgba(248,113,113,.25); border-color: rgba(248,113,113,.4); }
.fig-card .new-badge {
  position: absolute; top: 8px; left: 8px;
  font-size: 9px; font-weight: 700; color: var(--acc);
  letter-spacing: 0.5px; background: rgba(0,0,0,.6);
  padding: 2px 6px; border-radius: 4px;
  backdrop-filter: blur(4px);
}

/* ── Empty State ─────────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--t3);
}
.empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
.empty-state .title {
  font-family: 'Cinzel', serif;
  font-size: 16px; color: var(--t2); margin-bottom: 4px;
}

/* ── Figure Detail ───────────────────────────────────────────────── */
.detail-header {
  padding: 16px 16px 12px;
  padding-top: max(16px, var(--safe-top));
  background: var(--bg2);
  border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; gap: 12px;
}
.detail-title {
  flex: 1;
  font-family: 'Cinzel', serif;
  font-size: 15px; font-weight: 700;
  color: var(--t1); line-height: 1.3;
}
.detail-back, .detail-delete {
  padding: 8px; border-radius: 8px;
}
.detail-back { color: var(--t1); }
.detail-delete { color: var(--rd); }

.detail-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

.photo-section {
  position: relative;
  background: var(--bg3);
}
.photo-container {
  aspect-ratio: 1;
  max-height: 320px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.photo-container img { width: 100%; height: 100%; object-fit: contain; }
.photo-container .initial-large {
  font-family: 'Cinzel', serif;
  font-size: 72px; color: var(--t3); font-weight: 900;
}

/* Multi-photo carousel */
.photo-carousel {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  background: var(--bg3);
}
.photo-carousel::-webkit-scrollbar { display: none; }
.photo-slide {
  position: relative;
  flex: 0 0 100%;
  scroll-snap-align: start;
  aspect-ratio: 1;
  max-height: 360px;
  display: flex; align-items: center; justify-content: center;
  cursor: zoom-in;
}
.photo-slide img {
  width: 100%; height: 100%;
  object-fit: contain;
}
.photo-slide-label {
  position: absolute; bottom: 12px; left: 12px;
  background: rgba(0,0,0,.7); color: #fff;
  padding: 4px 10px; border-radius: 8px;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase;
  backdrop-filter: blur(4px);
}
.photo-slide-remove {
  position: absolute; top: 10px; right: 10px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(0,0,0,.6); color: var(--rd);
  border: 1px solid rgba(248,113,113,.4);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px); cursor: pointer;
}
.photo-slide-default {
  position: absolute; top: 10px; left: 10px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(0,0,0,.6); color: rgba(255,255,255,.4);
  border: 1px solid rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px); cursor: pointer;
  font-size: 16px; line-height: 1;
}
.photo-slide-default.active {
  color: var(--gold);
  border-color: color-mix(in srgb, var(--gold) 50%, transparent);
  text-shadow: 0 0 8px var(--gold);
}
.photo-dots {
  display: flex; justify-content: center; gap: 6px;
  padding: 10px 0 4px;
  background: var(--bg3);
}
.photo-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--bd);
  transition: all 0.2s;
}
.photo-dot.active { background: var(--gold); width: 18px; border-radius: 3px; }

.photo-controls {
  position: absolute; bottom: 10px; right: 10px;
  display: flex; gap: 8px;
  z-index: 5;
}
.photo-btn {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  background: rgba(0,0,0,.7);
  border: 1px solid rgba(255,255,255,.15);
  color: #fff; font-size: 12px;
  display: flex; align-items: center; gap: 6px;
  backdrop-filter: blur(4px); cursor: pointer;
}
.photo-btn.remove {
  border-color: rgba(248,113,113,.4);
  color: var(--rd);
}

.photo-labels {
  padding: 12px 16px;
  display: flex; flex-direction: column; gap: 6px;
}
.photo-label-row {
  display: flex; align-items: center; gap: 8px;
}
.photo-label-num {
  font-size: 11px; color: var(--t3); font-weight: 600;
  width: 24px; flex-shrink: 0;
}
.photo-label-row input {
  flex: 1; font-size: 13px;
  padding: 8px 12px;
}

/* Full-screen photo viewer */
.photo-viewer {
  position: fixed; inset: 0;
  z-index: 1000;
  background: rgba(0,0,0,.92);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: fadeIn 0.18s ease-out;
}
.photo-viewer-img-wrap {
  position: relative;
  max-width: 100%; max-height: 100%;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
.photo-viewer-img-wrap img {
  max-width: 100%; max-height: 90vh;
  object-fit: contain;
  border-radius: 8px;
}
.photo-viewer-close {
  position: absolute; top: max(16px, var(--safe-top));
  right: 16px;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,.1); color: #fff;
  border: 1px solid rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; backdrop-filter: blur(8px);
  z-index: 2;
}
.photo-viewer-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 48px; height: 48px; border-radius: 50%;
  background: rgba(255,255,255,.1); color: #fff;
  border: 1px solid rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; backdrop-filter: blur(8px);
}
.photo-viewer-nav.prev { left: 12px; }
.photo-viewer-nav.next { right: 12px; }
.photo-viewer-label {
  margin-top: 12px; padding: 6px 14px;
  background: rgba(255,255,255,.1); color: #fff;
  border-radius: 8px; font-size: 13px; font-weight: 600;
  letter-spacing: 0.5px;
  backdrop-filter: blur(8px);
}
.photo-viewer-counter {
  position: absolute; bottom: 16px; left: 50%;
  transform: translateX(-50%);
  font-size: 12px; color: rgba(255,255,255,.7);
  background: rgba(0,0,0,.4); padding: 4px 10px;
  border-radius: 12px; backdrop-filter: blur(4px);
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.detail-pills {
  padding: 16px;
  display: flex; flex-wrap: wrap; gap: 8px;
}
.pill {
  padding: 5px 12px;
  border-radius: 20px;
  background: var(--bg3);
  border: 1px solid var(--bd);
  font-size: 12px; color: var(--t2);
}

.detail-retail {
  padding: 0 16px 16px;
  font-size: 14px; color: var(--t2);
}
.detail-retail .price { color: var(--gold); font-weight: 600; }

.status-grid {
  padding: 0 16px 16px;
}
.status-grid .label {
  font-size: 11px; color: var(--t3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 10px;
}
.status-grid .grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.status-btn {
  padding: 14px 8px;
  border-radius: 12px;
  border: 2px solid var(--bd);
  background: var(--bg2);
  color: var(--t2);
  font-size: 14px; font-weight: 600;
  transition: all 0.15s;
}
.status-btn.active { background: color-mix(in srgb, var(--status-color) 12%, transparent); border-color: var(--status-color); color: var(--status-color); }

.detail-fields {
  padding: 0 16px 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.detail-fields .field-label {
  font-size: 12px; color: var(--t3); margin-bottom: 4px;
}
.detail-fields .field-hint {
  font-size: 10px; color: var(--t3); margin-top: 4px;
}

/* ── Multi-Copy Detail UI (v4.43) ────────────────────────────────── */
.copies-section {
  padding: 0 16px 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.copies-header {
  display: flex; align-items: center; gap: 8px;
  padding-bottom: 2px;
}
.copies-count {
  font-size: 10px;
  color: var(--gold);
  background: color-mix(in srgb, var(--gold) 15%, transparent);
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: 1px;
}
.copy-card {
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 12px;
  overflow: hidden;
}
.copy-card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  background: color-mix(in srgb, var(--acc) 6%, transparent);
  border-bottom: 1px solid var(--bd);
}
.copy-num {
  font-size: 12px;
  font-weight: 600;
  color: var(--t1);
  letter-spacing: .5px;
  text-transform: uppercase;
}
.copy-del-btn {
  background: none; border: none;
  color: var(--t3);
  padding: 4px 8px;
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  font-size: 12px;
  transition: background .15s, color .15s;
}
.copy-del-btn:active {
  background: color-mix(in srgb, var(--rd) 15%, transparent);
  color: var(--rd);
}
.copy-fields {
  padding: 12px 14px;
  gap: 10px;
}
.add-copy-btn {
  background: color-mix(in srgb, var(--acc) 8%, transparent);
  border: 1px dashed var(--bd);
  border-radius: 12px;
  padding: 14px;
  color: var(--acc);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .3px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background .15s, border-color .15s;
}
.add-copy-btn:active {
  background: color-mix(in srgb, var(--acc) 18%, transparent);
  border-color: var(--acc);
}
.add-copy-plus {
  font-size: 18px;
  font-weight: 700;
  line-height: 1;
}

/* Per-copy photos (v4.46) — strip of thumbs + add button inside the copy card */
.copy-photos-row {
  margin-top: 4px;
}
.copy-photos-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 6px;
}
.copy-photo-thumb {
  position: relative;
  width: 64px; height: 64px;
  border-radius: 8px;
  overflow: hidden;
  background: var(--bg3);
  cursor: pointer;
}
.copy-photo-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.copy-photo-unlink {
  position: absolute;
  top: 2px; right: 2px;
  width: 18px; height: 18px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,.65);
  color: #fff;
  font-size: 10px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.copy-photo-add {
  width: 64px; height: 64px;
  border-radius: 8px;
  border: 1px dashed var(--bd);
  background: color-mix(in srgb, var(--acc) 6%, transparent);
  color: var(--acc);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.copy-photo-add:active {
  background: color-mix(in srgb, var(--acc) 16%, transparent);
  border-color: var(--acc);
}

/* Small "×N" copy count badge for list/grid views */
.copy-count-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 18px;
  padding: 0 5px;
  background: color-mix(in srgb, var(--gold) 22%, var(--bg3));
  color: var(--gold);
  border-radius: 9px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .3px;
}
.copy-count-badge-card {
  position: absolute;
  bottom: 8px;
  right: 8px;
  z-index: 2;
  background: color-mix(in srgb, #000 60%, var(--gold) 40%);
  color: var(--gold);
  border: 1px solid color-mix(in srgb, var(--gold) 40%, transparent);
}

/* ── Bottom Sheet ────────────────────────────────────────────────── */
.sheet-overlay {
  position: absolute; inset: 0;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.sheet-overlay.visible { opacity: 1; pointer-events: auto; }
.sheet-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(4px);
}
.sheet-panel {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  border: 1px solid var(--bd);
  padding-bottom: max(20px, var(--safe-bottom));
  max-height: 85%;
  overflow: hidden;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
.sheet-overlay.visible .sheet-panel { transform: translateY(0); }

.sheet-handle {
  padding: 12px 20px 0;
  display: flex; justify-content: center;
}
.sheet-handle-bar {
  width: 36px; height: 4px;
  border-radius: 2px; background: var(--bd);
  margin-bottom: 12px;
}
.sheet-header {
  padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-shrink: 0;
}
.sheet-title {
  font-family: 'Cinzel', serif;
  font-size: 16px; font-weight: 700; color: var(--gold);
}
.sheet-close { color: var(--t3); padding: 4px; }
.sheet-body {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  flex: 1;
  padding: 0 20px 20px;
}

/* ── Filter/Sort Sheet Buttons ───────────────────────────────────── */
.chip-group {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
}
.chip {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--bd);
  background: var(--bg3);
  color: var(--t2);
  font-size: 13px;
}
.chip.active {
  border-color: var(--acc);
  background: color-mix(in srgb, var(--acc) 12%, transparent);
  color: var(--acc);
}

.sort-option {
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid var(--bd);
  background: var(--bg3);
  color: var(--t1);
  font-size: 15px;
  text-align: left;
  display: flex; align-items: center; justify-content: space-between;
  width: 100%;
  margin-bottom: 4px;
}
.sort-option.active {
  border-color: var(--acc);
  background: color-mix(in srgb, var(--acc) 12%, transparent);
  color: var(--acc);
}

/* ── Theme Picker ────────────────────────────────────────────────── */
.theme-option {
  padding: 16px;
  border-radius: var(--radius);
  border: 2px solid var(--bd);
  cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  text-align: left;
  width: 100%;
  margin-bottom: 10px;
  transition: all 0.15s;
}
.theme-option .swatch {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
}

/* ── Import Sheet ────────────────────────────────────────────────── */
.drop-zone {
  border: 2px dashed var(--bd);
  border-radius: 16px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
}
.drop-zone.dragover {
  border-color: var(--acc);
  background: color-mix(in srgb, var(--acc) 6%, transparent);
}
.overwrite-toggle {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  background: var(--bg3);
  border-radius: 12px;
  margin-bottom: 16px;
  cursor: pointer;
}
.checkbox {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: 2px solid var(--bd);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.checkbox.checked {
  border-color: var(--acc);
  background: var(--acc);
}
.checkbox span { display: none; }
.checkbox.checked span { display: flex; }

.clear-all-btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid var(--rd);
  background: color-mix(in srgb, var(--rd) 8%, transparent);
  color: var(--rd);
  font-size: 15px;
  font-weight: 600;
}

/* ── Loading Screen ──────────────────────────────────────────────── */
/* ── Splash Screen ───────────────────────────────────────────────── */
.loading-screen {
  height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg);
  padding: 32px;
}
.loading-name {
  font-size: 13px; letter-spacing: 3px;
  color: var(--t3);
  font-family: 'Cinzel', serif;
  margin-bottom: 32px;
}
.loading-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--bd);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
.loading-text { font-size: 12px; color: var(--t3); letter-spacing: 1px; }

.retry-btn {
  padding: 12px 32px;
  border-radius: 12px;
  border: 1px solid var(--rd);
  background: color-mix(in srgb, var(--rd) 8%, transparent);
  color: var(--rd);
  font-size: 14px; font-weight: 600;
}

/* ── Pull to Refresh ─────────────────────────────────────────────── */
.ptr-indicator {
  text-align: center; padding: 12px 0;
  font-size: 11px; color: var(--t3);
  letter-spacing: 1px;
  transition: opacity 0.2s;
}
.ptr-indicator .ptr-spinner {
  display: inline-block; width: 18px; height: 18px;
  border: 2px solid var(--bd); border-top-color: var(--gold);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  vertical-align: middle; margin-right: 6px;
}

/* ── Select Mode ─────────────────────────────────────────────────── */
.select-btn {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--t2);
  padding: 6px 10px; border-radius: 8px;
  border: 1px solid var(--bd); background: var(--bg3);
  cursor: pointer;
}
.select-btn.active {
  border-color: var(--acc);
  background: color-mix(in srgb, var(--acc) 12%, transparent);
  color: var(--acc);
}

.select-checkbox {
  width: 22px; height: 22px; border-radius: 6px;
  border: 2px solid var(--bd);
  background: rgba(0,0,0,.3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.select-checkbox.checked {
  background: var(--acc);
  border-color: var(--acc);
}
.select-checkbox svg { opacity: 0; transition: opacity 0.15s; color: #fff; }
.select-checkbox.checked svg { opacity: 1; }

.fig-row.selected {
  background: color-mix(in srgb, var(--acc) 10%, transparent);
}
.fig-card.selected {
  outline: 3px solid var(--acc);
  outline-offset: -3px;
}
.fig-card .select-checkbox-corner {
  position: absolute; top: 8px; left: 8px;
  z-index: 3;
}

.select-actionbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 20;
  background: var(--bg2);
  border-top: 1px solid var(--acc);
  padding: 8px 12px;
  padding-bottom: max(10px, var(--safe-bottom));
  display: flex; flex-direction: column; gap: 8px;
  box-shadow: 0 -6px 20px rgba(0,0,0,.4);
  transform: translateY(100%);
  transition: transform 0.22s cubic-bezier(0.2,0,0,1);
}
.select-actionbar.visible { transform: translateY(0); }
.select-actionbar .sa-row {
  display: flex; align-items: center; gap: 8px;
}
.select-actionbar .count {
  font-size: 14px; font-weight: 700; color: var(--gold);
  flex-shrink: 0; min-width: 20px; text-align: center;
}
.select-actionbar button {
  padding: 9px 14px; border-radius: 10px;
  border: 1px solid var(--bd); background: var(--bg3);
  color: var(--t1); font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.select-actionbar button:active { opacity: 0.7; transform: scale(0.97); }
.select-actionbar button:disabled { opacity: 0.3; pointer-events: none; }
.select-actionbar button.primary {
  background: var(--acc); color: #fff;
  border-color: var(--acc);
}
.select-actionbar button.danger {

  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.select-actionbar .sa-status-btn {
  padding: 8px 4px; border-radius: 9px;
  border: 1.5px solid var(--st-c);
  background: color-mix(in srgb, var(--st-c) 12%, var(--bg3));
  color: var(--st-c);
  font-size: 11px; font-weight: 700;
  cursor: pointer; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.select-actionbar .sa-status-btn:active { opacity: 0.7; transform: scale(0.97); }
.select-actionbar .sa-status-btn:disabled { opacity: 0.3; pointer-events: none; }

/* ── Offline Banner ──────────────────────────────────────────────── */
.offline-banner {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  background: var(--rd);
  color: #fff;
  padding: 6px 16px;
  padding-top: max(6px, var(--safe-top));
  font-size: 12px; font-weight: 600;
  text-align: center; letter-spacing: 0.5px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transform: translateY(-100%);
  transition: transform 0.25s ease-out;
  pointer-events: none;
}
.offline-banner.visible {
  transform: translateY(0);
}
.icon-btn.offline {
  opacity: 0.4;
  cursor: not-allowed;
}

/* ── Toast Notifications ─────────────────────────────────────────── */
.toast-container {
  position: fixed; bottom: 70px; left: 0; right: 0;
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; z-index: 300; pointer-events: none;
  padding-bottom: var(--safe-bottom);
}
.toast {
  background: var(--bg2); border: 1px solid var(--bd);
  border-radius: 12px; padding: 10px 18px;
  font-size: 13px; color: var(--t1); font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
  backdrop-filter: blur(8px);
  animation: toastIn 0.25s ease-out, toastOut 0.3s ease-in 1.7s forwards;
  pointer-events: auto;
}
@keyframes toastIn { from { opacity: 0; transform: translateY(16px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-8px); } }

/* ── Animations ──────────────────────────────────────────────────── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ── Spacers ─────────────────────────────────────────────────────── */
.bottom-spacer { height: calc(48px + var(--safe-bottom)); }
.detail-spacer { height: calc(32px + var(--safe-bottom)); }

/* ── Status Pulse Animation ──────────────────────────────────────── */
@keyframes statusPulse {
  0% { transform: scale(1); box-shadow: 0 0 0 0 var(--pulse-color, rgba(255,255,255,.4)); }
  40% { transform: scale(1.25); box-shadow: 0 0 0 8px transparent; }
  100% { transform: scale(1); box-shadow: 0 0 0 0 transparent; }
}
.status-badge.pulsing, .quick-own.pulsing {
  animation: statusPulse 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
}

/* ── Long-Press Context Menu ─────────────────────────────────────── */
.ctx-menu-overlay {
  position: fixed; inset: 0; z-index: 250;
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(4px);
  opacity: 0;
  animation: ctxFadeIn 0.15s ease-out forwards;
}
@keyframes ctxFadeIn { to { opacity: 1; } }
.ctx-menu {
  position: fixed; z-index: 251;
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 16px;
  min-width: 200px;
  max-width: 260px;
  box-shadow: 0 12px 40px rgba(0,0,0,.6);
  overflow: hidden;
  transform-origin: top center;
  animation: ctxSlideIn 0.18s cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes ctxSlideIn {
  from { opacity: 0; transform: scale(0.9) translateY(-4px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.ctx-menu-header {
  padding: 12px 16px 8px;
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--gold);
  border-bottom: 1px solid var(--bd);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ctx-copy-count {
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  font-weight: 700;
  background: color-mix(in srgb, var(--gold) 22%, transparent);
  color: var(--gold);
  padding: 2px 6px;
  border-radius: 8px;
  margin-left: 4px;
  vertical-align: middle;
  letter-spacing: .3px;
}
.ctx-menu-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px;
  font-size: 14px;
  color: var(--t1);
  border: none; background: none;
  width: 100%;
  text-align: left;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: background 0.1s;
}
.ctx-menu-item:active { background: color-mix(in srgb, var(--acc) 12%, transparent); }
.ctx-menu-item.active { color: var(--acc); font-weight: 600; }
.ctx-menu-item .ctx-dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0;
}
.ctx-menu-sep {
  height: 1px; background: var(--bd); margin: 0;
}

/* ── Completion Celebration ──────────────────────────────────────── */
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(120vh) rotate(720deg); opacity: 0; }
}
.confetti-container {
  position: fixed; inset: 0; z-index: 999;
  pointer-events: none; overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 8px; height: 8px;
  top: -10px;
  animation: confettiFall linear forwards;
}
@keyframes goldGlow {
  0% { box-shadow: 0 0 0 0 rgba(212,168,67,.6); }
  50% { box-shadow: 0 0 20px 4px rgba(212,168,67,.3); }
  100% { box-shadow: 0 0 0 0 rgba(212,168,67,0); }
}
.line-card.celebrating, .subline-card.celebrating {
  animation: goldGlow 1.2s ease-out;
}

/* ── Easter Egg Overlays ─────────────────────────────────────────── */

/* Shared overlay base */
.egg-overlay {
  position: fixed; inset: 0; z-index: 1000;
  pointer-events: none;
  overflow: hidden;
}

/* ── He-Man egg ── */
/* Full-screen conic rainbow that rotates and hue-cycles */
.egg-heman-bg {
  position: absolute; inset: 0;
  /* Oversized square so rotation never reveals corners */
  width: 200vmax; height: 200vmax;
  top: 50%; left: 50%;
  margin-left: -100vmax; margin-top: -100vmax;
  background: conic-gradient(
    hsl(0,100%,55%), hsl(45,100%,55%), hsl(90,100%,55%),
    hsl(135,100%,55%), hsl(180,100%,55%), hsl(225,100%,55%),
    hsl(270,100%,55%), hsl(315,100%,55%), hsl(360,100%,55%)
  );
  animation: hemanSpin 0.9s linear infinite, hemanHue 5s ease forwards;
  will-change: transform, opacity, filter;
}
@keyframes hemanSpin {
  to { transform: rotate(360deg); }
}
@keyframes hemanHue {
  0%   { opacity: 0;    filter: saturate(4) brightness(0.65) hue-rotate(0deg); }
  4%   { opacity: 0.92; }
  25%  {                filter: saturate(4) brightness(0.65) hue-rotate(80deg); }
  55%  {                filter: saturate(4) brightness(0.65) hue-rotate(200deg); }
  88%  { opacity: 0.92; filter: saturate(4) brightness(0.65) hue-rotate(340deg); }
  100% { opacity: 0;    filter: saturate(4) brightness(0.65) hue-rotate(400deg); }
}

/* He-Man icon — Flash-era cheese. Centered via top/left/translate trick.
   Phases: slam → hold → wobble × 2 → spin → hold → BLAST off. 5s total. */
.egg-heman-icon {
  position: absolute;
  width: 56px; height: 56px;
  border-radius: 10px;
  /* Start small at true center */
  top: 50%; left: 50%;
  transform-origin: center center;
  transform: translate(-50%, -50%) scale(1);
  will-change: transform, opacity;
  animation: hemanIcon 5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  filter: drop-shadow(0 0 20px rgba(255,220,50,1)) drop-shadow(0 0 40px rgba(255,100,0,0.8));
  z-index: 2;
  image-rendering: -webkit-optimize-contrast;
}
@keyframes hemanIcon {
  /* Slam in from bottom — Flash-era overshoot */
  0%   { transform: translate(-50%, 120vh) scale(0.8);  opacity: 0; }
  3%   { transform: translate(-50%, -50%)  scale(6.5);  opacity: 1; }
  /* Overshoot bounce */
  8%   { transform: translate(-50%, -50%)  scale(5.8);  opacity: 1; }
  /* Hold large center */
  12%  { transform: translate(-50%, -50%)  scale(6.2);  opacity: 1; }
  22%  { transform: translate(-50%, -50%)  scale(6.2);  opacity: 1; }
  /* Wobble pass 1 */
  27%  { transform: translate(-50%, -50%)  scale(6.8) rotate(-12deg); opacity: 1; }
  32%  { transform: translate(-50%, -50%)  scale(5.9) rotate(10deg);  opacity: 1; }
  37%  { transform: translate(-50%, -50%)  scale(6.4) rotate(-6deg);  opacity: 1; }
  42%  { transform: translate(-50%, -50%)  scale(6.2) rotate(0deg);   opacity: 1; }
  /* Spin 1 — clean 360° */
  54%  { transform: translate(-50%, -50%)  scale(6.2) rotate(360deg); opacity: 1; }
  /* Brief re-settle */
  58%  { transform: translate(-50%, -50%)  scale(6.5) rotate(360deg); opacity: 1; }
  /* Wobble pass 2 — more unhinged */
  63%  { transform: translate(-50%, -52%)  scale(7.0) rotate(348deg); opacity: 1; }
  68%  { transform: translate(-50%, -48%)  scale(5.8) rotate(374deg); opacity: 1; }
  72%  { transform: translate(-50%, -50%)  scale(6.3) rotate(360deg); opacity: 1; }
  /* Spin 2 — faster */
  84%  { transform: translate(-50%, -50%)  scale(6.3) rotate(720deg); opacity: 1; }
  /* Tiny hold before blast */
  88%  { transform: translate(-50%, -50%)  scale(6.5) rotate(720deg); opacity: 1; }
  /* BLAST: scale to massive + fade out upward */
  100% { transform: translate(-50%, -180%) scale(22)  rotate(720deg); opacity: 0; }
}

/* ── Eternia egg ── */
.egg-eternia-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 40%, #0a1628 0%, #020810 70%);
  animation: eterniaBgFade 4.2s ease forwards;
}
@keyframes eterniaBgFade {
  0%   { opacity: 0; }
  10%  { opacity: 1; }
  75%  { opacity: 1; }
  100% { opacity: 0; }
}
/* Stars fade out in sync with castle descent — gone before overlay removes */
.egg-star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: starTwinkle linear infinite, starFade 4.2s ease forwards;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.15; transform: scale(1); }
  50%       { opacity: 0.9;  transform: scale(1.5); }
}
@keyframes starFade {
  0%   { opacity: 0; }
  8%   { opacity: 1; }
  68%  { opacity: 1; }
  88%  { opacity: 0; }
  100% { opacity: 0; }
}
/* Castle image — rises, holds, sinks */
.egg-castle-wrap {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  display: flex; justify-content: center;
  animation: castleRise 4.2s cubic-bezier(0.4,0,0.2,1) forwards;
}
@keyframes castleRise {
  0%   { transform: translateY(100%); opacity: 0; }
  18%  { transform: translateY(0%);   opacity: 1; }
  72%  { transform: translateY(0%);   opacity: 1; }
  100% { transform: translateY(100%); opacity: 0; }
}
.egg-castle-img {
  width: min(320px, 88vw);
  height: auto;
  filter: brightness(0) invert(0) sepia(1) saturate(0) hue-rotate(0deg)
          drop-shadow(0 -10px 32px rgba(42,217,176,0.3));
  /* Pure dark silhouette */
  opacity: 0.85;
}

}

// ─── Photo Storage (OPFS, multi-photo with labels) ──────────────
// Per figure: up to MAX_PHOTOS photos, each with optional label.
// OPFS filename: photo-{figId}-{n}.jpg  (n = 0..MAX_PHOTOS-1)
// Labels stored separately in localStorage: { [figId]: { [n]: label } }
// Per-copy photo assignment (v4.46+): { [figId]: { [n]: copyId } }
// A photo with no entry here is "shared" — visible from any copy view.
const MAX_PHOTOS = 8;
const PHOTO_LABELS_KEY = 'motu-photo-labels';
const PHOTO_COPY_KEY = 'motu-photo-copy';
const photoURLs = {};   // { "figId-n": objectURL }
let _opfsDir = null;
let _opfsReady = false;
let _photoLabels = {};  // { [figId]: { [n]: label } }
let _photoCopy = {};    // { [figId]: { [n]: copyId } } — n's copy assignment

async function initOPFS() {
  try {
    if (!navigator.storage?.getDirectory) return false;
    _opfsDir = await navigator.storage.getDirectory();
    _opfsReady = true;
    return true;
  } catch { return false; }
}

function loadPhotoLabels() {
  try { _photoLabels = JSON.parse(localStorage.getItem(PHOTO_LABELS_KEY) || '{}'); } catch { _photoLabels = {}; }
}
function savePhotoLabels() {
  try { localStorage.setItem(PHOTO_LABELS_KEY, JSON.stringify(_photoLabels)); } catch {}
}
function loadPhotoCopyMap() {
  try { _photoCopy = JSON.parse(localStorage.getItem(PHOTO_COPY_KEY) || '{}'); } catch { _photoCopy = {}; }
}
function savePhotoCopyMap() {
  try { localStorage.setItem(PHOTO_COPY_KEY, JSON.stringify(_photoCopy)); } catch {}
}
// Returns the copyId a photo is assigned to (null/undefined if shared).
function photoCopyOf(figId, n) {
  return _photoCopy[figId]?.[n];
}
// Set or clear a photo's copy assignment.
function setPhotoCopy(figId, n, copyId) {
  if (copyId == null) {
    if (_photoCopy[figId]) {
      delete _photoCopy[figId][n];
      if (!Object.keys(_photoCopy[figId]).length) delete _photoCopy[figId];
    }
  } else {
    if (!_photoCopy[figId]) _photoCopy[figId] = {};
    _photoCopy[figId][n] = copyId;
  }
  savePhotoCopyMap();
}

const photoStore = {
  // Sync: get primary (first) photo URL for a figure — used in list/grid thumbnails
  // Sync: get primary photo URL for list/grid thumbnails
  // Returns null if default is stock image (n=-1) so renderer falls through to f.image
  get: id => {
    const defN = S.defaultPhoto?.[id];
    if (defN === -1) return null;  // user chose stock as default
    const arr = S.customPhotos[id];
    if (!arr || !arr.length) return null;
    const targetN = defN != null ? defN : arr[0].n;
    return photoURLs[id + '-' + targetN] || photoURLs[id + '-' + arr[0].n] || null;
  },

  // Sync: get all photos for a figure — { url, label, n }[]
  getAll: id => {
    const arr = S.customPhotos[id] || [];
    return arr.map(({n, label}) => ({
      n, label: label || '',
      url: photoURLs[id + '-' + n] || null,
    })).filter(p => p.url);
  },

  // Sync: get photos belonging to a specific copy. Includes shared (unassigned)
  // photos when includeShared is true, so a single-copy figure sees everything.
  getForCopy: (id, copyId, includeShared = true) => {
    const arr = S.customPhotos[id] || [];
    return arr
      .filter(({n}) => {
        const owner = photoCopyOf(id, n);
        if (owner == null) return includeShared;
        return owner === copyId;
      })
      .map(({n, label}) => ({
        n, label: label || '',
        url: photoURLs[id + '-' + n] || null,
        copyId: photoCopyOf(id, n) ?? null,
      }))
      .filter(p => p.url);
  },

  // Async: add a new photo to a figure. Returns index (n) on success, -1 on failure.
  // Optional copyId associates the photo with a specific copy; null/undefined = shared.
  add: async (id, blob, label = '', copyId = null) => {
    try {
      const existing = S.customPhotos[id] || [];
      if (existing.length >= MAX_PHOTOS) return -1;
      // Find first free slot n
      const used = new Set(existing.map(p => p.n));
      let n = 0;
      while (used.has(n) && n < MAX_PHOTOS) n++;
      if (n >= MAX_PHOTOS) return -1;

      if (_opfsReady) {
        const fh = await _opfsDir.getFileHandle(`photo-${id}-${n}.jpg`, {create: true});
        const writable = await fh.createWritable();
        await writable.write(blob);
        await writable.close();
        const key = id + '-' + n;
        if (photoURLs[key]) URL.revokeObjectURL(photoURLs[key]);
        photoURLs[key] = URL.createObjectURL(blob);
      } else {
        // Fallback: localStorage base64
        const dataUrl = await new Promise((res, rej) => {
          const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(blob);
        });
        try { localStorage.setItem(`motu-photo-${id}-${n}`, dataUrl); }
        catch { return -1; }
        photoURLs[id + '-' + n] = dataUrl;
      }

      // Update state
      const arr = [...(S.customPhotos[id] || []), {n, label}];
      S.customPhotos[id] = arr;
      if (label) {
        if (!_photoLabels[id]) _photoLabels[id] = {};
        _photoLabels[id][n] = label;
        savePhotoLabels();
      }
      if (copyId != null) setPhotoCopy(id, n, copyId);
      return n;
    } catch { return -1; }
  },

  // Async: remove photo at index n for a figure
  remove: async (id, n) => {
    const key = id + '-' + n;
    if (photoURLs[key]) { URL.revokeObjectURL(photoURLs[key]); delete photoURLs[key]; }
    try {
      if (_opfsReady) await _opfsDir.removeEntry(`photo-${id}-${n}.jpg`);
    } catch {}
    try { localStorage.removeItem(`motu-photo-${id}-${n}`); } catch {}
    // Update state
    const arr = (S.customPhotos[id] || []).filter(p => p.n !== n);
    if (arr.length) S.customPhotos[id] = arr;
    else delete S.customPhotos[id];
    // Clean label
    if (_photoLabels[id]) {
      delete _photoLabels[id][n];
      if (!Object.keys(_photoLabels[id]).length) delete _photoLabels[id];
      savePhotoLabels();
    }
    // Clean copy assignment
    setPhotoCopy(id, n, null);
  },

  // Async: update label for photo n of figure id
  setLabel: async (id, n, label) => {
    if (!_photoLabels[id]) _photoLabels[id] = {};
    if (label) _photoLabels[id][n] = label;
    else delete _photoLabels[id][n];
    if (!Object.keys(_photoLabels[id]).length) delete _photoLabels[id];
    savePhotoLabels();
    const arr = S.customPhotos[id] || [];
    const idx = arr.findIndex(p => p.n === n);
    if (idx >= 0) arr[idx] = {...arr[idx], label};
  },

  // Delete all photos for a figure (used by clearPhoto legacy API)
  delAll: async id => {
    const arr = [...(S.customPhotos[id] || [])];
    for (const p of arr) await photoStore.remove(id, p.n);
  },

  // Load all photos into URL cache (called during init)
  loadAll: async () => {
    loadPhotoLabels();
    loadPhotoCopyMap();
    // Parse filename: photo-{figId}-{n}.jpg
    // Note: figId itself may contain hyphens, so we must match -{digit}.jpg at the end
    const parsePhotoName = name => {
      if (!name.startsWith('photo-') || !name.endsWith('.jpg')) return null;
      const core = name.slice(6, -4);
      const m = core.match(/^(.+)-(\d+)$/);
      if (!m) return null;
      return {id: m[1], n: parseInt(m[2], 10)};
    };

    const buckets = {};  // { figId: [{n, url}, ...] }

    if (_opfsReady) {
      try {
        for await (const [name, handle] of _opfsDir) {
          if (handle.kind !== 'file') continue;
          const parsed = parsePhotoName(name);
          if (!parsed) continue;
          const file = await handle.getFile();
          photoURLs[parsed.id + '-' + parsed.n] = URL.createObjectURL(file);
          (buckets[parsed.id] = buckets[parsed.id] || []).push(parsed.n);
        }
      } catch(e) { console.error('OPFS loadAll error:', e); }
    }

    // Load localStorage fallback photos (new multi-photo format)
    try {
      const keys = Object.keys(localStorage).filter(k => /^motu-photo-.+-\d+$/.test(k));
      keys.forEach(k => {
        const core = k.slice('motu-photo-'.length);
        const m = core.match(/^(.+)-(\d+)$/);
        if (!m) return;
        const id = m[1], n = parseInt(m[2], 10);
        const cacheKey = id + '-' + n;
        if (!photoURLs[cacheKey]) {
          photoURLs[cacheKey] = localStorage.getItem(k);
          (buckets[id] = buckets[id] || []).push(n);
        }
      });
    } catch {}

    // Populate customPhotos from buckets, sorted by n
    Object.entries(buckets).forEach(([id, ns]) => {
      ns.sort((a, b) => a - b);
      S.customPhotos[id] = ns.map(n => ({n, label: _photoLabels[id]?.[n] || ''}));
    });
  },

  // One-time migration: rename photo-{figId}.jpg → photo-{figId}-0.jpg
  migrateToMulti: async () => {
    if (!_opfsReady) return 0;
    let migrated = 0;
    try {
      const toMigrate = [];
      for await (const [name, handle] of _opfsDir) {
        if (handle.kind !== 'file') continue;
        if (name.startsWith('photo-') && name.endsWith('.jpg')) {
          const core = name.slice(6, -4);
          // If core doesn't end with -digit, it's the old format
          if (!/-\d+$/.test(core)) toMigrate.push({name, id: core});
        }
      }
      for (const {name, id} of toMigrate) {
        try {
          const oldHandle = await _opfsDir.getFileHandle(name);
          const file = await oldHandle.getFile();
          const newHandle = await _opfsDir.getFileHandle(`photo-${id}-0.jpg`, {create: true});
          const writable = await newHandle.createWritable();
          await writable.write(await file.arrayBuffer());
          await writable.close();
          await _opfsDir.removeEntry(name);
          migrated++;
        } catch(e) { console.error('Migration failed for ' + name, e); }
      }
    } catch {}
    return migrated;
  },

  // Legacy migration: localStorage old single-photo format → OPFS multi-photo format
  migrateLegacyLS: async () => {
    if (!_opfsReady) return 0;
    let migrated = 0;
    try {
      // Old single-photo format: motu-photo-{figId}  (no trailing -digit)
      const keys = Object.keys(localStorage).filter(k =>
        k.startsWith('motu-photo-') && !/-\d+$/.test(k)
      );
      for (const k of keys) {
        const id = k.slice('motu-photo-'.length);
        const dataUrl = localStorage.getItem(k);
        if (!dataUrl) continue;
        try {
          const res = await fetch(dataUrl);
          const blob = await res.blob();
          const fh = await _opfsDir.getFileHandle(`photo-${id}-0.jpg`, {create: true});
          const writable = await fh.createWritable();
          await writable.write(blob);
          await writable.close();
          photoURLs[id + '-0'] = URL.createObjectURL(blob);
          localStorage.removeItem(k);
          migrated++;
        } catch(e) { console.error('LS migration failed for ' + id, e); }
      }
    } catch {}
    return migrated;
  },

  // Export all photos for a figure as [{label, dataUrl}, ...] (for JSON backup)
  exportAllAsDataURLs: async id => {
    const arr = S.customPhotos[id] || [];
    const result = [];
    for (const {n, label} of arr) {
      const key = id + '-' + n;
      const url = photoURLs[key];
      if (!url) continue;
      try {
        let dataUrl;
        if (url.startsWith('data:')) dataUrl = url;
        else {
          // Object URL — need to fetch blob and read as data URL
          const res = await fetch(url);
          const blob = await res.blob();
          dataUrl = await new Promise((r, rj) => {
            const fr = new FileReader();
            fr.onload = () => r(fr.result);
            fr.onerror = rj;
            fr.readAsDataURL(blob);
          });
        }
        result.push({label: label || '', dataUrl});
      } catch {}
    }
    return result;
  },

  // Get all photos for a figure as raw blobs (for ZIP packaging).
  // Returns [{n, label, blob}, ...]
  getAllAsBlobs: async id => {
    const arr = S.customPhotos[id] || [];
    const result = [];
    for (const {n, label} of arr) {
      const key = id + '-' + n;
      const url = photoURLs[key];
      if (!url) continue;
      try {
        const res = await fetch(url);
        const blob = await res.blob();
        result.push({n, label: label || '', blob});
      } catch {}
    }
    return result;
  },

  // Import photos for a figure from backup
  importPhotos: async (id, photos) => {
    let count = 0;
    for (const p of photos) {
      try {
        const res = await fetch(p.dataUrl);
        const blob = await res.blob();
        const n = await photoStore.add(id, blob, p.label || '');
        if (n >= 0) count++;
      } catch {}
    }
    return count;
  },
};

};

// Web Audio API playback — avoids the crackle that HTMLAudioElement produces
// on Android when audio focus transitions or the buffer starts before the
// download completes. We pre-decode each file into an AudioBuffer on first
// use, then play from the in-memory buffer (zero network latency on repeat).
// A 5ms gain ramp at start/end prevents DAC pop on abrupt onset/offset.
let _actx = null;
const _audioBuffers = {};   // url → decoded AudioBuffer
const _audioPending = {};   // url → Promise (dedupes concurrent fetches)

function getAudioContext() {
  if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
  // Mobile browsers suspend the context until a user gesture — resume here.
  // We're always called from a tap/click so this is safe.
  if (_actx.state === 'suspended') _actx.resume().catch(() => {});
  return _actx;
}

async function loadAudioBuffer(url) {
  if (_audioBuffers[url]) return _audioBuffers[url];
  if (_audioPending[url]) return _audioPending[url];
  _audioPending[url] = fetch(url)
    .then(r => r.arrayBuffer())
    .then(ab => getAudioContext().decodeAudioData(ab))
    .then(buf => { _audioBuffers[url] = buf; delete _audioPending[url]; return buf; })
    .catch(() => { delete _audioPending[url]; return null; });
  return _audioPending[url];
}

// Preload a buffer without playing it (call during init / theme switch).
function preloadSound(url) { if (url) loadAudioBuffer(url).catch(() => {}); }

function playSound(url, volume = 0.9) {
  if (!url) return;
  const ctx = getAudioContext();
  loadAudioBuffer(url).then(buf => {
    if (!buf) return;
    const source = ctx.createBufferSource();
    source.buffer = buf;
    // Gain node for smooth ramp — eliminates onset/offset click
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(volume, ctx.currentTime + 0.005); // 5ms attack
    gain.gain.setValueAtTime(volume, ctx.currentTime + buf.duration - 0.04);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + buf.duration); // 40ms release
    source.connect(gain);
    gain.connect(ctx.destination);
    source.start(ctx.currentTime);
  }).catch(() => {});
}
